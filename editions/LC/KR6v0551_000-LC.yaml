body:
  text: 作者簡介近代研究佛學的學者當中以呂澂的貢獻最為睥睨世人呂澂通曉多國文字佛學著作等集於一身半個多世紀以來呂澂以其探隱抉微窮原竟委的治學精神深為後人所敬重而他研究領域的廣袤在中國佛學界中亦少有人堪與比擬他誨人不倦甘於淡泊的出世情懷以及不慕榮利的高潔情操至今令人景仰可謂近代佛學巨擘絕世天資佛學啟蒙呂澂出生於清光緒二十三年西元一八九六原名呂渭後改名澂字秋逸也作秋一鶖子江蘇省丹陽縣人自幼天資聰慧刻苦向學初級師範學校鎮江中學畢業後繼之考入常州高等實業學校農科在校肄業一年又考入民國大學經濟系未幾退學能獨力閱畢大英百科全書又利用餘暇自修精通英日法德梵藏等各國語言當時他的胞兄呂鳳子任教於兩江師範學堂是江蘇著名的畫家尤其喜歡繪畫佛像常往金陵刻經處聽楊仁山居士講學返家後即為呂澂複述此為呂澂接觸佛法的開端一九一一年楊仁山逝世歐陽漸繼其業負責金陵刻經處的編校當時在全國的刻經處中以金陵的校勘規模最大最精呂澂至刻經處購書時得晤歐陽漸遂虛心請教呂澂才思敏捷歐陽漸甚為激賞此後呂澂便常與之信札往返討論佛法一九一四年歐陽漸在金陵刻經處設研究部呂澂與邱晞明姚伯年徐鐘峻入學就讀同為第一批學人一年後赴日留學進入日本高等預備學校深造繼而在日本美術學院專攻美術呂澂學習認真成績優異博得日本教師一致的誇讚第二年因與留日學生共同反對日本侵略中國而罷學回國金陵事師創新講學一九一六年呂澂歸國後旋被劉海粟聘為上海美術專科學校教務長任教期間呂澂撰著美學概論美學淺說現代美學思潮西洋美術史以及色彩學綱要等對二年代初期美學研究和傳播西方美學有重要影響一九一八年歐陽漸欲在刻經處籌辦支那內學院邀請呂澂協助籌備之初經費極度窘迫呂澂曾隨歐陽漸四處奔走向當時的雲南督軍唐繼堯北京政府鐵路督辦蒯若木募款籌備時間前後達四年呂澂逐漸放棄美學專志於佛學的研究一九二二年支那內學院在南京半邊街今公園路正式成立歐陽漸為校長呂澂任學務處主任因呂澂字秋子歐陽漸嘗稱他為鶖子鶖子是釋迦牟尼佛座下智慧第一的弟子舍利弗的譯名由此可見歐陽漸對呂澂的倚重歐陽漸曾說道先師咐囑漸十餘年來得超敏縝密之秋一可以整理得篤實寬裕之黃樹因可以推廣吾其庶幾乎呂澂從此矢志佛學追隨歐陽漸左右未曾暫捨往後支那內學院一切的成就以及在佛學學術上的貢獻與呂澂的努力密不可分支那內學院藏書數十萬卷其研究學風是從學術意義上研究佛教文化因此在開課之初學人薈集人才鼎盛如呂澂王恩洋湯用肜聶耦耕邱晞明景昌極等均在院任教在開辦法相大學特科後支那內學院一時聲譽鵲起與太虛大師創辦的武昌佛學院遙相輝映成為全國兩大佛學中心除行政教學工作外呂澂還從事大量佛學研究佛典校勘與整理的工作這段時期呂澂撰寫聲明略佛典泛論佛學研究法印度佛教史略和因明綱要呂澂的授課方式與眾不同他根據歐陽漸的院訓釋釋教將佛學分成五科後人稱其為五科佛學以毗曇般若瑜伽涅槃戒律組成內學院院學這個教學體系涵蓋整個印度佛學可謂近代佛學教學史上的創舉勤奮研究揚名國際呂澂追隨歐陽漸二十餘年深得其學問之精髓他孜孜不倦的鑽研精神加上聰敏的天資曾被熊十力慧眼識才指其學識較之歐陽漸青出於藍更勝於藍並在給呂澂的信中讚嘆說較師更加精詳一九二六年後由於北伐方酣支那內學院和武昌佛學院都先後為軍隊佔用而停辦上百多間房舍的金陵刻經處只留下存放經書及日常作息的空間支那內學院也只剩下呂澂和邱晞明陪侍歐陽漸繼續未完的研究工作一九三七年中日戰爭爆發未幾戰火蔓延到南方歐陽漸率領部份門人弟子由呂澂護送大批重要資料前往四川在江津成立支那內學院的蜀院蜀院並未招生只是繼續著述研究工作正值四十二歲壯年的呂澂在入川後數年間於處理院務之餘更全心投入學術研究他對梵文藏文原典的解讀尤為特出曾校勘藏文攝大乘論因明入正理論及梵文楞伽經並完成雜阿含經刊定記因明入正理論講解等重要佛學著作及若干篇重要學術論文呂澂同時與法國東方學者萊維及日本佛學家木村泰賢等往返論學解決歷史遺留的許多問題為內學院在國際學術界中樹立聲譽也為中國佛教爭得光榮著述研究為教忘我一九四三年二月歐陽漸逝世各方弟子回江津奔喪門人組織院友會公推呂澂繼任院長王恩洋等擔任院友會理事呂澂繼師遺志繼續辦理蜀院開始聚眾講學其間曾與華西大學中國文化研究所合編漢藏佛教關係史料集一九四九年中共取得政權支那內學院改名為中國內學院呂澂續掌院務三年後西元一九五二該院院友開會決議自行停辦自此創立三十餘年中國高等第一佛學院支那佛學院宣告停辦一九五三年中國佛教協會在北京成立呂澂被選為常務理事由於中國人民政治協商會議對他頗為重視自第三屆起呂澂便獲選為全國政協委員二年後斯裡蘭卡佛教徒為紀念佛陀涅槃二千五百年發起編纂英文佛教百科全書邀請各國佛教學者合作中國佛教協會當即成立中國佛教百科全書編纂委員會推舉趙樸初為主編呂澂任副主編聘請國內佛教學者撰稿呂澂同時撰寫百萬字的中國佛教獲得國際間的肯定和榮譽一九五六年呂澂任中國科學院哲學社會科學部委員兼哲學研究所研究員一九六一年呂澂受科學部委託在南京開辦一個為期五年的佛學班為北京上海內蒙古派來的三個研究生開設中國佛學和印度佛學兩門課程後整理講課筆記輯成中國佛學源流略講和印度佛學源流略講兩書一九六二年呂澂希望中國能出版一部優於日本大正藏的大藏經翌年即開始編寫新編漢文大藏經錄它是呂澂數十年讀經的心血結晶不只將經籍內容分類還勘同出一百七十七部佛籍歷時三年完成後因大陸文革開始編印藏經的弘傳計畫被迫中止一九六六年文化大革命開始佛學班及多年研究成果資料全數毀壞殆盡七十一歲的呂澂遂避居江蘇故居後再遷居北京清華園直至一九八九年七月逝世享壽九十三這二十三年間形同退隱不曾再有佛學著述問世振響當世流韻未來呂澂在佛學研究上的貢獻除了在唯識研究上獨樹一幟外並溝通漢藏佛學重視藏傳佛學的研究同時發揚唯識與因明學他在學術上主要成就有一在玄奘所譯瑜伽師地論最後二十卷中發現攝事分的大分是引用全部雜阿含經本母因此明白瑜伽一系學說真正來源為上座部禪法他更訂正翻譯後弄亂的雜阿含經次第寫成雜阿含經刊定記此一見解遠比日本佛學界早六十年左右二在瑜伽師地論裡發現引用小品寶積經的舊注而刻成寶積經瑜伽釋一書不僅看出大乘學說前後的聯繫且訂正舊譯寶積經論的錯誤三認清梵藏本唯識論書的文義自成一系與玄奘所傳不同而確定唯識古今學說分歧之所在從此唯識學前後變遷跡像一目了然四尋出俱舍論與南北雙方毗曇論的關係判明小乘毗曇學說的系統五校勘編印藏要一書凡四百餘卷此書整理考訂各地所發現歷代大藏經刻本因而廓清藏經版本源流確定文字正謬的標準又從國外校印的梵藏文佛典和康藏各種刻版的西藏大藏經比較研究而見到漢文翻譯的優劣藏要被用作校釋佛籍的重要參考本更是日本佛教大學教科本及印度國際大學研究資料呂澂個性純厚律己甚嚴據學生張春波所描述先生已六十六歲那麼大年紀每天都是凌晨四點起床漱洗畢即開始工作或研究學問或備課幾乎把全部精力都用到工作學習研究和教學上這恐怕是先生在學問上能取得重大成就的主要原因呂澂治學精神令人讚嘆對佛學界的貢獻照古耀今
