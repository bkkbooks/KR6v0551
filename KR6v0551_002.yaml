名是順中論義入大般若初品法門三金剛經論是提出七句義來解釋金剛經的四大乘阿毗達磨集論五攝大乘論兩書都與大乘阿毗達磨經有關是總括大乘義理的著作六六門教授習定論是講瑜伽方法的著作世親的著作比較多發揮彌勒學說的有大乘莊嚴經論釋辨中邊論釋金剛經論釋解釋無著著作的有攝大乘論釋習定論釋闡述自己觀點的主要有成業論是對小乘關於業說所作的批判二十唯識論論本二十頌自作解釋三十唯識論有頌無釋恐怕是他晚年的作品都是很重要的此外他對大乘經還做了許多注釋如解釋華嚴系統的十地經論漢譯之後影響很大以至出現了一批地論師對無量壽經所作的注漢譯之後也成為我國淨土宗的根本典據其他還有注釋法華經緣起法門經無盡意經寶髻經等等的著作關於小乘的著作俱舍論盡管他本人不怎樣重視但影響很大他的門人廣為傳播還流行了相當長的一個時期無著世親兩家的著作與以後構成瑜伽學派有關係的有八部這在義淨去印時就已被印度佛學家歸為一類名無著八支據南海寄歸傳卷四說瑜伽畢學體窮無著之八支就是說學習瑜伽學要講畢業的話就得體會研究無著的這八部書但八支中也有世親的書這是怎麼一回事呢據義淨講世親之學是來自無著受了無著的啓發因之兩家的重要著作統以無著之名發表這八部書是二十唯識論三十唯識論攝大乘論大乘阿毗達磨集論辨中邊論緣起論大莊嚴經論成業論兩家的主要學說都包括在這八部書裏無著世親的學說主要是根據後出的論議性質的大乘經組織的在思想淵源上雖與初期大乘有聯繫同時又由於大乘學說的總源頭是般若也還可以把他們的思想上推到般若但是除繼承前人的思想外顯然還有他們自己的特點兩家的學說一開頭就講緣起問題這個問題是佛家各派都要涉及的原始佛學時期是從人生現象來講的因之那時講的是十二支緣起說後來範圍擴大了不僅講人生現象連宇宙現象也涉及到了這時就産生了兩個極端一是執有一是執空惡取空執有的勢力很大曾經風靡一時此時龍樹的學說出現了主要反對有部的執有同時也反對惡取空創立了中道觀龍樹這個階段所講的是以能所取也叫能受用為依據的受用緣起說為甚麼叫能所取呢這主要是從認識方面說的人們的認識是從感性到理性而感性的感覺無非是由內根與外境的相互作用而産生的龍樹認為內根是能取外境是所取二者都是自性空這種說法人們不易領會於是更進而提出二諦來分別一切法的實相亦以二諦為標準說勝義諦是空世俗諦是有把兩者統一起來的認識就是中道觀所以龍樹的緣起說主要是從認識角度來說的到了無著世親時代不僅不滿意從人生現象講而且也不限定在一般認識領域內講緣起他們要把範圍擴展到對整個宇宙一切現象的宇宙觀上當然這就不是受用緣起說所能為力的了因此他們特別提出阿賴耶識來說明緣起阿賴耶首先是大乘阿毗達磨經提出的無著世親給了它更新的內容這叫分別自性緣起說他們認為阿賴耶識是一切所知法的總依它能發生一切法但各種法都有不同的自相自性是怎樣區別開的他們說這是因為阿賴耶含藏有自性各別的諸法名言種子換言之名言種子的自性不同一切法因之就有區別這樣的區別是屬於認識方面的所謂種子實質上也就是名言的概念的東西人的認識就以它們為根據因而諸現象之間的區別也都是由於認識上的原因在緣起說裏加上了名言種子的內容要理解一切法的實相真實義就不能單純從二諦標準來看了因此他們又提出三性說所謂三性說就是隨名言區別而來的一以名言表示而執為實有這樣所得的認識是不實在的分別謂之遍計所執性二遍計執亦非憑空而來是有所依的它所以的自性謂之依他起性即依各種因緣而生起三安立在依他起性上的遍計執當然是不真實的去掉它就能得到諸法的真實性這樣所認識的最完備也最真實謂之圓成實性所以從自性緣起說來看理解諸法的實相就要詳細分別三性對實相的認識也就是對三性的認識三性聯繫到有無的概念看遍計所執性是出於遍計的執著所以是無依他起性是遍計生起的依據因而是有不過它與遍計相順它的生起是由於遍計執的種子生起以後又有遍計執的安立因此這個有不是實有而是假有到了圓成實才可以說是實有這樣認識三性非但對有無有了正確的認識而且對有的假實也有了正確的認識這是無偏見的認識謂之中道觀這樣的中道觀比之龍樹所說就更進了一步後來陳那還用比喻做了生動的解說如夜行見繩誤認為蛇以後看清了才知是繩非蛇再仔細看知道繩是麻做的這種有次第的認識就很好地說明了三性見繩誤識是遍計執繩體由因緣生則是依他起認識繩為麻所製成則是圓成實這一比喻還說明了無假有實有的關係本來沒有蛇是無乍看繩是蛇雖是假象但還是有卻是假有從而也說明了依他起與遍計執相順的關係無著的中道觀就是把三性這樣統一起來的認識並認為這是唯一的達到真理的認識顯然這些說法與以前的學說有聯繫其源可以一直上溯到般若經只是經文沒有提得這麼明確罷了無著自己也說他的三性說來自般若經並把它與般若經的道理加以會通見攝大乘論他說般若經講的空無不是泛泛之談而是指一切法的遍計執講的如幻如化是指的依他起性有而不實還講到知行均清淨使人在理解上得到正確認識在實踐上得到解脫即所謂法性本淨包括得到清淨的手段在內等等就指的圓成實性還可以這樣說不用三性去解釋經中這些道理便解釋不透三性說乃是般若經道理必然的歸宿般若經後來仍有發展如大品般若第二分末又新出了慈氏問品這一品說一切法如色法都有三類分別即遍計的色分別的色法性的色這與三性說不僅道理一致連名稱也幾乎一致了這一品在羅什玄奘的譯本中都沒有西藏譯本雖有但在目録中也說明它是後出的另外無性寫的攝大乘論釋中引用了這一品關於三性的說法可見在無性時代這一品已經有了這些都可證明慈氏問品是後來加上去的其實般若經有了空無如幻如化法性本淨等道理即足以證明三性說出之般若經了有無此品關係不大以上所講的三性說乃是無著世親學說的特點之一三性說的中心是依他起性菩薩地只說到假說自性和離言自性兩方面無著世親嫌其簡單還不足以說明認識的關係因而又加上了依他起作為兩者的樞紐這樣依他起便成了三性說的中心依他起指的就是一切法樹立了依他起便把一切法都繫屬於一心了所謂他就是各種法的名言概念種子都藏在阿賴耶識裏依阿賴耶而存在這些種子的現行便産生了森羅萬象的世界一切法那麼種子是怎樣構成的呢前七識有所見聞覺知即留下印象在第八識上謂之熏習熏習所成即是種子見聞覺知不外乎認識可見種子就是由認識構成的當然森羅萬象的宇宙也是認識構成的進而還可以反問整個宇宙除了各種不同的認識而外是否還有實體他們說沒有了因為一切法存在於認識中認識無非是心意識的分別作用這樣便構成了唯識說世界上實實在在的東西在唯識說者看來只不過是所分別而所分別又屬於分別的一部分隸屬於分別總之一切都是精神性的所以唯識說就是徹底的唯心論唯識說是無著世親整個學說體系必然導致的結論早在無著所著攝大乘論裏已有發端如在講三性的所知相分中即講到依他起是諸識共十一類的分別這就是說諸法皆待緣生而其實所謂緣生也就是識的分別到世親時唯識說更加細密並提出了種種論證可以說唯心論就此完全建立起來了世親敘述唯識說的著作有兩部二十頌論與三十頌論前者有他自己的長行解釋後者只有頌這兩部書都是用心意識來說明唯識理論的二十頌論主要以成立唯識學說為宗據早年發現的梵本它的書名即題為成唯識護法為它作的注解亦題名成唯識寶生論即此可見它的內容與性質之所在了二十頌論的唯識說要點是識生似轉變外境現意思是說識生起以後有一種作用能把識的一部分轉變成為心的對像由於人們對識所變沒有真實的認識把它執為外境其實呢外境並不存在那麼為甚麼人們會有這種執著呢它說這好比病目見空華空華是沒有的凡夫病目者執以為真就是遍計所執空華雖然沒有但畢竟總有那樣一個形象吧這個形象是屬於內還是屬於外呢它說這也是識所變現的屬於識內不在識外既然一切統屬於識所謂識的內境唯識說的根據就建立了不但如此它還要人們對唯識的原委有個正確的認識就是說要知道境是以識為性本質的境不過只是認識的一部分這樣唯識學說既有了否定否定外界的真實又有了肯定對唯識的正確認識而且不止是對個別事物對一切事物都應該如此認識就是說要把對唯識說的認識構成普遍的真理這就是他們的所謂唯識觀以上是二十頌論的主要觀點此外它還提出了種種疑難加以溝通至於正面文章如識怎樣變成境等在三十頌論中才有詳細的發揮上述學說要點是無著世親學的極高峰顯然對大乘初期的說法是有極大的發展不過也應看到從認識論角度構成的唯心理論在龍樹時就指出了方向所以從龍樹到世親他們立說的精神仍是一脈相通的無著世親學說最後一個特點是方法論上運用了因明並加以發展印度關於邏輯的學問稱為因明很早就在佛學以外的學派中有了組織特別是正理派即以邏輯思想做為他們學說的中心所以一般也把它稱為正理又因為它主張以充足的理由來證明真理對因特別注重又稱它作因論初期大乘如龍樹提婆在方法上也多少採用了因論不過反對外派過分重視其中量的作用外派認為量是達到真理的唯一途徑是構成知識的唯一標準和方法量有屬於感覺範圍的現量有屬於思維範圍的比量還有以前人現比量為根據的聲量言教等據龍樹看來這些做為一般經驗範圍內運用的工具還可以外派把它看作真理的完全依據就是過分誇張了所以著了回諍論廣破論無漢譯專門破斥正理派的以量為中心說這種態度也同他們自己重在破他的方法論有關他們是破而不立而且破得非常徹底與正理派有關的因論自然也在被破之列所以龍樹提婆對因論並沒有豫以重視到無著世親時代就不同了因為他們所根據的晚出大乘經典都談到了這方面的學說如菩薩地把世間各方面的學問像聲論語言學因論邏輯學醫方論工巧論手工藝等都包括在菩薩所學的範圍內再加上本宗的學說構成為菩薩所學的五明後出的大乘阿毗達磨經內想來也會涉及到這些內容不過此經不存只是從與它有關的阿毗達磨集論講到了因明而推測出來的其次解深密經最後一品講到佛所作事問題所作事之一就是對別人的言教其實本母部分就講了四種道理其一即證成道理用種種量能證明的道理也是屬於因明一類既然晚出經典都涉及到因明據以組織學說的無著世親必不可免地會要涉及他們學說的基本典據是瑜伽師地論此論本地分本地分共有十七地中的聞所成地聞即學法是專講應學習甚麼的也講到了五明並對因明的結構有詳細說明見漢譯本第十五卷該論說因明的結構是用七類與論議有關的事來辨明問題因明的運用重點是同別人辨別是非所以要用論議的形式所謂七事即一論體性二論處所三論所依四論莊嚴五論墮負六論出離七論多所作法這些就叫七因明隨後無著寫顯揚聖教論以及他參考大乘阿毗達磨經所寫的阿毗達磨集論中都重復地講到七因明內容小有出入但大體相同從上述著作可以看出無著參考了佛學外其他學派講的正理因論加以改動構成了自己的學說到世親時學說的範圍又加擴大不僅提到這方面的資料而且有專門的著述據玄奘門下所傳大約得之玄奘的口述世親有三部屬於因明的著作論軌論式論心三部書的梵本不存在了漢文也無譯本只從其它書的引用中簡單地知道前兩書的一點內容論心則僅知有此一書內容完全不瞭解此外據陳那的集量論說傳說成諍論是世親作的漢譯為成質難論陳那認為傳說可見並不真信為世親所作還有真諦所譯如實論也傳為世親作共計二品譯本與經録都沒有作者題名後來大約是唐代則有人相信是世親作的內容與成諍論相同既然成諍論傳為世親作此書當然也可能是世親作了據以上的傳說世親的因明著作是很多的他非但運用了因明而且有所發展發展的主要表現是他認為應該用因相來表示充分理由的性質因明的因就是表示充分理由的後來又說充分理由應該具備三相因相與三相之說在因明中都是很重要的三相的來源在無著順中論裏偶爾提到過說出於若耶須摩學派這個學派的名字很少見從翻譯的音義來推斷有種種說法有說它與正理派有關有說與耆那教有關究竟是哪派不能斷定但肯定不是佛教內的部派無著書中雖提到三相但沒有重視也未加運用到世親時從有關資料看他是吸收了三相說的後經陳那刊定就組成了完整的因明學說此後並得到更大的發展另外世親晚年著作如二十唯識論中建立唯識學說駁斥異見和溝通疑惑等等也運用了因明這一工具所以在方法論上運用因明是世親學說的一個特點事實上把世間所有學說組織到大乘方面的作法早在龍樹的菩提資糧論裏已經指出了方向無著世親時期則是實現了龍樹這一指示具體地做了另外無著世親所以吸取外派學說也是大勢所趨因為當時外派如正理派等的學說都有發展且有完備的組織在此情況下若不瞭解外學沒有學說上的這種重新組織要同外派辨論發揚自宗就有困難因此適應客觀形勢的需要佛學也不得不有此組織參考資料婆藪槃豆傳西域記卷五阿逾陀國條王沂暖譯印度佛教史第二十二章無著兄弟時代出三藏記集經序續篇卷四有關諸論序呂澄印度佛教史略本篇下二章四節二段呂澄因明綱要第一章引論第四節瑜伽行學派和中觀學派世親學派傳承與瑜伽行學派難陀安慧的無相唯識說陳那護法的有相唯識說量論的組織戒賢親光的佛地學說堅慧對如來藏思想的發展清辨與中觀學派無著世親以後大乘學說內部有了鮮明的分立主要有兩派一是瑜伽行派一是中觀派瑜伽行派是從無著世親這個系統下來的重要的典據是瑜伽師地論瑜伽師是漢譯名從藏譯看原名是瑜伽行所以一般稱這派為瑜伽行派簡稱瑜伽派為了避免同六派中瑜伽派相混還是稱瑜伽行派與此同時有些學者自稱要以龍樹提婆學說為典據恢復其學說的本來面貌實際上對龍樹提婆之學已有很大發展這就是組成的中觀學派中觀瑜伽兩派在重要學說上都是對立的盡管有人想調和兩家仍無濟於事後來的發展愈趨分裂始終未能統一首先講瑜伽行派此派應從世親的傳承說起在世親時那爛陀寺已經建立他本人是否在該寺主持過講壇已無可考但他的一派學者主要是在該寺活動這是可以肯定的那麼世親這一派的傳承是怎樣的呢這個世系一直是不明瞭的在中國傳世親學的學者有好幾家前有菩提流支真諦後有玄奘他們對此也都沒有明確的說法流支所譯金剛仙論即金剛經論注論末附注云金剛經論是世親作金剛經論注是世親弟子金剛仙作展轉三傳至於菩提流支云云此說不是出於流支本人只是後人的一種說法未必可信玄奘譯了三十唯識論還譯了十家的注不是十家分譯而是把十家的注糅合一起譯的名成唯識論他的門人窺基作成唯識論述記在初發論端裏說到有關十家的一點情況從中多少可以看出十家與世親的一些關係十家中親勝火辨二家是與世親同時的後八家與世親時間相距有一百多年他們是否世親的弟子成唯識論述記都未談到只說到德慧是安慧的老師另外還提到勝友勝子智月與護法有師承關係至於親勝火辨德慧護法與世親之間的關係就不清楚了述記記載十家情況如下一護法世親後二德慧世親後安慧之師三安慧四親勝世親同時五難陀六淨月安慧同時七火辨世親同時八勝友護法門下九勝子護法門下十智月護法門下總之從十述記載的十家還看不清世親的世系西藏在這方面倒有比較詳細的記載說世親以後有四大家一安慧他和世親的年齡相差很大據西藏所傳的神話安慧原是世親講學時在那兒聽講的一隻鴿子後來轉生南印度七歲時又重到世親處受學可見兩人年齡的懸殊了還說安慧對世親四科學說中的毗曇科特別擅長這個說法倒是符合事實的安慧確實對世親關於毗曇的著作有很多注疏例如俱舍實義疏分量相當大有藏譯本漢譯略本的殘卷是在敦煌卷子中發現的其後此注還由他弟子滿增重疏名隨相疏流行很廣在西藏幾乎成了佛學的重要參考書另外他又糅合阿毗達磨集論和師子覺的注釋而成雜集論師子覺為無著的弟子作此論的目的是為了補救人們對俱舍論的攻擊雖是糅合成書但對世親學說已有所發展實際上安慧的著作還不限於注疏毗曇的幾種他還有大乘莊嚴經論疏辨中邊論疏三十唯識論釋等等此外對小品寶積經也有釋漢譯名寶積經論二陳那也是南印度人婆羅門姓他不在十家之內主要是傳世親因明方面的學說此外他對俱舍論也有注同時對小品般若經也有注釋漢譯名圓集要義論是個頌本關於因明的著作重要的有八部稱為因明八論三德光主要是傳世親的律學現存著作有他對瑜伽師地論開頭幾品的注又有菩薩地的戒品注另外他對聲聞乘的律也有綱要性的著述名律經此處的經指略詮的體裁即綱要是說一切有部的律後來很盛行凡學有部戒的都以它為主因他對瑜伽行派及有部的戒都有發明也算一家不過玄奘對德光是抱有歧視態度的從大唐西域記記載有關德光的事情可以看得出來後來義淨去印度倒很推崇他說他再興律藏四解脫軍這一家在漢譯中連名字也沒有西藏說他是傳世親的般若學的他除傳金剛般若論外還傳現觀莊嚴論現觀莊嚴論有藏譯本後世傳說是彌勒作的同大智度論一樣是解釋大品般若的玄奘時還不知道有此書可能是後出的西藏認為解脫軍有這方面的著作所以也算一家從西藏所傳的材料看世親的世系有此四人至於他們的年代與世親有無直接傳承關係等等還是不清楚不過世親之學因有這些人而得到發揚光大從而形成一個與其他學派相對立的一派這是很明顯的盡管世親的學說規模大方面廣可是以後形成為瑜伽行學派的發展過程中卻始終是以唯識說為主導的在唯識學說發展中又有兩個系統其一是比較偏於保守的注意保持世親學的原來精神甚至連文字上也盡量保持原貌由於他們與另一系比較起來偏於重視舊說所以一般稱之為唯識古學唯識古學的代表先有難陀注釋三十唯識論十家之一窺基的成唯識論述記裏對他雖有所介紹但過於簡略只說他注三十唯識頌外曾作過瑜伽師地論的注解這兩種注的原本都不存在只在成唯識論中保留了他的將近二十條的主張難陀的時代因為是上接世親下有傳承他學說的勝軍大概是比安慧稍前一點安慧約是六世紀中葉人難陀對他講來算是與護法同時的一位前輩因為安慧辨中邊論注的梵本猶在所以還能看到其中有些說法與唐人所傳難陀之說相同這大概是他引用了難陀之說難陀唯識說的重要根據是世親的幾部論二十唯識論三十唯識論等甚至可以追溯到攝大乘論釋辨中邊論釋中關於唯識的思想難陀把上述各書的唯識說貫穿起來並加以發揮因此要瞭解難陀的主張先應讀其思想淵源的攝大乘論攝大乘論中曾提出了三點成立唯識的理由一由唯識無義義即境就是說心法中只有識而無境心法的對像都是無體的不實在的所以成立了唯識二由有見相二雖無實境但它畢竟有個來源它的來源仍然是識為甚麼因為心與境是以見相關系統一在一種識裏的如眼識屬於見所見的各種色識就是相色識也統一在眼識中成為一組總的謂之眼識因此這也成立了唯識三由種種相生起前五識都各有自己的確定對像如眼限於見色耳限於聞聲等到第六識範圍就寬了它可遍緣十八界但仍屬於相的一邊所生起的種種相仍在識的範圍內所以也成立了唯識以上只是攝大乘論成立唯識的幾個論點其餘尚有論證此處從略攝大乘論成立唯識的三個理由完全根據它把識總起來講諸識總的說來凡有十一類即身識身者識受者識應受識正受識世識數識處識言說識自他差別識善惡兩道生死識以這十一類總攝一切識如說眼識就可歸於身識色識歸於應受識等等這十一類識在現行時看具體情況來配合哪一類的識屬哪一識的見或相並不是固定的難陀根據攝大乘論的說法有了發展他把見相固定了把八識分開來講說每種識都個別的有其見相如眼與色相對耳與聲相對等分工明確不相紊亂就是說每一種識生起都有兩種作用一是能取境的一是它轉變成為所取的境因此見相固定在每一種識上能取的就叫見分所取的就叫相分那麼按實言之這二分都同為識的自體呢還是各一分為識的自體難陀認為二分中見分為自體相分是轉變出來的所以是不實在的虛像如以三性區分相分是虛像屬遍計所執性見分因有分別作用屬於依他起性只有到它轉變成淨的性質以後即認識到這相分是不實在的以後那時所顯現的才是圓成實難陀從攝大乘論出發首創見相二分說同時又與種子說相聯繫而創種子新熏說在他看來見相分之轉變顯現是由於種子的功能種子則由熏習而起所謂熏習就是前七識有了分別而留習氣於第八識上這些習氣將來是可以發生現行的所以叫它種子種子的來源都是熏習難陀進而認為種子既是由熏習來熏非本有而是現熏人們把他這種說法稱為新熏說把新熏的理論貫徹到實踐修行方面去認為修行所取得的清淨法種子無漏種子也是熏習而成但它不像一般種子是由過去多生熏習留下來的而有待於新熏既然無漏種子是新熏而成因此連帶五種姓的說法也有了變動五種姓的區別主要是說聲聞等三乘的實踐能得淨法要有各別決定性種子的存在依難陀講各種姓的熏習都可以從現在開頭就是聲聞乘的人也可以熏成菩薩乘的無漏種子這樣五種姓的說法就不一定要堅持了這是難陀的主張特殊的地方不過這裏産生了一個問題人還有先天性的本能的行為如嬰兒的會吃會哭等這是從哪兒來的種子難陀的解答只能求救於輪回認為這些行為可以推溯到過去世是過去世熏習留下來的種子難陀的唯識說與世親比較接近雖然有所發展但基本精神還是來自世親難陀的發展是他明確地指出相分是無體的見分也無其行相因此後世稱他的學說為無相唯識說唯識古學的代表難陀之後還有安慧據西藏傳安慧年代與世親接近並說直接受教於世親但據玄奘所傳他是德慧的門下因此有必要先講一下德慧德慧曾作三十唯識論注窺基在成唯識論述記裏對他也有介紹但內容十分空泛從大唐西域記的記載中說他曾在那爛陀寺活動過他的著作現存有西藏譯的釋軌論注釋軌論是世親著主要解釋經的要義方法的詳細內容尚無人研究另外有中論注已不存了他是後世所傳注中論的八大家之一只在後世學者觀誓所著般若燈論疏中有過片斷引文漢譯中還保存有他俱舍注的殘本真諦譯名隨相論祇解釋論中四諦十六行相一段的這是他的著述關於他學說的特點義淨在南海寄歸傳中對他曾有專長定學的評語不過這方面的著作已見不到了從他注俱舍論中論釋軌論的舉動看說他與安慧有師弟關係大概可信因為安慧在這幾方面也有注由此可以推知安慧恐怕沒有直接受教於世親西藏所傳恐係誤會而且為了把安慧說成直接受教於世親反把德慧說成是安慧弟子了安慧的唯識說因其著作三十唯識論注後來律天為注作疏也保存下來辨中邊論注的梵本藏譯均存所以能夠攪清楚他的學說大體是繼承了難陀的精神盡量保持舊說的原貌但在他與難陀之間還隔有陳那一家對他不無影響因此先簡單講述一下陳那的唯識主張陳那對難陀的心分說有發展難陀把見相固定在每一種識上陳那認為心不僅有見相二分而是三分除見相分外還有自證分見相交涉的結果就是見瞭解相這種瞭解是親切的自知所以叫它自證證指觸證如手親自摸到而無間隔自證是用來作為心的自體的同時用來證明自體的作用換句話說當見分發生作用時自證分便給以證知安慧基本上繼承了難陀同時吸收了陳那之所長把二分說三分說同攝大乘論辨中邊論中的唯識說融合一起雖然他的說法還是三分說但他用辨中邊論開宗明義第一頌的意思認為識法分別只是虛妄分別在此分別上的見相二分即二取見分屬能取相分屬所取是遍計所執性都是不實在的所以謂之二取無這與難陀說法不同只有自證那一分才是實在的屬於依他起的性質所以從心分來說三分說反而成了一分說了安慧關於種子新熏的說法與難陀差不多由於他這種唯識說主張相分不實在甚至連見分也是不實在的亦無行相所以也屬無相唯識說瑜伽行學派的另外一系態度比較自由進取在不喪失無著世親學說基本精神的範圍內對其學說大加發揮甚至對他們的著作在文字上也作了一些改動這比之難陀安慧等古派來說是一個新派所以可稱之為唯識今學這一系的代表人物首推陳那依西藏佛教史家所傳他是世親的門下但玄奘大唐西域記說他是南印人先就有專門弘揚因明學的志願後經文殊的啓示方決定弘揚瑜伽師地論同時兼弘因明記中並未提到他與世親有師弟關係從他的著作看圓集要義論解釋八千頌小品般若的關於三性的講法等等都還是依照無著攝大乘論的規模唐人還傳說他對世親的二十唯識論也有注但已不存從這些可以看出他與世親有些關係但是否師弟就不明確了除上述著作外陳那有關因明方面的著作很多後世將其編成一組稱為陳那八論甚為當時學者所重視義淨在南海寄歸傳中曾說因明著功鏡徹陳那之八論並列舉了八論的名字一觀三世論二觀總相論三觀境論四因門論五似因門論六理門論七取事施設論八集量論這些著作大致都有譯本存在有漢譯本存在的觀總相論理門論取事施設論有藏譯本存在的觀三世論集量論此論義淨曾譯成漢文後佚漢藏文譯本都存在的觀境論即觀所緣論因門論似因門論沒有譯本存下但藏譯中有因輪論一書不知是否即因門論在上述著作中有許多講到唯識的地方特別是觀所緣論就是成立唯識無境的著作陳那說的所緣就是境此境不是在心外陳那認為能夠稱得上所緣的應具備兩個條件一有實體令能緣識托彼而生就是說所緣境必須是實體性的事物還必須能夠引起能緣心攀緣而生二能緣識帶彼相起就是說在能緣識生起以後的分別中要有它的行相這個行相雖然似境但卻是從心中生出來的如鏡顯影但産生影的功能卻在於鏡子本身考究這兩個條件境不會是在心外的實物而在心內是心的一部分心的相分由此看來陳那也是主張唯識說的不過他的說法有其特點相分引起見分見分所得的行相與相分一模一樣因此這個相分所緣也就是內境這樣第一相分是有實體的實在的第二見分也有其行相這種唯識說一般稱之為有相唯識說陳那見分帶行相的說法可以在經部找到淵源相分是實在的主張也與經部之說相關另外在觀所緣論中也講到識上的種子與相分相互為因的關係認為這個法的種子可以存在於那個法上邊那個法的種子也可以存在於這個法上邊再者它對於八識也是混合起來說的統攝之為能緣識而無明白的區分這都是同於經部隨順經部的說法因此後世也說他的唯識說是隨理的而不是隨教的另外在集量論裏他對見相的關係還有所發展他從量人的認識如同以尺量布所以喻之為量的角度來看能緣見是能量所緣相是所量在兩者發生交涉後還應該有個結果這叫量果如以尺量布應有一個知道它長短的結果關於量果的概念並非陳那的獨創別的學派講到量時也推論到有一個量果不過他們把量果都推到心以外去而陳那說的量果仍在心內他認為量的性質是自己瞭解自己這也叫自證這樣從心分來講在見分相分之外陳那又加上量果一分也叫自證分而組成三分說難陀主張二分說安慧雖說三分祇承認自證分是實在的實際等於一分說而陳那則認為三分都是實在的所以他的唯識說是三分說這一系的另一家是護法他也是南印人是建志城一個大臣家的子弟出家以後便去那爛陀寺據西藏傳他在那寺入陳那之門其後併在該寺當住持年事很輕僅二十餘歲他還在中印一帶對外道小乘加以很不客氣的破斥大唐西域記中記載有這方面的故事他在那寺做主持時得到比他大一歲的戒賢為弟子成為他門下非常出色的高足護法在二十九歲那年感到身體不適便退休了離開那寺到佛成道地伽耶在大菩提寺住了三四年修習禪觀與從事著作年僅三十二歲就死了後世傳說他在退休幾年間寫了大量著作現在知道的有廣百論釋他將提婆的四百論分作兩分前分叫法說後分叫論議他注釋的是後分觀所緣論注西藏雖然傳說他是陳那門下實際上是不是還不清楚不過他的說法是與陳那有關傳說他對因明有很多著作內容不詳此外他對世親的廣五蘊論二十唯識論三十唯識論都有注他在聲論文字學方面有很高的造詣義淨傳說他的聲論著作達到了登峰造極的地步學聲明的必須學了他的著作才算到家唐人傳他有雜寶聲明論二萬五千頌好幾十卷可惜這些書都不傳了與唯識有關也是特別重要的乃是二十唯識論釋和三十唯識論釋兩書前者義淨有翻譯後者則為玄奘所獨傳玄奘關於此書有一個傳說護法把三十論釋寫成後並未外傳將手稿交給當地一位信徒囑其得人而傳玄奘去印即得到這份手稿回國後以它為基礎吸收其他九家的注就編譯為成唯識論因此護法此釋在印度反而沒有流傳而成為玄奘獨家的傳譯本了從玄奘所傳的成唯識論看護法的唯識說有了很大的發展比較特殊的看法有下列各點首先他對世親三十唯識頌作了改動中間修改了唯識性的一個頌他將三十頌分為三大段開始二十四頌是一段講唯識相中間一頌是一段講唯識性最後五頌是一段講唯識位這種分法與忠於世親原本的安慧所傳相比較前一段落還很清楚中間一頌與唯識性很不相稱可見護法對此一頌是作了改動的其次關於心分護法主張四分說這是在陳那三分說基礎上引用後出的密嚴經的說法構成的他認為見相二分是一重關係對於心的全體來說這是比較外圍的一部分到了自證就屬於心的核心部分屬於內緣而內緣復有能所能就是證自證所就是自證這又是一重關係由這兩重關係就構成了四分說唯識說發展到四分說算是最完備的了第三關於種子說難陀主張新熏一切種子均由熏習而成後來還有一家護月主張本有不是新熏這都是一種極端的說法護法則調和二家認為種子既有本有也有新熏在發生作用時兩者均發生力量因為本有與新熏的重點都是放在無漏方面護法認為本有新熏都可以有無漏種子就是說他既同意本有種可以有無漏的也同意新熏種也可熏成無漏不過難陀新熏說連帶認為種姓是不固定的而護法卻認為種姓是固定的第四關於唯識的性質問題一般認為唯識的含義是一切法說到究竟性質上屬於識的一類以識為性所以是唯識護法則認為一切法只要不離識就可以不單獨脫離識而存在就是唯識最後從護法的學說裏我們還可以看出這樣一個問題其時那爛陀寺的學風已有轉變護法的主張重要根據都出於較晚的密嚴經經中提到有個超世界的地方即所謂密嚴淨土佛就住在那裏佛身是無形色的是變易身雖然可以被看到但並無形像這種說法顯然帶有密教的色彩護法對這部經很重視這說明在他主持下的那爛陀寺學風已有改變那寺的學風原是對各派學說採取兼收並蓄的態度此時密教開始興起而且也在調合之列那寺除瑜伽行派之外還有中觀派例如清辨佛護就是標榜自己為中觀派清辨雖未去過該寺但寺中也有他的學說密宗那時已有萌芽所以那寺當時已是三者合而為一以中觀為性瑜伽為相密教為密的結合這種調和在護法的著作廣百論釋中答覆清辨不同主張時就有反映在此之前清辨聽到護法學說在那寺很有影響就想找他面決是非比個高低但其時護法已退休去伽耶大菩提寺了他又想去大菩提寺聽說必須實有所得的人才可進入該寺清辨自忖無此資格只得作罷但問題並未解決於是又寫信約護法辨論護法似乎避免同他面談即在此釋中答覆了中觀派提出的疑難有相唯識說和無相唯識說的觀點有很多不同而且牽涉到一個根本的三性問題特別是三性中的依他起究竟何所指在實踐中究竟斷不斷說法有分歧這些分歧的說法先後都傳譯到中國後來學者們不明白其原因因而産生許多誤會例如在玄奘時期即有新譯舊譯異義之爭玄奘譯傳的是有相唯識說因其譯文風格特殊名曰新譯他之前所傳譯的是無相唯識說屬於舊譯二者所宗各別說法當然不會一致於是互相是非發生了許多爭論現在這些資料都能找到可以說明其爭論的真相了但在玄奘當時由於材料不足學說源流不明以至把爭論的原因誤認為是由譯文的表現方法不同而引起的陳那的學說在唯識方面除了提出有相唯識說之外他還從因明的角度來組織學說由於他對因明作了獨立的發揮從而使這門學問另闢了一條途徑本來瑜伽行學派是把因明的重點放在論議一方面的論議實際上對自說加以證明這叫立對於異說加以反駁這叫破談因明祇是為了立破因而是有局限性的陳那對因明的發展即打破了這一局限把它貫串到佛學的全體成功了一種佛家的認識論即量論它不僅用於論議而且還用於如何認識真理實證真理這就包括了他們所謂道行為果究竟的全體大乘佛學中的菩提行也就是道陳那的量論把這些都包括進來加以貫串這是達到佛果的準備等到一切功德都圓滿了便可以證得佛果那時候便體現了所謂真正的量可以稱得起為量者成為真理性的標準了這種說法在瑜伽行派中是另闢蹊徑的晚期大乘佛學竟把它推進成了一條滾滾的巨流陳那關於量的學說散見於他的八部代表作中而最能表示其體系的是最後一部集量論集就是總結合而為一的意思此論即總結其有關量的著作所以題名集量論論的原文不存有藏譯本計二百五十頌有陳那自己的注及另一家的注所以全書的結構在藏譯本中可以具見論分六品每品都先明本宗然後破斥異說為甚麼採取這樣的結構呢因為當時佛家以外各學派也相當繁榮所以在論議中一般都要牽涉到各種異說加上陳那的量論對其他學派的講法又有很多簡別的地方所以書中破外的份量占的比重就很大明宗部份大體上是依照他的理門論的基礎而另加一些補充的陳那量論的要點大致有下述的幾方面一對於量的種類他有一個決定的說法量從認識方面說乃是怎樣得到正確知識的準繩如想知道物的輕重必須加以衡量一樣當時印度各派對量的種類說法極多約可分為六種現比聲喻義準隨生現量是感性的比量是推理所得這是一般獲得知識的方法聲量是諸派各自信仰的聖教如婆羅門一系視為正統的六派都相信吠陀可以為量對它就不必再親自推理了它亦名聖教量或聖言量因為是通過語言而來故名聲量喻量就是類推如我國孟軻好辨他常用的方法就是類推義準即舉一個而準知另一個隨生即一個跟隨一個出現如進房無人即隨知主人不在家後面三類都屬於直接推理的陳那組織量的工作第一步就是把量的種類確定下來他認為六類中只有現量比量才是有意義的其餘各類不能獨立只可隸屬於比量而比量又出現於現量因此他簡別的結果肯定了現比二量二他對現比量的定義還有獨到的看法認為離開概念的為現量運用概念的為比量同時他對概念的構成也有特殊的說法認為概念都不是從正面表示意義而是通過否定一方承認另一方的方法所謂遮詮構成的例如青色的青這一概念怎樣構成的呢就是表示青為非非青由否定一方遮來表示另一方詮這種遮詮說也是陳那量論的一個特點三他對過類作了特別的簡別以前的正理學派和佛學中的古因明師都曾經講到過類辨論中出他人過失時有時所指並非是真的過失但它是過失的一類所以叫過類而且構成為因明中的一大類集量論對此特別作了研究對以前的說法作了簡別專門成立一品名觀過類品以上幾點都影響到以後的量論而且後人對他的說法還有很大的發展護法的學說在那寺弘揚以後對寺學産生了很大的響影那寺不是專講一宗一派的護法主持寺學時主要是瑜伽行派時間雖不太長二十九歲離寺三十二歲死去但門人不少其中且有許多出色人物屬於唯識十大家的勝子勝友智月都是他的學生而勝子尤為著名勝子著有瑜伽論的總釋類似導言玄奘有翻譯藏譯中有勝子的菩薩戒品釋此外還有集論釋玄奘譯本認為是師子覺所著藏譯本說是勝子著三十唯識論注等護法另一著名的弟子就是戒賢三十歲時就很有成就曾代表護法外出破斥外道護法退休後即繼續主持那寺講座到玄奘去的時候他已一百六歲戒賢門下除玄奘外還有親光勝軍也很出名戒賢親光的學問都很淵博在那寺不拘一家的學風熏陶下他們通曉各家各派相傳他們的著作各有十餘部但是傳譯我國的則兩家都祇佛地經論一種親光的一種玄奘譯了戒賢的一種西藏譯了親光釋是在戒賢釋的基礎上加以補充發揮的漢譯本實際上即含有戒賢釋在內玄奘題名親光等造或許已非原來結構而是糅合幾家注釋的但親光是戒賢弟子師弟之間說法想是一致的現在即從此釋來看他們學說上的特點一般講唯識都是從平常人的經驗來談的如果把唯識無境的說法推論到佛地是否還可以運用這一條原則按理說唯識的原則佛地也不能例外否則唯識就不能成立了不過這一方面大有進一步推論的餘地而戒賢親光就是向這方面作研究的研究的結果就表現在佛地經論裏他們研究的依據大概是彌勒莊嚴經論的菩提品莊嚴經論的結構很特殊它採取了瑜伽師地論菩薩地的品名但議論解釋完全是依照別的經典編纂的所謂莊嚴如人的衣飾當然取材於身外的東西打扮的所以論的菩提品也是取材於他經包括佛地經在內來莊嚴的戒賢親光的學說就是依據這一品來推闡的莊嚴經論的漢譯者是波頗密多羅此人或係戒賢的門人在唐初武德年間玄奘尚未去印時來我國傳授那寺學說特別是戒賢的學說莊嚴經論譯出後當時李百藥曾做過一篇序文對菩提品作了提要的解釋他說其菩提一品最為微妙轉八識以成四智束四智以具三身詳諸經論所未曾有可謂聞所未聞見所未見這幾句話確抓住了一品的中心也確是其他經論沒有講過的問題回答了到達佛地以後唯識是怎樣的情形所謂轉八識以成四智的四智即圓鏡平等妙觀成事這是成佛時才有的本來瑜伽行派在實踐上有個特點它不像別的學派所常講的解脫涅槃等等而是講轉依這一說法更把握了實踐的具體的關鍵轉依這一概念也是根據他們理論所知依的依來的所知依原是染把它轉為淨就是究竟了原是迷把它轉為悟這就解脫了莊嚴經論的轉八識以成四智也就是轉依達到最後的結果達到四智的佛地了所謂束四智以成三身的三身就是法身受用身變化身這裏不是每一身都有四智四智加法界四智為心法法界為四智之境適當配合分別構成三身如圓境為法身平等為受用身妙觀成事為變化身兩家對這一點可說是發揮得詳盡之至戒賢親光在此時發揮佛地的學說主要是回答在佛地以後的唯識問題這是反映了實踐的要求當時不論大乘內部或是一般思想界都對這問題有興趣另外密教此時已有萌芽其根源也出於此密教就是以佛為基礎講到現實世界現實世界的人如達到了佛的地步也會達到這樣神祕的境地這種思想都是出於同一的社會根源晚出的大乘經如大涅槃經類勝鬘經類提出了如來藏但在無著的著作中對這一思想沒有好多發揮舊傳世親有一部專講這一問題的著作佛性論真諦譯但此書譯文有許多可疑之處所以後來玄奘一系並不頂信用它世親之後傳說曾注過十地經論的堅慧則對如來藏作了進一步的研究堅慧留傳的著作有法界無差別論武周時譯出究竟一乘寶性論北魏時譯出後一書譯時沒題作者名直到譯法界無差別論的譯者才說也是堅慧的作品但是藏譯本卻說它是彌勒的著作並尊為彌勒五論之一此書有頌有長行並說頌為彌勒作長行是無著作還存有梵本一九五年印度學者曾校刊出版堅慧的這兩部書都是以如來藏作為中心思想的堅慧的名字大唐西域記在介紹那寺著名學者時曾提到過並且是與德慧並提的不過這個堅慧恐怕是指的安慧非上述兩書的作者後來還有人認為北涼時譯出的入大乘論作者堅意就是堅慧書是北涼時譯出的原文約在第四世紀是世親以前的人就不會是注釋世親著作的堅慧了總之堅慧的生平還待進一步考證堅慧的思想鮮明地表現在究竟一乘寶性論裏所謂寶指佛法僧三寶性是講三寶的本質另外還說它所講的都是究竟的說法所以加最上要義漢譯究竟一乘字樣來形容從堅慧自己對此書的命名表示了他所講的很究竟很高深全書所講共有七句七個主題除三寶三句及性外還有菩提功德業而中心在性句上在這句裏他提出一切衆生皆有如來藏這一命題成立這一命題的理由就是認為一切衆生皆有法界法界的法本來指的一般事物此處則重點指一切功德的法拿最高標準來講是佛的功德界就是因在印度人的用法上界字不僅指範圍界限而且有因素的意思因此所謂一切衆生皆有法界因而一切衆生皆有如來藏即無異是說一切衆生皆有佛性堅慧講如來藏的特點在於把勝鬘經如來藏經中的義理尤其是如來藏對般若空性智關係的說法大加發揮並貫串到整個實踐的過程中去在兩部經中把如來藏當作境界既然是境界要使它的功德顯現就得先親證即見到如來藏也就是說有待於空性智的證知這樣顯現出來的功德就是果無著世親的唯識理論後來講得愈加繁密堅慧則一概豫以刊落直接提出如來藏借助於空性智實現功德的說法以此來貫通整個實踐因而不同於無著世親的說法這就為大乘理論開闢了一條新路對晚期大乘發生了相當的影響特別是在法界無差別論裏還以實踐的意義用菩提心來代表如來藏後來密教就直接了當地運用了他的說法此說傳至西藏後又與中觀發生了聯系所以西藏推尊彌勒說他不僅是瑜伽師而且也是中觀方面的重要人物正當無著世親學說日漸擴大其影響的時候同時出現了佛護清辨兩家標榜恢復龍樹提婆的學說建立了中觀學派關於兩家的學說淵源在漢文材料裏僅提到清辨上接青目藏文材料裏則說二人都是衆護的門人衆護即僧伽羅剎藏譯還有僧伽羅剎所集經此人與世友年代相近也是很早的人物了所以說佛護清辨上接青目或者說是衆護門人恐怕都是從學說淵源上看的衆護是一般的瑜伽師不是瑜伽行派當然也是與瑜伽師地說法有關係的人他的著作修行道地經書名與瑜伽師地論是一樣的思想必然也有些相通佛護清辨出自他的系統可以說中觀派與瑜伽行派都是來源於瑜伽師的同一系統不過後來對地字有不同的看法遂發展成為相對立的兩個派別了佛護為中論作的注有藏文譯本譯文不完全並無多少精到的見解似乎整個地用了傳說是龍樹自注的無畏疏再說無畏疏精采之處在後一部分藏文沒有譯出因而此注就更無可取了但是就方法論講佛護卻有明顯的特點自龍樹提婆以來中觀學者都以破而不立為其趨向到了佛護時代因明已有廣泛的運用他也就吸收了這一方法與破而不立精神相結合遂構成就敵論隨言出過這樣一個應成方式這一方式常用的格式是若照你那樣講應該成為怎樣怎樣的反面就是說從敵論的本身指出它的過錯自己並不提出正面主張清辨的學說比佛護廣闊著作也多他是與佛護同為注解中論的八大家之一他的中論注別名般若燈論漢譯是波頗密多羅譯的共十五卷此外他還有通論中觀的著作名中觀心論心樞要之意有頌有釋釋文別名思擇焰論計十一品八千頌藏譯三十卷約合漢文十卷這部書的提要即掌珍論有漢譯般若燈論與中觀心論這兩部書有個共同的特點即方法論上與佛護相反認為不管是破是立都應該自己立量即用因明格式採取比量類似三段論法格式另外他對佛學內部大小乘以及佛學以外各派凡與他的說法不同的一律豫以批判這種批判態度與方法論特點在般若燈論裏到處可見在中觀心論裏更為集中地分出各品加以發揮他對瑜伽行派還特別寫了一大段附在觀涅槃品中論最後一品後面針對三性說專加批判因為三性說是瑜伽行派的中心思想清辨就是從這一要害處開刀可惜這一段被波頗翻譯時刪掉了這可能是因為波頗本人是瑜伽行派感到自己的譯著中出現批評本宗的說法不大好所以就刪去了那他根本不譯這書不行嗎這又牽涉到波頗學問規模的問題當時那爛陀寺的學風是要兼通性相密三方面他於是譯出了莊嚴經論相般若燈論性寶星陀羅尼密表示他是精通這三方面的波頗刪去的這一段藏譯中譯出來了此外清辨在中觀心論等五品入抉擇瑜伽行真實品入抉擇即探討的意思針對瑜伽行派的所謂真實做了專門的批判這些批判包括了瑜伽行派各種重要說法如三性唯識等等此品漢文亦未翻譯但它的要點唐人已集入掌珍論中了唐人還把這一品開闢出來名入真甘露品該品的全文我們過去曾經譯出過日人山口益也有一個譯本清辨的中觀學派與瑜伽行學派不同的主張概括起來集中在下列三個方面一辨三性中依他起性與遍計圓成二性是一還是異由佛家說來一切法均可分成染淨二類是二分法依他起是介乎染淨之間的染是從它與遍計執的關係言淨是從它與圓成實的關係言這樣就産生了各種的議論但清辨根本不相信三性說但是瑜伽行派之說三性有教理做根據前有般若經類後有解深密經要反對三性說對其教理的根據必須作出自己的解釋來才行因此他就提出了依他與遍計圓成的一異問題二爭論的進一步是三性說是按世俗諦還是按勝義諦而言的問題如按世俗言那是自由的多一些名目也無所謂如按勝義言勝指正智義是境界正智的境界就是究竟真理三性究竟是有還是無特別是其中的依他起性三最後因同是從世俗諦或勝義諦出發而所得的結果卻不同因此就又發展到對二諦解釋方面的爭論清辨對上述三個問題的看法是依他起與遍計執是一體的東西在遍計執性外無所謂依他起與圓成實不同所以依他起性染而瑜伽派則認為遍計是染依他起本身無所謂染與不染其次從有無看清辨認為以世俗諦可以說三性有但在勝義諦則都無這叫俗有真無瑜伽派與此相反認為世俗諦為無勝義諦為有因為勝義諦是聖智之所行如果說聖智所行為無未免說不過去了最後講到勝義與世俗的定義時清辨也有新的說法在中論講到的真俗二諦原是指說法言教的格式如講緣起蘊處界就是世俗諦的說法而菩提涅槃則為勝義諦的說法清辨對二諦的解釋已超出言教的範圍而是指境界說的了一般說世智凡智的境界屬世俗般若智聖智亦即根本無分別智的境界屬勝義聖智有根本的也有後得的而清辨認為祇有根本智才是勝義的至於後得智是順乎聖智的但不就等於聖智清辨之說仍來源於後來瑜伽行派所表現於辨中邊論中的思想不過他不完全同意辨中邊論的說法而已瑜伽行派認為此論是彌勒所作清辨則有懷疑因此他的批判就歸結到要取得彌勒說真相到底如何他去找過護法護法沒有接見他他就發願長生要等待彌勒出世面決兩家是非這個傳說出於大唐西域記表明他表面上與瑜伽行對立骨子裏還是與辨中邊論有關因為他的學說有這樣的性質所以後世追隨者還說他與瑜伽行派有微妙的錯綜的關係我國玄奘門下對於護法清辨兩家同異上有各種解釋可參看成唯識論學記中的記載這也有助於瞭解清辨的面貌護法在廣百論釋最後一品教誡弟子品還是答覆了清辨在般若燈論中提出的問題的中期大乘佛學到最後分裂成瑜伽行與中觀兩大派他們自己都說學說淵源可以中經龍樹提婆而上溯到般若中觀學派的清辨還同瑜伽師有關係他也推崇彌勒瑜伽師中世友衆護等人是被尊重的彌勒則更被推崇據說賢劫即我們這個世界已有過釋迦佛在釋迦前有三個佛釋迦後應是彌勒成佛世友衆護等人又都是隨著彌勒而要成佛的甚至同護法辨論時護法說是彌勒的主張他有懷疑還要等彌勒出世面決是非雖然他們的淵源這樣相近但學說的發展越來越有分歧到他們的後輩更是達到了分河飲水不可調和的地步其所以如此原因是多方面的但他們學說的社會根源以及偏於唯心或唯物之不同是諸多原因中最根本的原因瑜伽行派是在笈多朝衰弱時期改變信仰的條件下受到該王朝的支持成長起來的所以它的學說是與笈多王朝相結合並為王朝統治者服務的這種學說必然是唯心主義的如承認當時社會秩序是合理的種姓制度是不可更易的這種思想的表現就是他們堅持五種姓的說法從原始佛學以來就帶有根本反婆羅門種姓制度的精神至此就大相徑庭了中觀派的情況就不同如佛護清辨等人都不是那爛陀寺出身而是來自民間清辨的歷史尚不清楚從大唐西域記的記載看他在社會上的活動似乎不是以佛徒身份出現而常跟數論學派一起作數論派學徒模樣的打扮看來與群衆是較為接近的在他的學說中即含有唯物的因素承認心外有境反對唯識對外境也說是由極微積集而成同時也未看到他主張種姓說如果從與中觀相通的堅慧學說看還是反對種姓說的堅慧特別發揮了如來藏思想主張一切衆生悉有佛性這種思想與當時社會的種姓制是矛盾的但它更符合原始佛學更與群衆思想相一致他們的學說既反映社會根源之不同又有採取唯心或唯物的觀點的區別因而根本上是無法調和的這就是對中期大乘佛學的歸結參考資料王沂暖譯印度佛教史第二三章第二五章一二節成唯識論述記卷一初發論端教興主門梅光羲相宗新舊兩譯不同論略閲集量論本科段內學第四輯大唐西域記卷十案達羅國達羅毗荼園般若燈論序出三藏記集續編卷四成唯識論學記卷一顯宗出體門顯宗部分第六講晚期大乘佛學此期時代約當第七世紀到第十世紀之四百年間在中期大乘佛學的最後階段學說有了很大的發展外表看來蓬蓬勃勃實際卻局限在寺學範圍以內例如先在那爛陀寺後在超行寺對一般社會的影響並不大同時學者的著作也大都具有濃厚的思辨煩瑣的氣味可以說是為著作而著作甚至大家如護法作了三十唯識論注竟然感到不宜公開必須待人而傳雖然傳說此著只落於玄奘之手其間或許有些誇張但從後來印度方面的資料中的確也未發現它在別處流行過的痕跡正是因為這種脫離群衆的思辨煩瑣學風雖在繁榮發展之際就已流露出衰退的萌芽盡管此後還有一段自然發展過程也還有些新穎學說産生但終於難以挽回大乘佛學的頽勢再要繼續發展就得借助於密教那也就是名存實亡了因為密教終究是與印度教的精神合流的這一期從時代上看是從第七世紀前後直到十二世紀末佛教在印度消滅時為止其間依據學說著作的情況還可以給它劃分一個階段著作中表現比較純粹大乘思想的在第十世紀之前還有再後就成為密教的附庸談不上是大乘佛學了所以晚期大乘佛學可以看作是從第七世紀到第十世紀告一段落的第一節時代背景戒日王的統一印度波羅王朝的勃興毗俱羅摩尸羅寺超行寺的建立大乘佛學的密教化當時印度的政治局面是笈多王朝宣告崩潰繼之而來的又是割據的形勢笈多的後裔退到中印一帶稱為後笈多朝到第六世紀末北印中印偏北出現了一個薩他泥濕伐羅的國家開頭幾代的國王情況不清楚第四代的國王名光增逐漸吞併鄰小勢力擴展到五河一帶印度通外門戶他的兒子王增繼位後因無子嗣由弟喜增戒日王接替喜增很有才能把勢力擴展到了中印東印東印位於孟加拉一帶有一金耳國戒日王戰敗了它獲得了很大一片土地一時的統一局面可與笈多王朝相比據玄奘的記載戒日王東征西伐六年之間就臣服五印這話說得有些誇張事實上此國對外擴張不自戒日王始因之不能說六年之間就臣服了五印再說戒日王勢力所及也僅限於中印北印以及西印一部分東南印度始終沒有歸入他的版圖不過應當承認他是創建了一個較大的統一大國的加之他能精兵簡政治理有方因而造成了一段時期的太平景象這時候玄奘正好在印留學親睹其盛從他留下的記載裏我們還可以想見其概玄奘所遇的印度統一盛況一如法顯所遇的笈多王朝統一局勢相同但法顯未能接觸到社會上層因之記載的面就不及玄奘之廣博了戒日王的宗教政策也仿效阿育王對各種宗教一律平等看待他本人是信奉印度教的後來對佛教也很重視那爛陀寺能夠繼續維持那樣的規模就是在他的保護下獲得的其時大乘佛學有所振興一方面是因為戒日王的支持同時也與玄奘在那裏的活動有關當時外學小乘聲勢極盛小乘的正量部把大乘壓得不敢與之抗衡正瀕於一蹶不振玄奘去後破外學小乘挽回了局勢因使大乘再度興起由於玄奘的這番表現所以深得戒日王的敬仰替他在國都曲女城開了長達十八天的盛大法會用來宣揚玄奘的主張跟著還在鉢羅耶伽舉行了無遮大會大會所以在這裏舉行因為這裏是地處兩河之間的平原有很大的廣場玄奘的活動對擴大當時的佛學影響確實有很大的幫助戒日王公元五九六四八年統治的時間不長在位年代為公元六六六四八年在玄奘回國後的第三年就死了他不但政治上是個有才能的人還長於文學在印度戲劇史上有相當的地位他的劇作流傳至今的還有三篇鍾情記瓔珞記龍喜記最後一種取材於佛的本生故事描寫佛在修菩薩行時捨身為人的精神故事說佛曾一度作過雲乘太子據印度傳說有一種金翅鳥專門吃龍雲乘有一次看到金翅鳥要吃一條小龍就要求用自身替代小龍終於使金翅鳥受到感動從此就不與龍為敵了於是龍們皆大歡喜這個劇本有藏譯義淨在南海寄歸傳中也提到過現在有日文譯本我國前幾年有吳曉鈴的譯本由於戒日王是文學家他網羅了一些文人學士其中有一位叫波那的給他寫了戒日王所行讚的傳記他的一生行事由此而得以流傳下來當然玄奘對他的生平記載得也很詳細總之在戒日王時代大乘勢力一度有重振之勢但是戒日王死後印度又回到了割據局面大乘佛學也受到了影響自此以後印度的分裂繼續了約五百年到回教入侵時憑藉其勢力才得重新統一在此數百年間大國互相爭霸戰爭迄無寧日很有點像我國春秋戰國的形勢大概在第八世紀末即分裂了一百年以後出現了比較大的三個國家中印一帶是波羅提訶羅王朝南印從前一直是獨立的此時則確立了較大的羅悉陀羅俱陀王朝東印孟加拉原屬金耳國的一帶成立波羅王朝這三個大國各據一方不斷進行爭霸的戰爭互有勝負其中與佛教有關係的乃是波羅王朝波羅王朝是在金耳國基礎上建立的其地在第八世紀中公元七五年情況很亂民衆推舉瞿波羅做了統治者瞿波羅比較賢明積極安定亂局逐漸形成了和平局面因為這個王朝是由他建立的所以後繼各代都帶有波羅名稱波羅王朝第二代是達摩波羅約公元七七八一年為人十分英武在他治下的四十年國家治理得頗有升平盛世之慨這個王朝的年代很長雖中經盛衰卻維持到十一世紀才為斯那王朝所替代波羅王朝的勢力曾到達了摩揭陀以及曲女城一帶占領曲女城以後在那裏舉行了盛大的祭典慶祝武功參與祝捷的有當時南北印諸侯十二國波羅則屬霸主當然波羅王朝統治者也必然要利用宗教他們對佛教也相當推崇當時那爛陀寺夠宏偉的了但達摩波羅猶嫌其規模不大又在恆河南岸的小山上另建了一座新寺院寺院是以王的另一尊號命名的叫毗俱羅摩尸羅寺超行寺此寺遺跡今已蕩然無存據西藏傳說資料記載規模比那爛陀寺還大中心是一個大菩提佛殿四周圍繞有一八個小寺院其中一半屬於密教的內道部分密教也分層次有內有外高等的屬於核心部分的叫內道另一半屬於密教的外道部分和顯教從這裏也可以看出超行寺是以密教為中心的寺的牆壁繪畫了主持該寺的著名學者的圖像住寺學者經常有一八人執事有一一四人在寺院學習畢業時成績優秀者國王給豫班底達學者學位稱號特別有成就的學者稱守門師後世有六賢門六門指東西南北四門和中央的兩道門之稱由於此寺的興建和重視學習此後凡有名的學者大都出身於此因此它成為晚期大乘佛學的中心寺院以密教為主當然更適應群衆的信仰以密教為方向提倡佛學對統治者也是有利的所以王朝各代對它均豫以支持一直存在到下一個王朝到十三世紀初一二三年才為回教在印度的統治者所焚毀跟著印度的佛教也就消滅了因此超行寺的毀滅也象徵著印度佛教的毀滅後期大乘佛學的性質可以說是逐漸向密教化方向發展最後則完全融合於密教之中密教的發生是在第七世紀初期當時那爛陀寺對陀羅尼就很加重視義淨在寺時已經有了作為密教根本典籍的持明咒藏的編纂並有作為他們傳法誦咒所用的壇場音譯為曼荼羅壇場中供養他們所信仰的神密教的性質逐漸同印度教相接近印度教是婆羅門教的變種婆羅門教原是多神信仰到大乘佛學時期它在民間的信仰逐漸變成一神的崇拜所謂一神就是在例如梵天毗紐遍淨濕婆大自在天幾個神中挑選一個作為信仰的對象崇拜的方法是向神作種種供養持咒念頌等這個時期的大乘佛學由於煩瑣的理論不為群衆所接受為了爭取群衆便採取了印度教的方法這就是密教發生的主要原因那時婆羅門教哲學已經發展到吠檀多階段吠檀多是吠陀達到究竟的意思在吠陀學說以後有奧義書奧義書又發展一步便是吠檀多其時對吠檀多加以闡揚的是商羯羅他的年代大概在第八世紀他注釋了吠檀多經特別發揮了梵我不二的思想婆羅門相信造物主是梵這是大我或叫大宇宙而每個人又有個小我或叫小宇宙那麼梵同我的關係是怎樣的呢以前都認為是梵我不二但關於梵我不二的內容卻有種種說法商羯羅在注釋中提出了自己的主張說梵我不二是一元的關係就是說梵我完全一體還說人們由於無明便把小我從大我中分化出來了但這是幻像如果有了智慧一旦認識到我就是梵就會同梵重合為一那時便得解脫這種說法與婆羅門原來相信的梵大宇宙的主宰我小宇宙的個體並非一元的主張就很不同了而且商羯羅採取了佛家的許多說法例如梵我的分裂出於無明小我如幻如化等還說看的真便是真看的不真便是假也是採取佛家空及二諦的說法另外吠檀多經裏有一段批評佛家的話因為文字簡略究竟批評的是哪一家說法不一商羯羅在注釋中則肯定了是批評瑜伽行派唯識說的這樣他本人的立場就很明顯是中觀派的了商羯羅是一個很有才能的人生在南印度信仰印度教著述很多他立說巧妙吸取了佛家的長處學說曾風行一時他的足跡遍歷五印到處都得到大量的信徒並在各地替他建立根本道場大的有四個後來他成為這一宗的宗主了他這一宗以後又分成了十派勢力越來越大如用他的理論組成的濕婆派就是一大派最後他死在北印度由於商羯羅的影響大世人對他很崇拜因此産生了不少的神話佛教方面也有關於他的傳說這也影響到佛教的本身以至後來印度教批評他是一個僞裝的佛教徒事實上他對佛教確實産生了影響由此開了中觀與密教相結合的途徑密教即以中觀思想為中心而使中觀勢力大為抬頭後來印度教還有變化把濕婆的配偶女神突伽作為崇拜的對象構成性力派這一派相當墮落完全以男女的貪欲行為作為宗教儀式公然提倡性欲主張借性力達到解脫而佛教的密教化也與此平行出現了左道密教他們的言行同樣墮落所以盡管還標榜般若但更強調方便肯定煩惱作為方便的妙用肆無忌憚這種學說終於成為印度佛教最後期的主流參考資料潘尼迦印度簡史第九章帝國時期戒日王第十一章印度教的改革大唐西域記卷五羯若鞠闍國條大唐慈恩三藏法師傳卷五王沂暖譯印度佛教史緒言第三十章達摩波羅王之時代湯用彤印度哲學史略第十二章第一節吠檀多論之歷史李榮熙譯佛教在印度的興起和衰弱載現代佛學一九五六年第九期吳曉鈴龍喜記譯本小序第二節法稱月官與瑜伽行派法稱的生平及其著述對於量論學說的發展法稱以後的各家傳承月官著述及其學說瑜伽行派與中觀派的紛爭又與正量部的爭論瑜伽行派的末流陳那學說量論的部分得到法稱一家替他作了很大的發展在中國義淨是第一個介紹法稱學說的人他在南海寄歸傳裏對法稱有重顯因明的評價事實也是如此因明經法稱重新組織發揮以後打開了新的局面西藏方面還將他與陳那並稱為陳那法稱之學同以前的龍樹提婆之學無著世親之學等量齊觀合稱此六家為六莊嚴關於法稱的歷史西藏所傳較詳他生於南印度侏陀摩尼國此國現在地點還不清楚的一個婆羅門家裏據說他在十七八歲時就博通婆羅門學說後來改信佛教到那寺入護法之門護法對陳那的唯識說雖有發展但因明學方面好像未直接涉及而是通過陳那門下天主作因明入正理論的才接觸到陳那的因明學天主在因明的運用上有很大的推進對陳那的說法有好些補充可以說破立的軌式經天主的發展始臻完備護法受其影響所以在運用因明方面也非常細致對陳那的量論學說護法是否也有發展尚無資料可以證明法稱在那寺學習時感到護法在這方面有所不足於是又去陳那門下自在軍處受教傳說法稱十分聰明他學集量論一遍就見與師齊學第二遍便超過老師而與陳那比肩到第三遍終於發現陳那學說上的缺點自在軍覺得他學業優異便鼓勵他為集量論作注法稱給集量論做的注是帶有批評性質的對原書有肯定有補充也有訂正書名即叫量評釋論是頌體集量論原為六品評釋把原書的組織略加變動成為四品集量論開頭有一皈敬頌用量來推尊佛是最能夠體現量的為量者是正確知識的標準法稱大加發揮把這一頌擴大成為一品名成量品他從量量的定義甚麼是量講起直講到釋迦這個人可以成為為量者這一品共有二百八十五頌半接著講現量比量講現量的現量品有五百四十一頌講比量的又分兩品一是為自比量品有三百四十二頌這是對自己來講的屬於思維方面的比量二是為他比量品有二百八十六頌這是自己認識以後還告訴別人的屬於語言方面的比量四品合計共一千四百五十四頌半後來他對為自比量品作了注其餘三品未作後人因為法稱對第三品作了注想必很重要於是把它置於卷首遂把原來的次序改動了量評釋論的梵本早就遺失直到一九三六年印人羅睺羅印度史話的作者在我國西藏霞魯寺發現了梵文的殘本量評釋論的頌文已不完全此外它還發現了注本包括法稱自注和別人的注一九三八年他把這些本子拼湊起來參考藏譯本量評釋論的頌本及注西藏都有翻譯還原量評釋論的頌本校印出版另外法稱還採取前書的一些材料寫了量決擇論份量適中梵本已失只有藏譯又有一本正理一滴是他學說提要性的著作相當簡略印度耆那教也注意因明對法稱學說很重視正理一滴就是它們保存下來的早幾年從耆那教的書籍中發現以後即校刊印出這書的出版引起了西方學者研究法稱的熱潮他們詳盡地討論了這本書此書除有梵文本外還有藏譯本及注本所以最近五十年來研究法稱學說的多取材於此量評釋論量決擇論正理一滴論三書是法稱學說的中心三者內容同屬一類不過詳略不同另外法稱還有幾種專題研究的書如對比量的因在比量方面因是重要部分他就寫了因一滴論又如觀相屬論討論邏輯關係關於概念方面的書成他身論關於怎樣認識別人存在的議論正理論內容像集量論中講過類那樣此書有梵本及藏譯本都是補充上述三部主要著作的前三書是從總的方面講的後四書對其中的特殊部分作了專門的發揮前者可以說是他學說的身子後者相當於四肢合起來統稱為法稱的七支論最後四書梵本不全藏譯全有以上是法稱的生平和著作法稱算是一位能文的人但他的量評釋論的頌文卻寫得艱澀難讀可能是由於他過分矜持刻意修辭的結果他本人也有這種感覺後來印人所選詩集十三世紀選的中選了他一首小詩就表示自己的文章是曲高和寡玄奘在印時法稱的著作大概都完成了但玄奘對他隻字未提可能與他的文章風格有關倒是義淨對他作了稱讚這是其時那爛陀寺法稱的因明已占了主要地位的緣故法稱以陳那學說為基礎作了很大的發展特別是發展了關於量的學說這也可說是法稱學說的主要部分這從他的正理一滴論也可以看得出來從邏輯認識論角度講他確有比陳那高明的地方第一法稱掌握了語言與思維一致的原則因而解決了為他比量中一些糾紛問題比量分兩類一為自比量這是自己瞭解事物屬於思維方法方面的二為他比量這是將自己的知識傳授給人或者提出自己主張加以論證屬於語言表達方面的以前認為這兩方面的正確程度可以不一致有時思維正確語言不正確有時語言正確思維不正確法稱對此有所決擇堅持二者的一致性把那些不一致的說法在其量論中都取消了否定了例如陳那承認在辨論中兩家各有自己的理由可以相持不下名為相違決定但法稱否定了它在邏輯上的意義認為正確的思維不可能出現這種情況因此在言論中各執一辭可以並存是不能承認的從思維來講如果是正確的思維必含有決定第二他對比量的格式也作了改革以前佛家通用宗因喻合結五支論式到陳那則改為三支這是很大的進步不單是形式上的簡化實際性質也改動了三支論式的次序是斷案小前提大前提用西方邏輯比較它與現代邏輯三段論式大前提小前提斷案的次序是相反的試舉例明之斷案某處有火宗小前提發現了煙的緣故因大前提若是有煙處就會經驗到有火好像廚房等處同喻若沒有火處一定見不著煙好像池塘等處異喻這樣的結構與西方邏輯的從一般到個別的演繹格式不同倒像是一種歸納法了也與一般人的語言習慣不一致就是說一般人沒有用這種格式說話的法稱對這次序加以改革把喻體的部分大前提提到前面且把同喻異喻分開認為可以單獨使用斷案部分則因義勢已具而常常不說出來試舉一例以同法式與純粹的自性因相結合為例大前提隨便哪種存在的事物都是無常的好像瓶盆等與同喻相似小前提現在聲是存在的與因相似斷案所以聲是無常的與宗相似這一改革不單是簡化了格式同異喻分別獨立宗省略而且也與一般人的思維活動相一致了就是說一般人是用這種格式去思考是用這種格式來表述的思維有了這種適合的語言表述格式就為因明的運用開闢了廣闊的前途同時運用這樣的格式就能使每一個宗又能成為普遍定理從而使論證展轉相續可以無窮開展以上所講是法稱對陳那學說的發展此外還應該指出的是他的成量品他在這一品中詳細地說明了釋迦本人就可以為為量者的道理他認為釋迦是一切智者能夠正確地告訴人們關於四諦的道理也能夠正確地指導人們如何實證四諦知苦斷集證滅修道因為釋迦具有這些能力所以他是一切智者是最究竟地體現了量的人量的一般意義是人們要行動能達目的所必須預先具備的正確知識也可以說是關於對象的正確的瞭解說釋迦是最究竟地體現了量的人當然是說他無所不知無所不解對任何對象都正確地瞭解了這樣就把量論貫徹到佛教全體裏去了陳那早就有這樣作的企圖但從他的著作中還看不出有這個組織來法稱卻在這一品裏實現了陳那的理想這可以說是法稱發展量論的最大成就也是他主要的目的法稱以後繼起弘揚他學說的學者人數很多有直接出於他門下的也有屬於別的師承的可以說瑜伽行學派以法稱之說為一契機從原來主要是單純的唯識學說轉到依量論的解釋來成立唯識理論方面來了法稱一系的因明資料梵文留下的不多但在西藏方面可能由於時傳的較遲地靠近當時印度佛學中心東印孟加拉等有利條件保存的倒相當完備前後翻譯的論著不少而且有所師承從西藏大藏經看法稱之後有好多大家單是注釋法稱七支書的就有十五家著作二十一部其中注量評釋論的有八部這二十一部書如譯成漢文約合四百卷可見分量之大此外與這方面有關的著作據現在人的統計約有六十部左右由於家數多了所以見解就難完全一致從七部書的注家來說依蘇俄徹爾巴茨基的研究可以分為三大類第一類屬於文字注疏方面的可以稱為釋文派這派的代表是出於法稱門下的天主慧量評釋論第三品是法稱自己注的其餘三品是天主慧注的據說天主慧的注寫過三次每次寫完送給法稱看都不滿意未加許可第三次完稿法稱還是不滿意不過也沒有什麼改進的辦法了只好通過留傳下來這部注是對法稱頌本的解釋非常詳細繼之有釋迦慧又在法稱注及天主慧注的基礎上加以擴充作了疏解那就更詳細了第二類不但解文而且要探討原著的義理這屬於哲學邏輯認識論方面的可以稱為闡義派這一派時期前一些的是八世紀的法上他對法稱著作除量評釋論外都作了注正理一滴梵本即由他的注而得以保存下來的時間比他晚一些的有商羯羅阿難陀他作了量評釋論的注但不完全只有部分因為他出身婆羅門所以後來不大稱他的名字而稱為大婆羅門第三類不但解文推義而且還從佛教方面解明教理可以稱為明教派這派的代表有慧護他對量評釋論後三品作了評注並且在每段之間還約要地作了頌附上去提要性質的頌夾在注裏他的注別名廣嚴疏因他有此疏所以後世也稱其為廣嚴師此書梵本也是羅睺羅在西藏發現的早年已校刊出版隨他之後也還有好多出名的如勝者月護閻摩梨這三家也各有自己的見解不完全相同如上所說可以看作法稱學說的三類傳承如果把它們按地域來劃分情況是這樣這二類流行在迦濕彌羅即北方一帶後來回教把這一帶和印度本土隔而為二法上等闡義一派便流行於北方慧護等明教派則流行於東方孟加拉一帶這兩派的說法不同傳承不同流行的地區也不同解文派跟著法稱算是直接地傳承流行在南方法稱是南方人後來傳入我國西藏但在西藏著述是自由的並不拘於一家之言因之對法稱的學說也還有相當的發展在晚期瑜伽行派中還有另外一大家月官旃陀羅瞿民他是公元第七世紀的人義淨去印時正當他的晚年南海寄歸傳第四卷中對他有簡略的介紹說他是東印度人在家佛徒稱讚他為大才雄菩薩並介紹了他的一首小詩內容講毒境之為害尤烈於毒藥云云西藏關於他的材料更詳細說他博學精通內外學說傳說他對世間的聲明工巧佛家的讚頌義理等四類著述各有一八部總計四三二部而他平日對於般若經華嚴十地品入法界品月燈三昧經楞伽經等五部經講述弘揚努力宣傳月官著作漢譯的一部也沒有藏譯的有四十餘部其中過半是關於密教的不過這些著作是否都是他的還可以研究另外屬於讚頌的只一部名懺悔讚屬於義理的關於菩薩地律儀的有菩薩律儀二十論以二十頌概括菩薩戒的內容關於本生的也可說是戒律類有世間歡舞此外還有給弟子們的信名與弟子書是韻文長詩是文藝作品梵本尚存可以窺見他在文學方面的造詣最後關於聲明文字學的著作有多種聲明的根本經典是波膩尼經月官對它有個發揮其說的注解通常稱為旃陀羅記論記論指關於聲明方面的書除了這個大部頭外還有一些講文字結構等的小冊子月官的聲明著作在西藏很受尊重本來印度注解波膩尼經的有八大家傳入西藏的祇兩家月