同時與小乘特別是正量部也有很長時期的爭論據玄奘所傳那時第七世紀小乘佛學中正量部的勢力相當強盛它們曾提出反對瑜伽行派的議論這些議論集中在唯識無境的論點上它們認為唯識無境在凡夫的情況裏還勉強說得過去到了佛地便說不通了這是對陳那護法以來在所緣緣中帶相的說法加以批評據說正量部的反對說提出之後瑜伽行派有十二年未能給豫圓滿的解答直到玄奘去印正量部又有南印的般若毱多智護作了七百頌的破大乘論重新提出破大乘的說法當時那寺準備派人去當面辨論但去的人表示沒有信心當時玄奘也參加了並自告奮勇充當辨論的代表說我是中國人辨論獲勝自無可說萬一失敗對那寺也不會招致影響最後因其他原因玄奘沒有去成卻專門寫了一部一千六百頌的制惡見論反駁正量部相當徹底因而引起了戒日王的重視特為玄奘召集了一次盛大法會邀請各地的內外學者參加讓大家討論批評結果竟無人發表異議這樣便將正量部反對說壓服下去了這次辨論的具體內容沒有詳細的資料可資印證制惡見論的梵本已佚玄奘回國後又未譯傳祇在窺基的唯識三十論和因明入正理論兩書的注疏中簡單地提說了一些情況不過從中還是可以窺見一點消息瑜伽行派遭受攻擊的是帶相的說法說由帶相才可以為所緣緣所以心境在內而不在外窺基在注疏中還提到在大會上沒有提出制惡見論全文祇是三支比量也叫真唯識量三支比量全文見窺基的入正理論疏並有窺基的解釋從這些資料看正量反駁的就是關於所緣緣的說法在大乘看來如果一種境界在心上有其行相這個行相就是心內作所緣緣的那部分心內的境正量部主張心外有實境心對它的認識瞭解是直接發生關係的而帶相說認為心不能直接取境需要在心上變出一個外境的相貌來心境之間多了一個中間環節正量部反駁說這在凡夫境界中還勉強說得過去到達佛境根本無分別智時是與境界的實體本質直接發生關係的所謂親證決不會有另外變出來的行相這時候就不能說是帶相了因此它歸結說唯識理論祇限於根本無分別智以外的部分按理認識應以根本無分別智所得為最高標準唯識說既然被認為祇勉強在凡夫境界適用對最高標準無用這不就被看成是無用的學說了嗎的確這一非難相當有力擊中了唯識說的要害瑜伽派經此一擊弄得十二年不能開口玄奘提出了新的解釋才解了這個圍玄奘把帶相的帶與相作了兩層新的說明一所謂帶並不限於變帶一義還有挾帶一義有時候因變而成帶有時候也可以由挾兩物相並而起而成帶在根本無分別智親證真如時是親切的理解認識的同時便挾帶著行相無相之相一道起來二所謂相可以就相分方面說也可以就見分方面說而唯識家之說行相是側重在見分方面的所以盡管是根本無分別智瞭解境界的本質也應該有行相不過這行相是無相之相是無分別的行相雖無分別但仍有其理解的行相正量部由於不瞭解帶相裏有這些內容所以提出了質難當玄奘重申行相的意義時他們便啞口無言了至於在法會上提到的唯識量窺基在因明入正理論疏中並未將上述的意義直接表示出來祇說唯識的意義就是境不離識離開識別無單獨存在的境唯識量的精神就表現在這一點上想來唯識量的說法也就是制惡見論的中心說法它把論文的要義用比量的格式提出然後圍繞比量解釋其它議論清辨的掌珍論就是這樣的體裁開頭以兩個量為中心全部論述即圍繞此中心而開展制惡見論的體裁可能也是如此以唯識量為中心與正量部辨論有關瑜伽行派的說法正量部破大乘不僅破瑜伽行派對中觀派同樣破了玄奘著論一定也有反駁但這方面的內容更弄不清了這場爭論以瑜伽派得勝而暫告平息當時法會上是沒有異議了事實呢爭論並未根本解決義淨去印度時正量部的勢力也還是壓倒了小乘其他各派的瑜伽行派的學說到了戒賢親光的階段可說發展到了頂峰後來雖然還有些學者出現也不過是重復先前的觀點並無創見這些學者在玄奘時有智光繼承戒賢主持那爛陀寺義淨時有寶師子等他們都沒有留下甚麼著作在西藏所傳人物中八世紀時有律天一家他的學說來源不明但著作不少對法稱的因明著作有多種注解體裁屬於釋文一派在文字上作了詳細的解釋另外對唯識的有關著作觀所緣論二十唯識論三十唯識論等都有注三十唯識論解釋的是安慧注二十唯識論則是解釋世親本人的注多屬消文釋句無何發明不過看出他是跟著安慧走的屬安慧系統例如安慧講唯識是一分說認為見相二分都是遍計所執的性質都不實在祇有自證一分是依他起性質才是實在的律天也如此主張另外講到量安慧是講三種量承認聖教聲量是獨立的量與陳那祇講現比二量的不同律天盡管解釋的是陳那法稱的書但還是按安慧的三量說講的到第九世紀安慧還有再傳弟子勝友以及相信安慧說而與勝友同時的施戒他們去西藏後譯了大量的瑜伽行派著作也是以安慧說為主由此可以想見印度後來瑜伽行派的末流恐怕祇是安慧一系了護法之說反而默默無聞安慧一系也祇是注解舊說對於當時的中觀派小乘正量部等不同說法和提出的責難在他們的著作中既無反映也未辨護這表明此時瑜伽行派完全喪失了生命力了參考資料王沂暖譯印度佛教史第二十四章戒日王時代第二十六章法稱時代第二十七章瞿毗旃陀羅王時代呂澄佛家邏輯見附録林志鈞藏譯印度佛學論著目録載現代佛學一九五三年第二