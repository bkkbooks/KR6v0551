body:
  text: 印度佛學源流略講緒論一內容本講只能是印度佛學史的雛型為將來構成一部印度佛學史做準備因此講授時是想提出印度佛學中的主要學說及其發展歷史試用馬克思列寧主義的觀點加以說明但限於個人的水平也只能是一個嘗試一種學說的産生都有它的社會根源和為一定的階級利益服務的佛學也是如此它反映了一定的階級利益因此必須說明它的社會根源同時佛學與其他學說一樣是一種社會意識形態又有其相對的獨立性每種學說在它的歷史發展中總是對其先行學說有所繼承與批判對其先行學說的體系加以肯定或者否定這就是它的歷史根源佛學與佛教是密切聯繫的這就決定了佛學對現實存在是遠遠落後的保守的其表現就是它的變化不那麼明顯佛學的歷史根源的意義要突出些它不一定和社會現像平行它有自己學說的源流要從源流方面來瞭解其本質佛學總的發展要從印度全部哲學史上去看一般說哲學史是唯物主義和唯心主義鬥爭的歷史印度哲學史也不例外以前西方的和印度本土的資産階級學者們認為印度哲學與西方哲學不同它的發展不是唯物主義和唯心主義的鬥爭史這是錯誤的佛學的位置總的說是緊靠在唯心主義這邊的佛學中雖然有些學說脫離了宗教拘束似乎是純哲學但它是從宗教中産生的對宗教總是徘徊留戀終究擺脫不了它的影響所以佛學的實踐部分宗教意味很濃這就規定了佛學的唯心主義的本質佛學在發展中受到別的學說以及社會的影響因而産生了各種派別構成了各式各樣的唯心主義體系內容是比較復雜的不能拿單一的唯心主義類型主觀唯心主義或客觀唯心主義去理解而要進行具體的分析例如晚世佛學在印度分成四大宗小乘有部婆沙經量部大乘的中觀和瑜伽行這四宗可以說概括了印度佛學的全體其中小乘的唯物主義因素就多一些大乘的唯心主義氣味就濃厚得多這四宗有個共同的中心的範疇哲學上叫概念佛學叫名言他們對它的看法就不同有的認為是實在的有的認為是虛假的如同中世紀西方經院哲學的唯實論和唯名論一樣大乘的唯心主義色彩很顯著但大乘兩個派別的看法又不同中觀派雖然不明白主張概念不存在但認為概念是假的瑜伽派則認為概念是實在的根据瑜伽對實在說的堅持程度可以把它看成為絶對的唯心論者不過瑜伽派後來又有所演變不把概念看得那麼實在了所以其中變化交錯總的雖是唯心主義而形態又各有不同目前要編寫印度佛學史是有一定困難的佛學本身的體系復雜是困難的一個方面同時印度佛學産生的社會根源一時也很難弄明白因為印度的國土大歷史久歷史上統一的局面都是短促的只是在阿育王時期形式上有過一次統一以後就沒全部統一過並且南北印度的情況也有不同現在資料缺乏對它們的社會發展還有許多不明瞭的地方如它們的奴隸制社會沒有得到應有的發展甚麼時候進入封建制社會的也不清楚加之佛學學說自身的資料還沒有整理好要著手編寫佛學史確實有不少困難現在只能講述其主要學說的一些要點以求得初步的解決二資料關於佛陀時代的第一手資料印度保存的很不完全僅有巴利文三藏一套其中經律兩部還較完備論就不全了而這也只是許多部派中一個部派的學說這樣就只能利用譯本漢文譯有四阿含是從各部派雜湊起來的律和經多些論也不完全又由於是歷代積纍補充的並非原有的面目所以要從它尋出佛說的原始意義還需待一番分析功夫以後大乘小乘的學說印度還保存了一些但也不完全印度人還從漢文轉譯了一些回去其次佛典以外印度六派哲學經典中有許多批評佛教學說的材料也可把它們作為原始資料看待只是這類資料無時代先後與派別源流的標志運用時要加以分析考證西方和印度一些學者很重視這部分資料他們分佛教為四大宗根據就出在這些資料裏學術史上比較重要的是關於一家一派之淵源時代作者生平師承授受等等這類資料印度保存的不多而且極為零碎倒是漢文藏文的譯本和撰述裏可供參考的還多一些主要的如一譯家傳說像高僧傳的譯經篇各傳內或者譯本的序或記中就相當豐富二求法者的見聞録像大唐西域記南海寄歸傳等即留存了很多關於學說本身發展的寶貴材料三個別學者的傳記像馬鳴菩薩傳之類藏文有關於印度晚期學說情況的八十四成道者傳等都甚有價值西藏文中有兩類書一類叫宗義的集本是關於學說本身的闡述一類是教法之淵源是關於學說歷史的記載後者都有成部的撰述很有參考價值著名的佛教史學者有三家布敦公元一二九一三六四年多羅那他公元一五七五年多氏受了外蒙古哲尊丹巴的尊稱他轉生的第一代生于公元一六三五年所以他的死年應在該年之前勝巴公元一七二一七七四年布敦著有善逝教法史西藏把它放在大藏經的前面作為序言看待有英譯本多氏著有印度佛教史比較詳細特別是關於東印波羅王朝斯那王朝波朝共十四代斯朝共四代兩個時期的密教記述得頗有系統有德文全譯本英文零譯本日文零譯加注本漢文王沂暖的節譯本等勝巴著有如意寶樹史有印度人的校印本但三家的著作大都是憑傳說寫的年代也很混亂此外中西學者關於印度佛學史的著作除我在舊著佛教研究法中所列舉者外還有法國萊維的印度文化史日本山口益有譯本從古代一直敘述到貴霜王朝日本宇井的印度哲學史大谷大學教授龍山章真的印度佛教史大學課本中村元的印度思想史等等都可參考關於印度一般社會發展的歷史著作有印度人民的歷史和文化也可以參看其他有關的印度文學作品等都可以綜合地加以利用三年代研究學說史一開頭都會碰到年代的問題在印度這一問題尤為突出因為他們的古代歷史沒有完備的記録雖有少數往世書只記載了歷史的傳說難以憑信公元前五六世紀印度與西方國家有了商業往來後來希臘人從波斯侵入印度的西北因而當時希臘人留下了記載孔雀王朝時代希臘派遣使節至印度也留下了一些記載此外印度還有考古資料如碑銘等他們的古代史就靠這些零碎資料來編寫自然不可能完備年代也就難以攪清楚至於佛教的歷史不但不能靠古代印度史來定相反印度古代史還得靠佛史的年代去勘定所以佛教的年代問題也相當復雜佛教傳下來的一般資料都採用佛歷紀元算法是從佛死之年開始與公元以耶穌之生紀年者不同世紀也是以一百年為計算單位頭一個百年應為第一個百年在翻譯的文獻上不加第字因而容易引起誤會如龍樹生於佛滅七百年并非生於整數的七百年只是在七百年這一世紀的範圍內出三藏記集等的紀年就是如此佛滅的年代異說甚多總計起來約有六十種西藏地方就有十四種其中有些年代實際上已經在通用有兩種說法特別具有代表性一是南方各國斯緬泰老柬等國的佛滅於公元前五四四年說認為佛滅在四五月份由第一年的四五月到第二年的四五月為佛滅後的一年因為有這跨年度的情況也可算為公元前五四三年二是我國蒙藏地區黃教的公元前九六一年說此外在我國內地有以佛誕為紀元的為公元前一二七年說這是唐代法琳根據僞書周書異記的記載在其破邪論中引用的我國還相信過一些傳說的年代並流傳到日本為日本一些教派所遵信這些年代的一個總的特徵都是憑傳聞而來沒有甚麼根據五四四年說潘尼迦的印度簡史牛津大學寫的印度史都曾採用九六一年說還是解放前西藏地方政府頒布歷書的依據一二七年說內地實際上也在通用各國學者對傳說的考訂結論也不一致在西方可以作為代表的有六說最早的是公元前四八三年說英國蓋格爾此外有四八年四七七年四七年四一二年等各說最遲的是公元前三七年說寇恩在日本具有代表性的是宇井伯壽的公元前三八六年說他被認為是日本佛教界的權威在他編的印度哲學史即用這個年代宇井之前還有小野玄妙三八四年說林屋友次郎五八四年說學者們的根據都是以阿育王即位年代來勘定的因為阿育王的即位是有可以憑信的資料加以考證的這就是阿育王留下的法敕那些刻在摩崖上的法敕大都保留下來了其中第十三章的內容是阿育王即位十一年後派遣使節到地中海周圍五個國家敘利亞埃及馬其頓克萊奈愛毗勞斯去傳法的事五國國王的名字都有記載於是根據五王同時在位的年代是公元前二六一二五八年即可算出阿育王的即位年代然後對照南傳佛滅后二百一十八年阿育王即位說與北傳佛滅後第一百年阿育王即位說無具體年數有說一一六年的就有由佛滅到阿育王即位相差一百年的兩種說法出現有四八三年三八四年三七年等異說我們採用了另一種資料即點記說出自歷代三寶記卷十一見大唐內典録卷四前齊善見律毗婆沙條引用佛教有一個制度在雨季時安居教徒在一固定的地方安居三月後舉行誦戒然後在戒本上點上一點以記年佛滅的第一年教徒就安居了據齊譯善見律毗婆沙記載永明七年公元四八九年七月半共得九百七十五點年這比其他的傳說可信一些因為第一它有那麼多點有確實的年代可查第二學者們考證阿育王在佛滅後二一八年灌頂即位而與用獨立史料考證阿育王最下限為二六八年年也兩相符合這一說法日本在一九三四年舉行佛誕二千五百年紀念即已使用年事前他們做了兩年的專門研究由高楠為代表渡邊海旭作了調查研究不久渡邊逝世由增谷文雄繼續負責寫出了一份專門的調查報告書在印度最初寫歷史的是英人他是採用的五四四年說印度人自己編寫的印度人民的歷史與文化就採用了四八六年作為蓋然性的年代五四四年作為傳說的年代我們在一九二三年的佛誕二千九百五十年紀念時即編製了一個年表確定採用四八六年說大大地早於印度也早於日本四方法我們採用一般哲學史的研究方法哲學史發展的規律一般認為表現在第一具有一般社會學的規律包括每種學說史之發生與發展一定要受社會經濟的制約以及對階級鬥爭民族特點國際條件等的依賴性第二哲學的特殊規律性即與哲學基本問題相聯繫的唯物唯心的鬥爭和發展與方法論相聯繫的辨證法形而上學的鬥爭和發展以及與自然科學發展相聯繫的理論表現形式之發展等等佛學也具有這些規律但還有它自己的特殊性這表現在第一佛學對像的中心範疇是真實或稱真實性真性它是就所知境說起的而所知又不僅是感性的還是理性所緣的對象因此真實與所知之間的關係必然包含思維對存在這一哲學問題不過表現的方式不同而已佛教講的境行果三個範疇都是互相聯繫的其哲學思想主要表現在境這一範疇的說法上質言之就是它的真實性問題可以說佛學發展的各主要階段真實這一範疇的發展就是佛學學說的發展大乘到了瑜伽階段對此有過總結即辨中邊論的第三品辨真實品它歸納歷來的說法為十種可以從中尋出這些學說的不同傾向和發展線索第二在佛學界對觀察真實這一問題