繫在一起的據他們看來淨善就是真染惡就是妄檢驗真與僞的尺度是道德這就是佛學的真實的最根本的意義整個佛學都以此為基礎祇在各個發展階段上有不同的表現形式而已到大乘中期曾有人對真實作過專門的總結這項工作是由辨中邊論辨真實品來完成的它歸納自己學派以前有關真實的說法共計十種最後它把這十種說法通歸結為三性的真實第二印度佛學全體的基本精神是奠定在緣起說基礎上的從緣起理論加以推衍跟著就有無我的說法所謂緣起就是說任何事物都不是單一的獨立的存在而是和其它事物相依相待的從這種理論出發必然會得出無常的結論來因為事象祇要有一點變化那麼與此相連其它事象也就隨之變化所有事物永遠在變時時在變這就成為無常的了但是就人之常情言由於自然生活的要求卻總希望能夠保持常恆常的要求與變化不居的事物因而有了矛盾矛盾不得解決便會招致痛苦於是佛教的根本教義無常故苦由此而生這種苦惱就是不自在就失去了我的意義因為所謂我就是自己能夠主宰既然不自在也就是無我的了對人說來是如此對事物說來也是如此事物時刻在變也不能說它有一定的自體這就是法無我堅持人法二無我的理論就構成了佛學的基本精神也是佛學所以區別於印度其它學派的根本之點當然在一千餘年發展中佛學內部對緣起說的理解說明是不一致的甚至出入很大例如犢子部正量部就有人我的主張又後來大乘佛學發展到瑜伽行派時他們從緣起方面而說法有自性因而得出三自性依他遍計圓成的理論這就似乎有法我的主張這些都是出入但是就在他們似乎承認人我法我的同時也還有這樣的說明即盡管說人法有自性仍與其它學派把人法我建立在常住唯一不變的基礎上的說法不同他們所以主張人法有自性是有其實踐的目的如犢子開頭提出人我說其實踐意義是出於道德的責任感為了使業報不落空就必須承認有承擔業報的主體自己造的罪過總不能讓別人代受報應由於這種道德上的責任感這就是人我說的實踐目的法我的主張在認識領域內也有它特別的意義必須劃清事物不同的界限與範圍以便利於思維活動的開展否則思維就會處在一種完全捉摸不定的狀態中這好像形式邏輯之用同一律盡管前後的事象不可能完全一律但為了便於思維開展必須把概念肯定下來使其具有一定的意義所以就佛學的基本精神來說是無我而有的主張似乎有我也無非是由於他們的實踐要求而造成的第三佛學中有關認識論的問題佛學中所指的對真實的認識不同於一般的思維活動一般的思維活動他們稱之為識或了別對真實的認識則稱為智慧即般若智慧也不是脫離識的什麼特殊的心理過程不過是比識了別更有限定的範圍即不過是把識了別加以精煉而成佛學的前後發展中對智慧的形式和內容有不同的說法到大乘佛學階段便提出了無分別智來所謂無分別並不是不要分別而是指去掉不必要的分別去掉在道德修養上無益的有害的顛倒的分別並且在達到這種無分別境界前後也還有許多活動的過程和形式自然後來學說的發展對這方面的發揮更為詳盡瑜伽行派的顯揚聖教論裏列舉了九種不應該分別的事情即所謂九不思議事認為對這些事的分別與他們的實踐無益攝大乘論裏主張離開五種無分別比如睡眠狀態是無分別而這種無分別完全處在什麼也不知道的狀態是應該離開的無分別智的無分別與睡眠狀態完全不同顯揚聖教論說要離開不應該分別的攝大乘論說要離開類似睡眠狀態等等的無分別這些說法的共同精神都認為認識應是高級的智慧活動兩書的說法都有助於我們正面地去瞭解他們的學說第四關於佛家的認識論還應該注意的是陳那法稱的量論對真實的認識應有般若的智慧這在大乘後期到陳那法稱階段他們的量論正是側重於這方面的學說發展到這個階段與無分別智的內容有關係的議論就相當豐富了大乘學說最初提出無分別智來隨之就探討這分別的來源認為分別的來源就在於戲論所謂戲論是他們形容思想上的某些概念名言意言在他們看來有一些概念常引起染惡的身心活動對於他們的道德實踐有害無益所以他們把這些概念叫戲論既然戲論相當概念這裏就産生了矛盾概念是人的思維活動的必然階段現在說它是戲論是不能認識真實的那麼概念在我們的認識中價值究竟如何概念的認識是否不能或者妨礙對真實的認識呢大乘佛學對於這些問題曾經很含糊地講過但不徹底到陳那法稱的時候發展了量論才對這個問題講透徹了他們對概念的構成性質在認識真實過程中如何運用概念等都作了適當的解釋所以從這一點看印度佛學對認識論是有一定的貢獻的以上幾點就是印度佛學前後發展的脈絡另外印度佛學從其道德實踐要求出發一上來對哲學問題即對思維與存在關係的問題是不加理會的在他們看來主要是應該求得解脫至於哲學一類問題則非當務之急同時當時其他學派對哲學的討論議論紛紜莫衷一是既在理論上得不到什麼結論在實踐上也得不到什麼現實利益所以佛家認為這類空談還是置之不問為妙後來向前發展他們也逐漸地涉及到整個人生宇宙的範圍因而對哲學問題也就不能不管了一般說來印度的哲學除順世派唯物主義者外多傾向於二元論佛學當其發展到談哲學問題時也傾向於二元論說他傾向於二元論就是說他並不真是二元論他的哲學基本路線毋寧說是唯心論的他們受實踐要求的限制認為理想的境界可以由心來實現人的行為可以由心來作主不受自然社會的影響和支配這種由心說的唯心論可說始終貫串在佛學內部的各個學派大乘如此小乘也如此不過少數部派例如正量部唯物主義因素比較多一些它甚至與唯心傾向更濃厚的瑜伽行派作過鬥爭但其主流還是唯心的所以印度佛學發展雖然時間長流傳範圍廣但在其內部並未展開唯物唯心兩條路線的鬥爭應該說是以唯心路線貫徹始終的從前有人懷疑好像佛學自身很復雜似乎可以分成唯心唯物的路線但按其實際是看不出這種路線鬥爭的參考資料潘尼迦印度簡史譯本第十二章十三章前半一四五頁止王沂暖譯印度佛教史第三十三十八章略閲呂澄校刊本成就八十五師禱祝漢譯藏密三書本又同本導言頁附録談南傳的佛滅年代現今南方上座部佛教通用的佛滅紀元基本上以佛滅於公元前五四四年計算這一佛滅年代說從我國佛教歷史文獻上看並不是太生疏的早在一千三百餘年前玄奘遊印歸國便已傳來了有關的說法並還相當重視這就是慈恩傳卷三所載玄奘在拘尸那地方聽到的四種佛滅年紀的第一種傳文說自佛涅槃以來或云千二百歲或千三百或千五百或云過九百未滿千年在這裏四說平列好像無所軒輊其實放在第一位的千二百年說法是玄奘認為比較可信的因而那時親近他的道宣道世兩位受到了啓發在他們的著述裏都曾想依據這一說法試算出佛滅以來精確的年數像道宣的釋迦方志卷上便記載他計算的結果說至今貞觀二十年則經一千二百一十二年矣此依菩提寺石柱記也道世的法苑珠林卷二十九又舉出另一種算法說至今龍朔三年則經一千二百年此依菩提寺石柱記也我們首先從道宣道世兩家特別聲明奘傳第一種佛滅年紀出於菩提寺石柱所記的一點明白了這年紀的地方性菩提寺就是印度摩揭陀國的摩訶普提僧伽藍依據西域記卷八和法苑珠林卷二十九所引王玄策行傳這僧伽藍是公元第四世紀中師子國王功德雲施款建築作為他國內僧人來此展敬聖跡時住宿之所那伽藍裏後來有了關於佛滅年代的石刻當然是採用南方所說自不待言其次我們從兩家算出的年數不一致這點看又理解到奘傳所說千二百年原來不能照字面講以為玄奘得著年紀之年便恰恰滿了二百的整數另外有它術語性的意義依照印度佛教史家用佛滅紀元的慣例都是以每一百年為一紀來計算譬如從佛滅後一年到一百年即用術語稱為第一個百年漢文翻譯也略稱為一百年又從佛滅後一百一年到二百年術語稱為第二百年漢譯略稱二百年以下類推奘傳千二百年一語正是這樣用法它只表示那時為佛滅後第十二個百年並未指出確定的數字由此道宣和道世才會同樣地依據它卻算出了不同的年數在這裏道宣誤解了奘說以為玄奘到拘尸那之年即貞觀八年恰當佛滅後千二百歲所以在貞觀二十年計算便加上了十二年那時筆受撰述西域記的辨機也有同樣誤會以為撰記那年已超過千二百之數就寫作自佛涅槃諸部異議或云千二百餘年其實這個餘字是不應該加上的那麼菩提寺石柱所記佛滅相當於公元何年呢或者就依道世算法以玄奘到拘尸那的貞觀八年為佛滅後千一百七十一年推算上去可不可以呢我們以為這一數字的來源還缺明瞭不忙輕信要解決問題只有另尋線索恰好西藏的文獻裏便存在著極重要的資料可供應用據布敦的善逝教法史說在公元十三世紀之初喀切班禪釋迦師利曾傳入一種佛滅年代於西藏以為當那時丁卯年公元一二七年佛滅已過去了一千七百五十年這樣上推佛滅年代為公元前五四四的丁巳年但在西藏史家用藏歷推算常作為公元前五四五的丙辰年當時薩迦班禪就指出這一年紀發源於大菩提寺他並還提到這是從前尊成就主和作福主兄弟倆發願為菩提寺造像而感得栴檀瑞像才特別記下了當時佛滅已過了若干年後來印度迦濕彌羅尼泊爾等地學者都信用了它為佛滅年紀但在薩迦班禪本人卻批評它計算錯誤難以置信詳見善逝教法史英譯本我們以此說對勘王玄策行傳法苑珠林二十九所引記載的菩提瑞像緣起正是大同小異出於一源從而可知當時菩提寺銘刻的佛滅年代即公元前五四四年的那一種而玄奘在印所得第一佛滅年紀也就是它現在試以玄奘到拘尸那的一年公元六三四年的數字結合起來計算那年是佛滅已過一千一百七十七年所以傳說為第十二個百年即千二百年恰恰合式由於西藏的歷史文獻證明了玄奘所傳菩提寺石柱的佛滅年代即公元前五四四年而此一年代又就是南傳之說所以我們說它早就傳來了我國只沒有留下明確的年數而已在此之外還有較早的一種南傳佛滅年代說也傳播了過來那便是蕭齊永明七年公元四八九年僧迦跋陀羅所傳的衆聖點記見出三藏記集卷十一歷代三寶記卷十一其說隨著善見律毗婆沙的翻譯而流傳又依了律藏末尾的加點而計數善見律毗婆沙早經刊定為南傳律藏釋論即覺音所著的抄譯譯家又稟受南方律師的傳承附帶傳來的佛滅年紀是當時南方通行之說更毫無疑義依那年紀推算佛滅於公元前四八六年善見律毗婆沙說及阿育王在佛滅後二百一十九年灌頂即位近人用佛典以外的獨立史料考定它最下限為公元前二六八年這是依照阿育王即位後十一年遣使所到的西方各國國王同時在位年代而考出現在另用佛滅四八六年說來計算阿育即位之年如合符節地也是公元前二六八年因此這一年紀比較起其他各種來歷史的正確性最高我們也給以最大的信用今人雖也有對於從佛滅到阿育王即位中間為二一八年那一數字表示懷疑這是誤會此數為南方臆造其實乃中印北印關於那時一段時距記憶的普遍反映但並不能否定點記本身的價值兩相比較說來衆聖點記可稱南傳舊說而五四四年紀為新說這新舊的遞嬗是在何時呢近人研究斯里蘭卡史籍的像蓋伊格氏也曾想解決這一問題在他英譯大史的序言裏以為斯里蘭卡流行五四四年紀開始於公元十一世紀中間而在其前是一向遵行從佛滅二一九年阿育即位一論據推出的公元前四八三佛滅年紀用點記的數字計算即是四八六年紀參照他這一說未免粗疏他沒有注意到在我國東晉義熙年間到過斯里蘭卡的法顯就另外傳來當時流行的一種佛滅年紀以義熙七年公元四一一年為佛滅以來的千四百九十七年由此上推佛滅於公元前一八六年見歷遊天竺記此說大概是用佛教史家的加倍計年法實際折半佛滅於公元前三三八年這和玄奘所傳第四種佛滅年紀相符可見在南傳新舊兩種佛滅年紀的中間至少還夾雜著這一說不過在點記和五四四年紀在年數的計算上雖有參差而其間不無脈絡相通之處還是可以尋究的他們計年的差數大體是六十年這便透露了一點消息兩種年紀的轉變也許和印度歷法用木星紀年以六十年為一周的計算方法有關假使一個年代的周期沒有掌握得準確一差違便上下了六十年這在我國佛教史籍裏用甲子紀年計算時有時就會遇到這樣的錯誤譬如宗客巴誕生於丁酉年這本是元代至正十七年的丁酉公元一三五七年卻也有人沒弄清第幾個甲子便以為是明代永樂十五年的丁酉公元一四一七年為此就有六十年的出入從點記的佛滅於公元前四八六年差錯一周為前五四六再移動一二年而轉成前五四四年事實上是很有可能的特別是佛滅年紀這一類容易變動的計算將來如從這一方面深入研究南傳新舊異說中間的真正關係或者能徹底明瞭也未可知現在且不加討論從東晉以來我國佛教和南傳佛教交涉日繁而內容愈見豐富連帶著保存有用的史料也不少現在我們以隨喜南傳佛教的佛滅紀元二千五百年盛大紀念之故談到年代問題舉出一些傳播變遷的往事因緣借以見兩方間正在發展的友誼早就有了深厚的基礎這應該是很有意義的吧一九五六年四月七日初稿略論南方上座部佛學通途所說南方佛學乃指以前由印度傳到斯里蘭卡並逐漸遠播東南亞各處的佛學而言南方這一名詞雖然不太恰當但用來表示這一系統的佛學確有它特殊的性質還是很方便的這一系佛學原來屬於上座部在它傳播的漫長歲月中曾有過一些變化像攙入了方廣道人的理論或者密教的作法可是作為它的中心思想的始終不外乎上座部學說而且後來仍舊是恢復了它的純粹性的現在就全體佛學看來南方佛學可說比較接近於原始佛學值得重視但它謹守上座系統的舊規模不免有它的局限性我們從這樣性質來理解它可以在部派典籍學說實踐等方面分別舉出些特點來說一說第一就部派說南方佛學可算是保有著上座系統中和法藏部相類的面目或者就說它是法藏的南系也無不可根據律家所傳上座部在釋迦佛滅度以後百餘年教團開始破裂時分了出來的是代表保守的一派其後還繼續有分裂所以最初的派別稱為根本上座南方佛學就曾經被看做是這一類當然根本上座部其先曾流傳於印度本土各處像敘述佛學部派最著名的異部宗輪論便說從上座分出說一切有部的時候本上座轉名雪山部依清辨的解釋這因依雪山居住而得名這說明了印度北方雪山一帶原來是上座部流行的重要地區不過其後說一切有部在北方的勢力發展了上座乃逐漸消失因此從無著世親時代公元第五世紀以來即將斯里蘭卡所傳的佛學看成上座部的代表像世親的成業論裏說到承認有分識的上座部玄奘所譯的一本稱為赤銅牒部這就是斯里蘭卡的城市名字用來代表上座部的到了律天時代公元第八世紀更認為整個上座部都存在於斯里蘭卡律天所著異部宗輪論部執略集說上座部分為大寺無畏山祇陀林住三派完全照斯里蘭卡當時的派別而言大概那時候散在印度各地的上座部都已式微了不過南方流傳的上座部學說實際並不純粹是正宗從來印度的佛教史家都看它做上座部的別傳常常用分別說這一名目加以區別有如玄奘所譯無性釋攝大乘論說到上座部稱阿賴耶識為有分識的一段論卷二結論就作如是等分別說部云云而清辨敘述當時公元第七世紀大衆部和正量部所傳的佛學部派另用分別說部的名目概括上座系統中除去說一切有部所餘的一些派別像化地部飲光部等詳見清辨所著異部分別論釋屬於分別說範圍內的南方佛學算不得是根本上座現在我們從南方七部毗曇中論事一書的敘述刊定它學說之所宗特別以各部派爭論得最利害的十個中心問題依成實論卷二十品論所舉說南方佛學是主張一過去未來法無體二並非一切法都實有三四諦可以頓得現觀四一定沒有中有五阿羅漢不退六沒有真實的補特伽羅詳見論事第一品六七八章第二品九章第八品二章又第一品一二章這些主張都和從上座部分出來的化地部相同不過化地最重要的一種主張是佛在僧數它的涵義說佛和二乘聲聞緣覺同一解脫並同一修道而南方佛學反對此說主張佛和二乘修道不同參照論事第八品五章這倒更接近於化地分出的法藏部另外我國蕭齊時僧伽跋陀羅翻譯了南方律論善見律毗婆沙因為論中所譯的戒本很像法藏部的四分戒本所以一向誤認為四分律論這也可證明南方佛學和法藏部是有密切關係我們說南方佛學不妨看作法藏南系其理由在此第二明確了南方佛學的部派所屬以後我們對於南方佛典為何在文字上內容上都和北方的顯然不同也可瞭解它的原因據真諦的部執異論疏吉藏圓測諸家著述所引說化地部分派的原因之一即在於它變更了佛典所用的語言晚世西藏佛教史家也傳說著佛家根本四部上座大衆有部正量用語各別上座部用一種中間語介於梵語和訛略的俗語之間詳見布敦善逝教法源流英譯本這當然指化地部等上座派別而說至於從化地再分出法藏部依照大集經卷二十二說他們受持十二部經書寫讀誦顛倒解義顛倒宣說以倒解說復隱法藏故名達磨法毱多藏由此法藏部的經典對於其他部派的特別是化地部的非但解釋不同並且各部分的次序亦復歧異現在我國翻譯的佛典裏就有大衆部系統的中阿含經增一阿含經又有化地部的長阿含經雜阿含經用來作對照的資料看南方的四部中增長雜經典文字上從音譯的專名說次第上都鑿然各別這應該是和南方佛學屬於法藏系統的一事有關的就這一點如果從南方佛典裏的論藏去看尤覺顯著南方有七部論書它的順序是法聚分別界說人施設論事雙對和發趣這裏面除去論事一種其餘的都相傳為佛說但這些論書的結構很參差裏面好像沒有一定的聯繫從前學者間也嘗將它們和北方佛學裏的各種毗曇做過比較研究大抵認為對於舍利弗毗曇最相類似像日本的學者椎尾辨匡木村泰賢都作此說我們知道屬於法藏部的四分律卷五十四以及律論毗尼母經卷三說到論藏來都列舉有問無問攝相應處所這五分實際即係結構舍利弗毗曇的五個部門所以法藏部的毗曇當然為舍利弗一類而南方佛學由於部派的關係也必在論書方面看到這樣交涉的情形了這還可以進一層去研究根據我國譯籍裏的資料像分別功德論撰集三藏傳等所說最原始的毗曇結構出於佛說而由大迦旃延結集呈佛印可依真諦法師所傳這就是九分毗曇九分名目見圓測解深密經疏所引但文字有訛略處現經考訂應該是戒世間因緣界隨眠慧定業和諸蘊這些都連著分別說而立名如說分別說戒等最初用毗曇方法解釋九分毗曇的至少有兩大派隨文分析的是目犍連系統現在北方所傳施設足論還保存它一部分的雛形另外以義為類的是舍利弗系統現存舍利弗毗曇也可看成它的縮影但這些原本都不存在了我們以為南方論書大體即由舍利弗毗曇的各分發展變化而成這像法聚論人施設論出於無問部分分別論出於有問部分界說論出於攝和相應部分發趣論出於處所部分它們中間的脈絡都比較容易弄得清楚因此我們可以說從論藏方面去看南方佛學和法藏部的關係它們有密切的聯繫是極其顯著的第三就由於部派的限定南方佛學在基本理論上突出了兩個特點一心性本淨說二佛道不共說心性本淨的典據是南方增一部經文增一部一法品的第六節有對舉體裁的兩段大意說心性本淨為客塵染凡夫未聞故不如實知亦無修心心性本淨離客塵垢聖人聞故如實知見亦有修心這樣的解釋心性本淨在佛家各派用分別說方法理解佛說的都相信它祇是對於自性淨心和客塵煩惱的內在關係看法各有不同有些部派以為客塵所染的心便夾雜著染污在離染的時候必須轉變染污部分成為清淨又有些部派以為客塵所染不會影響到心的本質它依舊是離染的所以解脫之時祇是使染污不再生起而已南方佛學同於後一說法主張從離染得解脫見論事第三品三章他們根據這一看法解釋一切乃至最重要的滅諦概念也以為是後有愛的消滅使後有不生見分別論第四諦分別品梁譯解脫道論卷十一五方便品釋四諦段也用此說其次佛道不共說和法藏部的主張相關法藏部執佛和聲聞乘等同一解脫而不同一修道聲聞系等的共同修道是什麼呢依長部中部的經文所說這以四念住為重點從一方面看念住是一行道也是一乘道可以貫徹始終而達到究竟的由此化地部系統都相信道支皆是念住所攝見異部宗輪論但佛道在此以外還有不共的施戒等十波羅密南方經典小部即雜藏的最末一種本行藏就集録了有關各類波羅密的本行事跡具備了後世所謂菩薩藏的雛形這可以證明南方佛學是怎樣地重視佛道雜藏和菩薩藏都是法藏部獨有的經典體裁見四分律卷五十四異部宗輪論述記卷中至於佛道和聲聞等道所以截然兩途在發端時即已有其根據聲聞等始於厭離佛始於悲所以發展就各各不同了南方論事第十八品三章特別破斥北道派所主張佛無慈悲的異說北道誤解悲和貪著為類所以有那樣主張用意即在這上面第四南方佛學對於實踐方法有一套組織完備的說法它的本典大概是種瑜伽類書其先有優波底沙上座的注解題名解脫道論這在我國梁代僧伽婆羅便已翻譯了其後覺音尊者到了錫蘭重整理那部論書並作了解說就是現存的名著清淨道論此論全用當時錫蘭大寺派的正宗學說對於不同說法駁斥無遺像上面提到的解脫道論也在他所破之列他組織的清淨道大體依著戒定慧三學的次序而以定學做中心本來上座一系的學說最有精彩的部分就是定學此學在北方發展為修行道地最後組成了瑜伽師地論那樣的規模而在南方呢也由根本瑜伽論典逐漸結構為解脫道論清淨道論從前玄奘去印度求法的時候就很瞭解這一情況他以為瑜伽學說有南北兩系是應該全部通達的這在慈恩傳卷四裏曾一再提到開頭說是時聞海中有僧伽羅國即錫蘭有明上座部三藏及解瑜伽論者繼而又對著僧伽羅的僧人說承彼國即錫蘭大德等解上座部三藏及瑜伽論今欲往彼參學最後經過玄奘摘引瑜伽要文大節徵問那些瞭解僧伽羅學說的僧人也不能超出戒賢所解的範圍這似乎在北方就可得著它的究竟了但實際上南北瑜伽是有顯著的區別的南方定學從十通處特別是從地遍處入手應用到地色的曼荼羅保存了上座系裏化地立教的宗風這在大集經卷二十二瑜伽師地論卷三十六都提到這樣從十遍處修學一一都能達到四種禪定的階段並且在十遍處以外還有十不淨觀十隨念四梵住四無色食厭觀和界差別觀合成四十種業處隨著學者性格不同這些業處各有所適像貪行的人適用十不淨觀和身至念瞋行的人適用四梵住和四種色遍處等並對欲界色界定境也各有配合像十遍處和安般念通於四禪而除安般身至以外的八隨念食厭觀和界差別觀則限於欲界的外定階段等如此學法比較北方以遍處等作禪定的功德看待的見瑜伽師地論卷四十三顯揚聖教論卷四就更覺具體且切實了另外南方佛學關於瑜伽所依的心法生滅作用等解釋得也很透徹在解脫道論和清淨道論裏都扼要地將平常心思的起伏經過歸納為十二種作用而概括為九類一在平靜的狀態時稱為有分心二動念時生起警覺好像從睡眠醒來一般這叫做轉向心三由此隨著五根有五類感覺作用這都稱為見心四有了見便對境界感受苦樂這名受持心五由此分別善惡名為分別心六又安立了境界的相狀叫做令起心七這樣決定發起作用名叫連行心八假使境界強盛便繼續引起反省或者熏習的作用這名果報心九從這裏仍舊恢復到平靜狀態所謂有分心在唐人的著述裏如唯識樞要等通稱以上所說為九心輪形容它的周而復始地流轉不息即以這九類心作基礎再加以三界三性世出世等區分便有八十九種差別從這上面判明怎樣由散心到定心又怎樣由染心到淨心修道方法都應該順差別心的性類而行所以詳細的分別是有其必要的南方佛學具有比較完備的典據又經過長時期的發展義理是十分豐富的上文祇從它的部派性質上抉擇了一些特徵不過當作研究的發凡而已詳細解說請俟異日原載現代佛學一九五五年第十期略述有部學印度部派佛學裏說一切有部簡稱有部思想的起源是和佛滅度後一些論議師的提倡阿毗曇對法有著密切的關係這一部後來信奉的古典毗曇凡有六種通稱六分毗曇見大智度論卷二也稱為六足論見普光俱舍論記卷一依靖邁法蘊足論後序所說與對法為依故目之為足其中可做建立有部學說典據的要推識身足論相傳此論是提婆設摩天護所造關於六足論的作者本有種種說法祇這一部論漢譯和梵藏所傳資料卻無異辭參照荻原雲來和譯稱友俱舍論疏卷一二十頁提婆設摩的生平無考西域記卷五說他造論的地點在鞞索迦城南大寺或者他就是中印度一帶的人又從論文開始一部分駁斥沙門月連的過去未來無現在無為有說法來看它正對南傳目連子帝須所集論事一書的重要主張而發參照論事大品第六章破一切有論第七章破過去蘊論佐藤密雄等日譯本一三頁以下論事到第三次結集以後才出現那末發表駁論的提婆設摩至早也生存於佛滅後第四百年中了就由這些材料見得有部的思想是在第三次結集前後逐漸成型而它流傳到印度西北地方以至構成獨立的派別大概即以結集終了遣散各家的一事做它的契機到了佛滅後第五百年公元第一世紀迦旃延尼子在至那僕底著發智論參照婆藪盤豆傳又西域記卷四將有部各種學說作了嚴密詳明的組織一派的規模才算畢具此後因流傳區域的擴大更有了迦濕彌羅和各地方的小派別在迦濕彌羅的論師稱迦濕彌羅師餘地的稱外國師健陀羅師西方師這些論師除了發智論外還兼用其他論書像法勝的阿毗曇心論世友的問論妙音的甘露味論等等意見分歧莫衷一是在學風上外國師等也和迦濕彌羅師的一味保守的異趨走上了自由批判以理為宗的途徑及至迦膩色迦王以後公元第二世紀末迦濕彌羅師得著統治階級有力的支持為了更好地排斥異己便發起大毗婆論的結集將解釋發智論不同的說法逐一刊定歸於一尊於是有了毗婆沙師的稱號有部學說發展至此可謂告一段落跟著來的便是新興大乘學系龍樹提婆諸大家和成實論作者訶梨跋摩等的反對在他們的著作裏都對毗婆沙論所說徹底加以批判這自然也影響到毗婆沙師多少會使他們改變一些主張不過現在除了我國梁唐兩代的譯本上發現少數異文而外還沒有詳細資料可舉再後到佛滅九百餘年公元第五世紀世親論師在阿逾陀學通了當地流傳的婆沙論義見婆藪盤豆傳受到自由學風的熏陶終於寫成俱舍論採用經部主張糾正毗婆沙師種種偏頗見解這激起了衆賢論師的憤慨連續著作順正理論原名俱舍雹論意欲給俱舍以致命打擊顯宗論竭力為婆沙辨護可是暗中也偷換了一部分說法所以後來稱呼他的學徒為正理師或新有部其說可以看成有部進一步的發展卻也就算有部最後的一個段落再沒有繼起的大家就像悟入論師所著入阿毗達磨論也是步趨正理別無新義的現在來談有部的重要學說即以大毗婆沙論為中心在它以前的稱舊說以後的稱新說至於婆沙本論雖然不能概括有部學說的全貌可是當時有部中心在迦濕彌羅大部分有部師也都以婆沙思想自限因此不妨將婆沙說作為有部本宗之說我們從婆沙極其繁復的論題裏可以提出一個最基本的論點即是有因有部主張一切法實有最後的根據在此所以也稱有部為說因部見異部宗輪論據清辨的解釋說過現未所生的一切是有故名說一切有即說此已生正生將生的一切莫不有因故名說因見中觀心論釋第四品窺基宗輪論述記卷上用所以來解釋因字未免空泛本來佛家學說和別宗最有區別之處為說因善巧能離開無因論不平等因論而以獨到的緣起說為中心有部對這一層特有發揮所以偏得說因的稱號另外說一切有這一命題包含著一切法有和三世有兩個部分對有部以外的各部說三世中現在實有還沒有什麼問題只是過去未來的有不能得到共許因而這一部分的實際不外說過未二世實有依著世無別體依法而立的道理見大毗婆沙論卷七十六過未有的建立也必歸根到有因的上面這更是有部獨得說因部名的一種緣由有部本宗怎樣解釋三世一切法的因呢它把因周密地區分為六種詳見大毗婆沙論卷十六至二十一先從人們的認識方面說起第一種是相應因每一種認識都依賴心和心所的合作它們是同時生起同一所依就根說同一所緣就境說同一行相就分別說這樣更互相望四事同等便有相應而存在的意義其次推廣些說有第二種俱有因凡是同時而起的種種法對於生果有著同一作用的像心和心所心和隨心而轉的身業語業或不相應行還有並起的四大種彼此相望都屬於這一類第三種關涉異時因果名同類因此即過去的善性法對於未來或現在同一界系的善性法現在善性法對於未來的善性法同樣地三世不善法相對這沒有界系的限制無記性法相對都是此因這還可遠推到過去之望過去未來之望未來凡前生的善等法望後生的善等法也有同類因義第四種遍行因這從不善法的同類因中區別出來所指的是一些煩惱法帶有普遍生起後來染法的因性的第五種異熟因這從得果的性質作區別和以上兩種又都不同所指的是善不善性有漏心心所法並包括隨心轉的色和不相應行這些實際即是和意業相關的一切對於所感召後世無記性的色心不相應行命根衆同分等種種果法說另外身語業法無想定滅盡定等不相應行法能生異熟果的也屬於此以上五種概括了親能生果的一切因緣最後第六種能作因只有幫助的功能或者消極的不相障礙而有利於果法的生起所以是等無間所緣增上這三類疏緣它的範圍最廣泛除了法體的本身而外所餘的都有成為此因的資格有部這樣用六因的解釋將三世一切法存在於各種因果關係中的意義徹底顯示出來只要因果不虛三世一切法自必實在有部的說一切有實際如是其次有部解釋諸法的因果關係還和剎那生滅的理論相聯繫有部被稱為剎那論者見於窺基唯識二十論述記卷三所以其說不同於常見或斷見並且有部學說具備著很濃厚的實踐意味它建立一切法的實有同時即為了否定人我所謂人空而法有正是有部實踐觀法的具體內容以上所說即有部本宗學說的要點下面再說一下有部新說的要點所在這可用衆賢的順正理論和顯宗論為依據兩論原是為發明有部正義的見婆藪盤豆傳在顯宗論序品中列舉了佛於集法經中懸記的重要異執四十四條和這些相反的才是佛家正宗也就是有部自許的宗義那裏面最後一條異執是或說心心所法亦緣無境相反的說法自然是識境實有了此義可說是一切異執歸宿的論點同時也可說是有部新說的基本論點我們以為正理師的重要理論都是環繞著它而開展的揀些例子來說像辨論過去未來法是有的一論題俱舍論卷二十在婆沙卷七十六原有的異熟果不虛的一種理由而外更舉了緣過未心必有實境的理由順正理論卷五十一顯宗論卷二十六都很重視它特別引來教證說如世尊言各各了別彼彼境相名識取蘊所了謂色至法非彼經說有識無境這樣來加強理由的說服力又如俱舍論卷六辨無為法是實以為滅若非有不能成為第三聖諦滅諦論文沒有詳解順正理論卷十七便加以有力的補充說以若無境慧必不生如何見無為第三諦這也是從心必有境的論點出發由此推論建立一切法有的依據便集中在法為識境的一義因為一切法特別指的實法假依實立應歸結到實法都是所緣緣很合理的一切實法就應有它的自性而成立一切有宗有部新說在色法方面還發展了極微的理論這也是從構成所緣的條件來立說的人們感覺雖不能直接緣到個別的極微但按實境界的當體並非極微和合的假相而是和集了的極微和合與和集的意義不同清辨解釋得最清楚他以和合為異類法的成聚和集則是同類法的見中觀心論釋第五品依著順正理論卷四的說意沒有極微不在和集狀態中存在著的所以感覺所得常為和集安排好了的極微唐人本著此意便說極微相資各各有一種和集相其相實有可作所緣見唯識二十論述記卷三這著重在相上說就和正理師的原意不盡相符了有部新說從所緣實有一義開展有幾點理論很突出而與舊說不同第一點是關於二諦的解釋依順正理論卷五十五十八顯宗論卷二十六二十八的說法無所待也就是當體直接能生起心法分別的都是實有實有法即勝義諦另外能夠顯示實義的名不相應行法它的法體也是實有所以得成世俗諦以名義區分真俗原為世友的主張但正理從名為實法的一點去推闡歸結到世俗諦只是勝義諦的另一方面隨概念所得理解的一面它由法體的實在而成其為諦和勝義理無別致如此也不妨說二諦為一另一點是所緣緣性安立不變順正理論卷十九說假使此法為彼法的所緣那末即在未被緣時也成為所緣性這就通到一切法以為所緣而實有的論斷上去了最後一點因為強調了所緣的實有在和它相應的實踐方面正理師便很自然地偏重知解理境也趨向概念化以至勝義諦裏也包括了所謂別相的類見順正理論卷五十八而一切法又歸納為句義的形式如入阿毗達磨論說善逝宗有八句義這使有部原以極微說多少接近勝論宗的到此在理論上更加靠攏了勝論我們已依著佛家學說一般區分境行果的方式從境的方面解說了有部學說要點行果之說姑且從略一九五六年五月七日初稿原載現代佛學一九五六年第六期阿毗達磨泛論一阿毗達磨與小乘派別之關係佛典三藏阿毗達磨居其一究其製作淵源頗有異論或謂出於佛說與經律同如舊時上座部一切有部等小乘以及與有部相關之大乘皆主此說或謂非是佛說但後人造如小乘中後起之經量部以及今人考證皆主此說二者異諍平心論之各有未當蓋云阿毗達磨藏內容至為繁復有以標釋研尋詳解法義為阿毗達磨者此實應名塢波第鑠後亦謂為摩呾理迦即有佛說者在又有以研究經文宣暢宗要為阿毗達磨者此實應名摩呾理迦多是佛弟子說又有以抉擇法門分別法相為阿毗達磨者此乃純粹阿毗達磨唯是弟子所出後人等視三者為一類而概稱之曰阿毗達磨如說盡出佛說或說盡非佛說皆無當矣以阿毗達磨為類名與經律二藏對稱事實晚出阿毗達磨本意為對法乃對教法解釋之一種法門佛在世時弟子間盛為應用佛亦從而獎勵之其形式則或法數分類或諸門解析漸成定式但未有一類論書統名阿毗達磨也後來小乘分派解經各別或重視論書為教證勢陵經律於是論書地位特殊有合佛說佛弟子說統為一藏者即謂之阿毗達磨其事殆在阿育王時代與那先比丘時代之間當佛滅後一百餘年至於五百年也阿毗達磨藏之獨立既本於小乘之分派故其製作種類與派別極有關係今言大略凡有二端可見焉其一小乘各派非即各有阿毗達磨也舊傳小乘分裂為十八部其後屢有分合如北方大衆部末派與餘部合為分別論者南方大衆部末派又裂為案達羅各派至於後來更成四大宗之對峙如謂每派各有阿毗達磨就現存典籍觀之太形不足反勘事理則各派間如大衆部等本不認佛說有不了義經經說既詳解經之阿毗達磨無關輕重其籍自鮮又正量等部晚出即共用一種阿毗達磨少分異解而大體無所改作以是小乘派別雖繁而阿毗達磨種類當寥寥可數其二小乘阿毗達磨即祇有數大類也此其實際可由大智度論得之智論詮理繁廣大小乘最初之交涉歷歷皆見論第二卷謂解佛語之籍有四一為身義毗曇身謂發智論義謂大毗婆沙二為六分毗曇即六足謂品類等六論三為舍利弗毗曇傳是佛時舍利弗所作四為𮔢勒傳是佛時大迦旃延所作此段文末又云有三類毗曇勘宋元明三藏皆以身義及六分為第一類舍利弗為第二類𮔢勒為第三類但麗藏本意云前三種為三類第四𮔢勒廣比諸事以類相從非阿毗曇今考智論第十八卷云入三種法門觀察佛語一𮔢勒門二毗曇門三空門此以𮔢勒與毗曇並舉又說以隨相等門為𮔢勒解諸法義為毗曇兩者差別顯然則麗藏本之說當也由是龍樹時代流行之小乘阿毗達磨祇此三類身義毗曇與六分同是一切有部所宗可無待論此外以舍利弗毗曇並舉為言極可注意其本初傳我國譯者道標序之曰此論於先出阿毗曇雖文言融通而旨格各異又道安序八犍度論亦云佛以身子五法為大阿毗曇也佛涅槃後迦旃延以十二部經浩博難究撰其大法為一部八犍度云乃至吉藏三論玄義亦說毗曇六類一佛說二舍利弗論三迦旃延論皆視舍利弗毗曇與有部本論地位相當者此究為小乘何部所宗耶智論卷二謂犢子道人等誦之則宗此論者有犢子部可知但著等字即不止此一部宗輪論述記中卷舊解云正量等四部釋舍利弗阿毗達磨可知四部亦宗此論也又四分律五十四卷云第一次結集毗曇為有難無難系相應作處五分釋律之毗尼母經亦云毗曇為有問無問攝相應處所五類此均與舍利弗毗曇之品目問非問攝相應緒分大同四分律是法藏部一說法上部所傳則知法藏部亦宗此論也又現存譯本舍利弗毗曇立義如無中有論卷八心性本淨論卷二十七九無為論同上等皆與婆沙時代分別論者之說相近而多處說無我五道等皆與犢子宗義相違故此譯本非犢子所傳或即出於分別論者也分別論者為大衆部等末流合成則此數部亦宗此論也由此言之除有部另有一類毗曇而外所餘各部殆皆用舍利弗毗曇龍樹以二類並舉豈無故歟但在其時南方錫蘭上座分別說部實另有一類毗曇即法聚分別界說雙對發趣人施設論事之七論此與印度本土學說關係較疏故龍樹未言及至與印度本土各類毗曇相較在昔以為僅有名目相似而內容無涉近年屢經學者考證知其間脈絡仍相貫通舉要言之則南方七論中較古之分別論等組織形式即與舍利弗毗曇大同解釋法相章門亦合更以舍利弗毗曇與六分毗曇相較又有一分相似因知舍利弗毗曇實為南北阿毗達磨關合之樞機必其結構最古而後兩方阿毗達磨因以改造乃各呈異觀今細勘之其間固有相貫者矣如上所說小乘阿毗達磨至少有三大類可以斷定有部毗曇為一類舍利弗毗曇為一類南方七論又為一類也所屬派別源流今以一表明之南方分別說部一七論毗曇上座說一切有二六分毗曇身義毗曇化地法藏僧伽犢子大衆分別論者三舍利弗毗曇二初期有部阿毗達磨上述三類阿毗達磨中有部一類種別最繁傳譯最備而與大乘論書亦最相關考有部學說自阿育王時代以後千餘年間發達不絶凡可分三時期第一舊傳佛滅後二百餘年阿育王在華氏城舉行結集上座帝須自撰論事遍斥異宗其書首章即破一切有義可見有部思想當時已經萌芽繼而阿育王派遣長老末闡地等布教迦濕彌羅健陀羅各處後均為有部之根據地而宗師輩出造論釋經一變風尚是為學說建立時期第二約在佛滅後四百年至六百年間迦旃延尼子法勝等相繼著作組織舊言有部宗義漸以大備是為學說組織時期第三約在佛滅六百年至千年來迦濕彌羅與國外有部各稟師承立說競異頗相水火繼以餘宗說盛大乘教興論師撰述溝通歷有變遷是為學說派別變化時期有部一切論書即可依此三期分別觀之初期有部論書莫要於六論後來婆沙師尊為六足論者是也六論次第與其作家玄奘舊傳一說梵土稱友釋俱舍論又傳一說西藏他拉那他及布敦等又傳一說互有同異而均不可見諸論原來著作之先後次第今加考證最初出者當為法蘊論此有數證一靖邁後序謂此論為阿毗達磨之權輿一切有部之宏源乃至發智婆沙皆挹此清波分斯片玉云云此說論文最古當有所據二有部舊律十誦說第一次結集阿毗達磨為近事五戒等卷六十即同於法蘊論之本經結集傳說雖不可信然可知有部推尊此論為最古也三西土傳說論是舍利弗所作有部本信佛時舍利弗與佛後迦旃延尼子為法爾二大論師婆沙卷一此論稱舍利弗作當然甚古至於論文體裁全是摩呾理迦二十一品每品皆解一經也大小乘共信之佛說阿毗達磨殆即指此論本經而言其次出者為施設論舊有譯文七卷因至宋代方譯失造論人名文又不全故俱舍學者不視為六論之列但今人依西藏譯本對勘乃至譯本即六論中施設原文略出蓋西藏譯文三品已不完全舊譯又祇有一品也智論卷二說此論從樓炭經出是目乾連作即指今論第一品世間施設而言其餘品或又為後人所續矣論文亦非阿毗達磨體裁但包羅極富阿毗達磨所難攝者皆有論列故有部極重視之又次出者為集異門論此乃解釋集異門經之作舊因經是舍利弗出說論亦是舍利弗出但西土傳為拘絺羅釋明與出經者為異人也經文緣起謂當時離系親子即尼乾子徒衆分裂舍利弗引為佛徒之戒及佛在世結集法數以為預防云勘巴利文此經緣起離系親子作跋闍比丘似此論即以佛滅後第二結集跋闍子北傳為犢子分派之事實為背景且跋闍子部奉舍利弗毗曇此亦以舍利弗說為宗又見其針鋒相對故此論當為有部已經確立之後之作又次出者為品類論舊稱分別論此論極為重要智論言六分毗曇數此第一下逮婆沙亦視為制作規矩全論八品其中千問一品即補法蘊而作蓋法蘊解佛說阿毗達磨但有經文分別千問舉總別二十經各歷五十門以成千問則論門分別也有經論二分別而後阿毗達磨之形式備宜有部重視之也又次出者為識身論此因破我執而歸諸六識身種種分別而成較前各論範圍更狹宜在後出西域記卷五謂作者提婆設摩是佛滅後一百年人今詳論文第一品目乾連蘊破過去未來無現在無為有之說似對目乾連子帝須而發第二品補特伽羅蘊破有我之說又係對犢子宗而發可知此論作者必在犢子分部乃至帝須立說以後且此論補特伽羅蘊先舉他宗勝義諦義補特伽羅是有之言而後又反復徵破至於八章此種體裁全與帝須論事破我章門相似但論事以此為首章本論即於其先加破帝須之說是在論事以後制作可無疑義故作者年代當為佛滅三百年內也最後出者為界身論此論從品類論七事品節出大地法等以為本事再加各門分別故在後出窺基序云原有大本六千頌今譯中本九百頌所謂大本殆即指品類論西土傳作論者為圓滿與品類異其作家其說可信婆沙論中有望滿大德亦有部師或即其人也以上六論時代不一性質亦殊後世婆沙師推尊發智以六書為輔翼概稱阿毗達磨並云足論今細按之純粹為阿毗達磨者惟一品類論而已此論流行極廣各地有部師皆有誦本大略別之迦濕彌羅西方及餘外國師誦本即三類也其傳譯於我國亦較餘論為早劉宋求那跋陀羅即已譯之名衆事分阿毗曇此為西方誦本後玄奘重譯亦西方本但又經改訂非其舊矣論文八品辨五事諸智諸處七事隨眠攝等千問抉擇智論卷二言四品是世友作四品是迦濕彌羅羅漢作但不明指何品今以舍利弗毗曇之形式勘之諸處品與舍利弗毗曇問品相同二者敘述三科均以處為第一尤可注意又七事隨眠品與彼非問品中標釋相當又攝等品即與彼非問中攝法及攝品相應品相當此可證諸處等四品實為一類又阿毗達磨有分別抉擇二法門抉擇又分識所識智所知使所使三科所攝四門言其依據則識門觀入即處立智門觀諦立使門觀種立攝等門觀界立以此勘品類論諸處品言入七事品言諦界隨眠品言種攝等品則依以抉擇此又可證四品之為一類世友舊作或即此四而言純粹阿毗達磨者亦應取則於是矣三第二三期有部阿毗達磨有部學說組織時期造論者數家尤要者為迦旃延尼子與法勝迦旃延尼子著發智論對於有部舊師所謂舊阿毗達磨師之說頗多裁正如舊說信等五根無間入正性離生類似犢子部唯以五根為世第一今即改云根非根相應心心所為世第一法如是之例不一而足蓋有部之說至此而另成一系統也又三世有之義亦至迦延而大詳故分別論門定以三世遂極繁衍之能事其他解釋經文溝通舊論遍破他宗皆使有部立說益以彰著論有八蘊以類相從細分為四十四納息次第頗復凌亂或論以性相求不以次第求故爾至於作者時代迄無定說但婆沙之制作在迦膩色迦王以後此論之先婆沙又應有相當時日則或前迦王亦未可定也我國陳唐兩譯即為先後兩種誦本對勘可知吐火羅國法勝繼起依據阿毗曇經組織西方諸師之言造阿毗曇心論恰與迦延東方之說相對峙論文十品界行業使賢聖智定經雜及論焦鏡舊序謂此品目擬佛說之四諦亦不盡然蓋作者以阿毗曇經源流廣大難卒尋究是以探其幽致別撰斯部號之曰心所謂阿毗曇經即論中契經品所釋其經目大同法蘊論本經有部稱為佛說毗曇者也論品目次第即依經序抽繹其有關毗曇抉擇之各類編列為界品至定品故其結構源淵頗存家法此既大異於發智矣況所立義以頌文括舉多啓西方師外國師異說之端如論四云色界十七天即為西方師說別開大梵天所本又論二云十六淨心見法即啓外國師說十六心見道所本是又發智以外別樹一幟者矣有部第三時期學說即因發智心論之傳承分合極其變化之觀關於發智先有各地誦本又有各家著書如世友之集論妙音之生智論法救之論等皆引申發智之說時有異同關於心論則有各種廣略釋論如四卷極略本優婆扇多八千頌本一師萬二千頌本又古世親六千頌本皆不主一家之說但以理長為宗而其末流外國諸師遂大反於發智由是儒墨競構是非紛然迦延之徒在迦濕彌羅勢力既盛爰集大衆造毗婆沙抑正衆說則尊一家之言自小乘異宗有部異派西方師等乃至同系諸師如世友等悉致破斥態度專橫極端主張一切法皆是實有不容稍事分別但其對於發智尋繹文義頗善引申或會通舊師異說或抉擇有餘之辭至於推衍法相尤極繁廣蓋發智未備之義皆為補苴而引舊論六種以為輔助遂有一身發智六足六論之刊定自成其一派學宗後來稱為毗婆沙師或迦濕彌羅婆沙師也玄奘傳譯此論謂為迦膩色迦王時五百羅漢舉行結集銅牒雕鏤石寶深藏國外鮮得觀覽云云今考之情理當時帝都為健陀羅而嚴禁流傳世友為上首而備遭破斥種種乖違難為置信更勘論文已有昔迦膩色迦王時之言卷一百十四其在王後成書可無疑況以我國涼唐二譯對勘其文曾經增訂形跡顯然則並鏤牒珍藏之說亦未足信矣要之此論乃迦延之徒多人所作則無疑耳婆沙既出有部不純之說皆遭排棄而與譬喻等部漸有同化之勢于是法救溝通西方與迦濕彌羅兩地異宗重申正義著雜心論此釋心論本頌而增補甚多故號為雜論首頌云我今處中說廣說義莊嚴謂以婆沙之說相雜實為溝通兩地學說之意也今考論文依婆沙制作新頌固多而存西方異說亦不一而足如無作假色論一共有因互為果論二悔通無記論二等皆是其例若說色界或十六論八存十七天與十六天兩說尤可見作者調和之苦心至於新增擇品於有部舊宗三世友中陰有四諦漸現觀阿羅漢退等一一重為申明作者當時必有所感而發蓋可知也此後經部勢力大盛有宗舊說受破之弱點益復顯然加以大乘潮流激蕩西方世親諳其短長又於雜心重事增訂概括一切對法藏義成俱舍論其立說之態度仍以婆沙為宗而少有貶量自暴其短欲待智者評較是非故多引他部設為論難至不可決時輒結云婆沙是我所宗如是其意故隱朋他部矣跡其用心不必即全從外說但欲顯示有部立義所窮以見非有改易不可存也而外國說與婆沙說之短長亦借以表見遂謂世親紹西方論宗以理為斷之系統亦無不可惟然婆沙師中頗有不能滿意者則如衆賢論師竭十二年之心思批解俱舍破其所朋上座之義正其頌釋猶預之辭作順正理論又約要義為顯宗論其意固欲為婆沙解難自示無瑕然而立義強通仍失其本如以和集解五識所緣論四有法能礙解非擇不生論十七皆出婆沙正義以外此不啻依世親之意而改易有部舊說矣後人即謂之新有部宗蓋有部立說變化至此而勢竭以後論書鮮出無可言者四大小乘論書之交涉大乘教由龍樹而復興自始即有與小乘阿毗達磨相涉之處考龍樹之時代約在毗婆沙成書百年以後舊說佛滅後四百年迦濕彌羅結集婆沙而五百年龍樹出世其相去約百年今說婆沙成於佛滅後六百年頃而龍樹於七百年出其相去亦百年也因知大乘之驟興實乘婆沙學說之既弊蓋其時義學受婆沙影響一切有宗遍行各地而形式流於煩瑣主張偏趨極端未免潛蘊反動之機故龍樹一倡大乘勢遂大暢唐代諸賢說教興緣起每謂佛後小乘執有龍樹因而說空其言應可信也龍樹立說與阿毗達磨相涉如何可觀其根本著書大智度論此論解大品經文前三十四卷完譯後則略出其性質本非毗曇但引文不下三十餘處匯而觀之乃於各類毗曇持分別去取之態度蓋龍樹以為佛說諸法皆先分別後出實相論卷二六論文奉為圭臬每釋法義先以分疏如言一切法空必解一切法為一法二法等揩定其體再說皆空論卷三一當時大乘猶無獨立毗曇其分別法相所資自必取諸小乘之籍矣但龍樹區別小乘毗曇有三大類六分身義與舍利弗其間取捨頗復精嚴若六分中品類一論殆最重要如言一切法攝入二法中名色色無色等凡二百二法論釋不詳即指如千難品說論十八又四念處種種分別亦指如千難品論十九又四聖種幾界系等亦指如千問品論二十八所云千難千問即大同現存品類論中辨千問品又辨一切法云如阿毗曇攝法品說論二十七按此即品類論中一品而徑稱為阿毗曇殆以品類即同於毗曇矣又辨十智種種分別云是阿毗曇門而仍同於品類論智品又有上無上法分別云如阿毗曇說而仍同於品類論攝等品此則但稱為毗曇而不分品目矣其他如此之例不一而足可知龍樹於品類論之信用也然一言及發智則態度大異論卷二謂佛滅後百年阿輸迦王作無遮大會諸大法師論議異故有別部名字以後輾轉至姓迦旃延婆羅門道人欲解佛法作發智論八乾度云云此稱迦延為婆羅門外之也其人外其說自外矣更勘論二十六解十力四無畏等非十八不共法或難迦旃延尼子如彼說答謂此所以名迦旃延子若釋子則不如是說云按釋子是佛徒通稱此不目為釋子意又可知也又如論十三說不殺戒諸分別迦延毗曇說皆不備又論十說修羅入鬼趣評云佛無此說但迦旃延子說由此可知發智之說乃在龍樹所排斥之列也至對於婆沙所謂迦旃延子弟子輩言則更深惡痛絶如婆沙師說菩薩相必三大劫後種三十二相業方稱菩薩龍樹評云是輩生死人不讀大經不知諸法實相自以利根智慧於佛法中作諸論議諸使智定等義尚處處有失何況欲作菩薩論議論卷四又婆沙師說影是實龍樹評曰此非毗曇說但釋毗曇義人所說論卷六皆見其說之不足據也至於再辨菩薩三劫後修相義直云此婆沙中說非三藏說論二十八此則絶之甚矣其餘毗曇明文較少但如犢子說九十八隨眠同於迦旃則不採用論卷七說有六道不同婆沙則全取裁論卷十是於中有簡擇取捨而其標準亦約略可知也此種反對發智婆沙而以理長為宗之態度後來大乘遂永以為典則而不改自龍樹倡導空義以還有部以外之小乘受其影響頗深論書制作亦多改觀其最可注意者為訶梨跋摩之成實論論即依據小乘宗義以明空而以滅空心為究竟則空空解脫門之意也其解法相亦不主一家惟於有部多致破斥如諍四大實有心所實有不相應行實有等皆反對毗曇至謂諸論師習外典故造阿毗曇說別有凡夫法等論卷七其不滿意之情可想但本論體裁仍解佛語論初頌文解佛語者不為毗曇必為𮔢勒智論卷二今論其𮔢勒一類歟蓋嘗證之𮔢勒謂是大迦延造智論二今論解十二分教中論議亦云是大迦旃延等廣解佛語論卷一意即推尊𮔢勒若在有部固應尊舍利弗矣此一證也𮔢勒解佛語不用有色無色等分別但依隨相等門而為論議智論十八今論亦有論門一品說同相等門而無毗曇分別論卷二此二證也𮔢勒行於南印又經諸得道人重為刪略智論卷二又卷十八考小乘中惟大衆等部南行其末派多聞部真諦即傳為得多聞又即遠溯以迦旃延為宗諸得道人當即指此今論主學從大衆系出多聞舊有其說考其宗義如心所無別體不說相應等亦均與大衆末派相近此三證也𮔢勒論者失傳難考得成實論見其雛形流傳而北於後來論書制作自應多有關係矣五大乘阿毗達磨智論以後至於大乘阿毗達磨之成歷時甚久其間具備過渡之形式者則瑜伽師地論也本論去智論又百餘年乃依瑜伽師一派學說而為組織此派源流經過今已難詳惟瑜伽師是修行者通稱似在佛時即有如婆沙一百零一卷引經云須達問佛瑜伽師見諦為漸為頓可為一證又佛滅後弟子中有專事修瑜伽者漸成一派如毗尼毗婆沙說坐禪人誦雜阿含又分別功德論卷一說阿難滅後弟子專習禪定均指此事後其勢逾盛遍行各地東傳我國則為禪教之學末流遂有禪宗西土亦逐地立異有北方瑜伽師南方瑜伽師等稱其先此派本致力止觀所為學說但以定境為主入後亦談法相與小乘舊毗曇師時有出入如舊毗曇師說五識能互為等無間起瑜伽師說不然五識皆從意識無間而生此種異諍先見於婆沙後來立說更有開展如北方師與譬喻者立義相通譬喻者說止觀是道諦而北方瑜伽師亦以止觀貫徹修行各位有五瑜伽地之說漸至有以大乘宗義為之組織大成者其人則彌勒也彌勒著論即瑜伽師地論立說仍依觀境故別為十七地見其界域現存論文五分惟第一本地分說地次第井然或瑜伽師根本之學在是至第二抉擇分亦傳為彌勒說而與本地立義頗有差違真諦世親傳云無著請彌勒講十七地經且傳且釋此分或無著之釋也至第三分攝釋說摩呾理迦作法第四五分攝異門攝事引用古摩呾理迦皆見本論之依據蓋論文體裁又意在摩呾理迦也論卷六十四解摩呾理迦云是十七地四攝此明指本論而言又論卷二十五解十二分教之論議謂為一切摩呾理迦阿毗達磨研究甚深素呾纜義宣暢一切契經宗要此則以摩呾理迦為解經要之作與拘拘法門分別者有異是故攝事分廣引經律摩呾理迦本文纍十餘卷皆見作論之正宗所在無取乎小乘毗曇矣然本論非絶對排斥毗曇特欲因而廣之故又說經律摩呾理迦以外可有分別法相摩呾理迦此先序事即立章後廣辨即論門論卷一百序事以染淨細分其目與心論契經品所敘大同色界分別謂十七地尤與西方師說相合至於廣辨品類抉擇以外又有異門體相釋詞等即較一切毗曇為廣也論但標此體例而制作未遑焉根本此意而為大乘之阿毗達磨實自無著之集論始以今所知大乘之獨立阿毗達磨似亦祇此一種以其制作較晚舊論體制悉聽取裁故得大備後世親莊嚴經論及攝大乘論釋皆解阿毗達磨意義有四端其一對法謂以四諦道品等說趨向於涅槃其二數法謂以思擇法門數數分別法相其三伏法謂說論議能伏他異諍其四解法亦稱通法謂釋規式通曉文義此種解釋之標準阿毗達磨即集論也論之本事分四品標章分別即是數法抉擇分四品諦品解瑜伽所緣法品解瑜伽修得品解瑜伽成就此宗即以瑜伽對向涅槃故此三為對法論品或說論議或說釋經即伏法與通法也今更列表明之本事分四品數法諦品集論法品對法抉擇分得品阿毗達磨伏法論品通法集論內容雖甚繁復然以成法相格惟數法一端可稱純粹阿毗達磨故無著特題為本事分此以舍利弗毗曇與品類論之品目比較可見其組織全同也至與大論本地分名稱近似而實不倫以阿毗達磨之成分言大論抉擇分與此相類而非本地分也唐賢解即以集論二分仿大論以立名誤矣又本論釋義多與大論不合唐賢解此論以瑜伽法門釋阿毗達磨經宗要說與瑜伽不同皆依經文處也今既無彼經莫由取證但細勘抉擇分多處散引各經即不拘於一部又釋論謂此遍攝一切大乘阿毗達磨經中諸思擇處似乎亦非一經故釋經宗要之說可疑今謂論與瑜伽不同此乃無著之自說耳集論後有釋論數家覺師子釋尤見精彩安慧即因以糅合本文成雜集論此名曰雜乃仿雜心論例雜心以婆沙莊嚴心論雜集則似以經部上座等義莊嚴集論經部上座義者世親俱舍之所朋而衆賢正理力致駁斥者也今復取而用之故說此論為救俱舍而作此種立說或與集論之本旨未當然而大乘論書反對婆沙師之精神固已貫徹無餘矣自後阿毗達磨遂鮮繼作者一九二五年五月研究部第四期講稿改訂原載內學第二輯略述正量部佛學印度的部派佛學勢力足以和大乘佛學抗衡的開始是說一切有部後來便屬於正量部正量部從龍樹時代起逐漸抬頭直到玄奘義淨去印度的時候還是很盛奘淨說到當時小乘佛學四大部都以正量和上座等並舉見大唐西域記卷十一南海寄歸傳卷一實際上晚期大乘佛學裏常常涉及的小乘部派也正是正量部因此我們要徹底明瞭大乘學說就得對這一部有相當的認識可惜的是舊籍零落難得其詳現在只能簡單地敘述一些要點以供研究參考先談源流正量部梵名三彌底耶原係創派的人名所以從前也譯作正量弟子部另外舊譯和西藏譯作一切所貴部這是部名原文轉作娑摩底耶的緣故這一部乃從犢子部分裂出來各家傳說差不多一致至於分裂的原因據異部宗輪論說是為了解釋已解脫更墮云云的一個頌各家的意見不同犢子部一時分成四派正量便是其中之一又據真諦所傳犢子部原來推崇舍利弗阿毗曇後來各家感覺毗曇所說還不完備便各自造釋補充如是意見紛歧因而分派照此一說那有問題的頌文應該和舍利弗阿毗曇有關但在漢文譯本裏還找不出來並且頌文簡略意義也不易明瞭窺基的異部宗輪論述記採取舊說舉出四家不同的解釋大體上是談阿羅漢退墮不退墮的問題我們另從南方所傳敘述部執的論事一書看犢子部本宗和正量部都主張阿羅漢有退見論事第一品第二章而這一主張在各部派的異執裏還占很重要的地位所以論事特別將它列為二百一十六種異執的第二種對於退墮的解釋不同當然可以成為分派的原因不過四部中正量和犢子本宗關係比較密切正量所有的新主張最初都被看作犢子變化之說並不用正量的名義出場因此在大毗婆沙論編纂的時代公元二世紀犢子部的主張祇有和一切有部不同的六七條見大毗婆沙論卷二到了龍樹著作中論時公元三世紀便說犢子更有生生等十四種俱生法和不失法之說見中論的觀三相品觀業品這些都是正量部分出以後的新說仍舊歸之於犢子名下的正量部的名目到安慧清辨時代公元六世紀才十分顯著所以有這一變化大概是正量部關於業一方面的理論得到發展的緣故此後勢力日盛像玄奘在大唐西域記所載當時公元七世紀印度除了北印以外都有正量部的傳播明文列舉了十九國僧徒合計六萬多人摩臘婆國是西印度佛學的中心地而正量部僧衆就有兩萬人可見它在各部派中如何的占有勢力因此像慈恩法師傳卷四所說當時南印度老婆羅門般若毱多智護發揮正量部的說法作了破大乘論七百頌不但為各派小乘師所一致推崇而且使那爛陀寺答應戒日王的請求去參加辨論的各位印度大德都喪失了自信這也可說明正量部的議論在當時發生如何的影響其後雖然經過玄奘制惡見論的破斥又有過曲女城無遮大會的擴大宣傳但它的勢力依然存在三十年後義淨到印度之時還相當盛行一直維持到波羅王朝的時代公元八世紀以後次談典籍正量部後來既成為一大宗便和其餘上座部等大宗一樣也具備著它獨有的經律論三藏這從慈恩法師傳卷六說玄奘曾由印度帶回正量部的經律論一十五部可以證明不過那些經律早已散失詳細內容現無可考只有關於經藏即四阿含裏面的重要義類可以從和正量部淵源最近的賢胄派犢子部分出的四派之一著述三法度論東晉譯見得一斑另外律藏也有明瞭論正量部律師所造陳譯略攝大義至於論藏以舍利弗阿毗曇為根本漢譯有其書但不完全此外還有些解釋毗曇的論著現存的三彌底部論失譯今勘應附梁陳録就是一種又慈恩法師傳卷四說玄奘在北印度鉢伐多國所學的攝正法論教實論也都是有關正量部的書攝政法論或者即是宋譯的諸法集要經原係觀無畏尊者從正法念處經所說集成頌文闡明罪福業報正是正量部的中心主張而正法念處經唐人也認為是正量部所宗的教實論也就是聖教真實論瞿沙所造沒有譯本相傳是發揮有我的道理為犢子部根本典據玄奘在鉢底多國學習正量部的根本毗曇同時兼學這一書可見也是正量部所重視的再談正量部的主要學說這裏面有篤守犢子部本宗舊說的有依據舊說作進一步推論的也有正和大乘學說對峙的最先守舊之說即是犢子部獨有的有我論我這一名詞係補特伽羅的旁譯因為說補特伽羅正翻數取趣說我說有情說命者都指的一種事實而這些名目原來是作同義語看待的所謂有我即是這一種法體在諦義上實有的意義勝義上究竟的意義是可得的存在的犢子部這種主張對於正統佛學無異是叛逆之說佛學根本發明無我道理而犢子偏偏主張有我豈非背道而馳但這祇是表面的實際它和佛家以外的學派所說有我並不全同而對佛家餘義也取得一些調和所以盡管不絶地受到批評破斥但它依舊流行並還影響到其他部派為他們暗地裏採用著像大衆部的根本識化地部的窮生死蘊乃至說一切有部的同隨得都不妨看作變相的有我說正量部對於這種理論有比較詳盡的解說見於三彌底部論據論所說犢子部有我學說的建立乃是經過料簡了內外各種異論而後完成的這些異論像佛家部派中的無我說片面的有我說或者離蘊或者即蘊或者是常或者無常等以及有我無我不定說還有餘宗的實有我論一異斷常等等說法都是的離開種種不正確的說法所建立的我便和五蘊的關係不得說一也不得說異它的性質也是非斷非常而推論的結果它是歸於五種所知法即對象裏面的不可說法的另外佛之說我可以看它是施設的假說分成三類一依假二度假三滅假這三類名稱在三法度論的譯文中作受施設過去施設滅施設佛說有時指現在有執受的內蘊等如有情血肉的色蘊等為我這屬於依假譬如火之依薪我對所依蘊等是一是異都不可說佛說有時又通三世來作假設比方在種種本生上說今我佛自稱即是過去頂生王等又比方作種種授記說汝慈氏未來當作佛等這些各有自體相續不亂屬於度假度即三世轉移之義佛說還有時在有餘的暫時滅但捨此身和無餘的永久滅不受後有方面也用我作自體來區別但一異斷常都不可膠執這就是滅假即由三類假說不妨承認有我歸在不可說的一類法中正量部對有我說作這些解釋不用說是含有補充的意味的其次推闡的新說這是關於業報的理論本來犢子本宗主張有我用意在於成立生死解脫的不落空但推究怎樣才有生死或解脫這就會牽涉到業力的一方面因此有我論的骨幹必然是業論正量部闡明此義很多新解比方說業的存在並不是業法的本身因為身口意業起滅無常都是不能久住的業之能招致果報乃由於它熏習積聚的力量那種積聚是不相應行和心一道起滅卻不相應它既無所緣對象又是無記性質這些都是和業自身顯然有別的詳見論事第十五品第十一章還有業的積聚可以總分四類欲界的業和它的習氣以類積為一聚其餘色界無色界無漏也同樣的各以其類各為一聚這些業積相續存在不是一期生死即了必須相隨到了修道或入涅槃方才消滅佛所常說的不失法便是指此而言這很像借債人所立的券契憑著它就需還缺正量部以此解釋業的決定比較周到中論的觀業品引了他們的主張有這麼一個頌雖空而不斷雖有而不常諸業不失法此法佛所說此頌在青目的注解裏變成了正面文章好像是龍樹所答但依清辨的般若燈論看這明明是正量部的主張即由於有不失的業券說法便進一步對於業的性質得著種種闡明第一表色不妨看成業的一類第二表色可以認作律儀第三色法也有善惡性的區別這些詳見論事第八品第九章第十品第十章第十六品第七章還有正量部說表色是業是用行動來作解釋的由此便牽涉到色法不盡是剎那滅的問題色法暫住不滅才可以有從此到彼的行動現象又牽涉到滅法待因的問題行動表色不像燈焰鈴聲等自然歇滅就必等待滅因這些說法都由業論推究出來或為以後各家諍論的主題參照大乘成業論至於業的積聚即所謂不失法對我又是怎樣的關係這可用通常所說業的自作自受來為說明一方面由於我對業的執持在生死流轉之際業的積聚不至與死心俱滅所以謂之自業另一方面我之死此生彼捨棄這一類五蘊而聯繫另一類五蘊完全依於業積聚的限定如此我既執持業聚又為業聚所限兩者關係成為因果不離並且自有生以來一直到涅槃相續不斷這一理論很多地方和大乘佛學中阿賴耶識的說法相通阿賴耶識便是能執持一切法的種子而又同時為業法種子的異熟果的因此從前真諦翻譯攝大乘論釋中阿賴耶識的異門一段便添上了聲聞乘正量部名為果報識云云的文句這在別家譯本都沒有並且他翻譯的顯識論又將果報識換譯為不失法這些可以說明依真諦的認識正量部的業說是和阿賴耶識說有類似之處的最後對破大乘之說主要是破瑜伽學系關於所緣緣的說法正量部分析心色二法的性質以為心法剎那滅而色法有時暫住這便使色心分離各自獨立對於瑜伽系學說根本相反像無著所著顯揚聖教論成立色法念念滅即是以色隨心而說的見論卷十四成無常品正量部又主張心之緣境可以直取不待另變相分這更和瑜伽學說大為徑庭瑜伽學說流行之時正量部也勢力全盛它們中間會發生正面的激烈衝突像慈恩法師傳卷四所載玄奘痛破般若毱多之說並引起曲女城無遮大會裏擴大宣傳的那一番因緣可算是勢所必至的可惜般若毱多破大乘的原作和玄奘反破他的著述都已失傳彼此往返的議論不得其詳祇有唐人留下一些傳說以為正量部師般若毱多所破的是大乘所緣緣帶相義玄奘在無遮大會上也針對此破豫以反駁見成唯識論述記卷四十四又說無遮大會上玄奘所提出的是一個成立唯識道理的比量見因明入正理論述記卷五依據這些傳說正量部破瑜伽學說乃是集中在所緣緣的一點可以無疑瑜伽系從陳那以來為了成立唯識對於所緣緣曾做過進一步的分析像觀所緣論所說心法特別是屬於感官的前五識所緣的境界必須具備是因性和有顯現行相即帶相性這兩個條件由此真正的所緣只限於心內的境界這樣成立了唯識正量部的破義就著眼於這一說法以為在平常的情形裏容或如此但到了瑜伽系所說無分別正智生起的時候智所緣的是直接領會的真如這從唯識理論的體系來說所指是心識的實體沒有被曲解為種種施設形象的本來面目就不應該再變現相狀即帶相那末像觀所緣論所強調的兩種條件之說豈不成為空談如果在正智那樣心理狀態裏可有例外唯識道理即不完全正量部這一質難可謂擊中要害所以從前傳說當時瑜伽系的學者對它沉默了一十二年見宗鏡録卷七十直到玄奘去印度才救了轉來依成唯識論述記卷四十四說奘師之救乃將帶相的帶字分作變帶和挾帶兩解尋常心識的所緣是變帶相狀正智的所緣則挾帶體相這樣和瑜伽系所緣緣的定義就不違背所以唯識的根本原理即心識不緣外境的原理還是破不了的奘師這一解答據我們看來它的重要關鍵並不祇是帶相裏帶的一面同時對相的一面也已兼顧到了依照陳那集量論第一品解釋帶相的相即是行相可以就相分說即所行之相也可以就見分說即行解之相正量部所出的質難但知道相分上的行相卻不明瞭大乘說行相本來側重在見分上的行解見成唯識論卷二因此奘師之說實在是重新聲明行解的意義來解了圍正智緣真如時見分作無相的行解所以真如有顯現行相的性質得成所緣至於無遮大會上的比量形式組織的嚴密固然是無懈可擊而內容上也另將護法用能緣所緣體不相離而成唯識的精義扼要地顯示出來不離的唯識義乃是陳那以後分別了所緣的親疏關係才發展的新說奘師特別提出也可見正量部議論的尖鋭單憑舊義已應付不來了總之正量部的主要學說和大乘佛學好多方面有交涉深入研究實在是不可少的一九五五年十月二十二日改寫稿原載現代佛學一九五五年第十一期毗曇的文獻源流阿毗曇心論講要序言之一從佛教的文獻說毗曇論藏是三藏之一現存小乘各部的毗曇種類很多其中比較有組織的在北傳的佛典裏有說一切有部的身發智論足法蘊足等六足七論南傳的佛典裏有上座部七論法聚論等此外還有部派不明的舍利弗毗曇內有五分這些雖然各成組織但每類組織的來由已不易說明各類相互間的關係就更難言了現代學者對於這方面的問題始終在探討著只是還未能得到定論我們以為要解決這一難題必須上溯毗曇的本源才會有比較合理的答案據佛家的傳說毗曇對法即對佛說法的解釋它的製作是起源於佛世的佛的說法有時帶有分別解釋法相的意味即是毗曇的雛型相傳當時大迦旃延那嘗撰集這一類的教說並略加解釋成為佛說毗曇呈佛印可而成定本見分別功德論卷一又撰集三藏傳這就是所謂九分毗曇大智度論卷二稱此論為𮔢勒即藏論九分的名目在圓測的解深密經疏卷二仁王經疏卷一引用真諦的部執論記曾舉了出來即是分別說戒分別說世間分別說因緣分別說界分別說同隨得分別說名味句名句文分別說集定分別說集業分別說諸陰蘊俱舍論法寶疏卷一說及九分毗曇列名稍異但未詳所據這些名目的意義可從真諦別的譯書和唐譯本對照而知如真諦譯俱舍論中有分別說世間一語在唐譯本裏作世施設由此可知分別說相當於施設又在真諦譯顯識論及隨相論裏都有同隨得一詞對照唐譯是說種子習氣的聚集大同於隨眠集定集業即是雜定雜業之義至於九分的分量據真諦說各分皆有六千頌九分合有五萬四千頌在大毗婆沙論卷四十七裏說到八萬法蘊即八萬法門每一法門各如法蘊足論之量有六千頌這正當於九分最末的諸蘊分從此也可以見出法蘊足論和九分的關係解釋九分毗曇的相傳最初有目乾連舍利弗二大家目乾連的解釋是隨文而解或抉擇要義舍利弗的解釋則以義歸類這有些像中土春秋經之有三傳並行遂為後來各種毗曇著作的張本其中舍利弗的釋文尤為重要他以義區別佛說成了問非問攝相應處所五分後來流傳其節略本即是現存的舍利弗毗曇又北傳的品類足論也是依據它改編而成此論為北傳毗曇中主要的一種相傳為世友所作實則五事品是世友之作餘品則是各家之言目乾連的釋文現只存北傳的法蘊足論一種當於九分的末分其餘八分都失傳致於迦旃延那原來的釋本北傳毗曇中施設足論即從它蛻化而成但此論漢譯本止有因施設一門相當於九分之分別說因緣分此外世間施設門相當於九分的分別說世間分只存名目藏譯本具備世間因業此相當於九分的分別集業分三施設其餘也散失了只在大毗婆沙論裏引施設足論之文有不屬於漢藏譯本所見者應該即是已經散失各分的片段另外在北傳毗曇中有立世阿毗曇論像是從九分中分別說世間分集成的一種又有佛說阿毗曇經原有九卷今存兩卷文字不很連貫像是從九分中分別說戒分集成的一種以上是說毗曇文獻流傳的大概明瞭這些就可以談阿毗曇心論在全部毗曇中的地位推原佛說的九分毗曇現已不可得見從它派生出來的各種毗曇現亦零落不全而且異義紛披很難得其真相幸而現存阿毗曇心論一書實際具備九分毗曇的雛形並還兼採各論的精要它實是一種毗曇提綱之作極可珍貴這部論是法勝所作從曹魏時第三世紀來中國的西域僧人即十分稱讚它其後百餘年到道安師弟才請譯師翻出經過慧遠刊定成為定本還替它做了序文收在出三藏記集卷十那裏面略敘譯家的說法以為此論管統衆經領其宗會故作者以心為名其人以阿毗曇經源流廣大難卒尋究是以採其幽致別撰斯部從這些話可見法勝之作此論是要對阿毗曇經提要勾玄的不過隋唐時的學人如吉藏等不明毗曇經的原委錯認阿毗曇心論是大毗婆沙論節要之作這大概是很不清楚原來有那樣巨大篇幅的毗曇經一見到廣大毗曇字樣便想到大毗婆沙論因而誤解如依真諦所傳阿毗曇經全部九分有五萬四千頌以五百頌譯作一卷計算也應有百餘卷其分量實較舊譯梁代譯婆沙為多所以序文有廣大難究之說並非無據現在再從阿毗曇心論的結構上看也見得它的殊勝阿毗曇心論結成二百五十頌區分為十品從第一界品到第八契經品是根本部分名稱與真諦所傳九分毗曇之說相應祇對九分沒有涉及戒品這大概是後人將這品材料歸到戒律中去處理的原故同樣從阿毗曇經撰出的甘露味論即有戒品本來佛說經中有法有律界限並未分別得那樣清楚就像增一阿含經裏即夾雜戒經之說從前道安對於譯家不知道簡別這一部分省略不譯因印度習慣這部分不容許沙彌和白衣同看還有過責備可證佛經中法律俱備而釋經的毗曇也就法律俱釋了後來編纂三藏的人替它們分別歸類關於說法的歸入毗曇說律的歸入毗奈耶這樣後世論師也就略去戒品不放在毗曇內說了阿毗曇心論的主要八品是界行因業使同隨得賢聖世間智定契經諸陰這些和毗曇經九分的名目大同祇次第略異九分中原譯有定而沒有智似乎不可解但細尋其故乃知是翻譯上的錯誤已另譯為名味句了因為梵文中的味字為便繕那慧字為般羅若兩個字的前一部分形狀相近就悉曇的書法而言後一部分的聲音又大同所以會傳寫錯誤翻譯的人乃隨之誤譯譯家對這個字也有些懷疑所以特別加注說這非飲食之味味即是字由此阿毗曇心論主要的八品實際和阿毗曇經的八分相符這一層久已無人領會假使沒有保存真諦的舊說恐怕經論的源流再也辨別不出了另外從阿毗曇心論所談的義理上看實際是兼採各種毗曇的長處的像開頭界品用三科的區分來談有為法是用了舍利弗毗曇解經的特點契經品用識智使三門來解釋諸蘊又採取了品類足論解經的方法這些都是選取成就它之名為心論就還不止限於一毗曇經的要義了還有阿毗曇心論的體裁全篇韻文也算是獨創慧遠依著譯人的讚揚稱為擬像天樂現在此論的梵本不存它的聲韻之美難以領略不過就從它蛻化而成的俱舍論頌本而觀也可間接地知道此論頌文的優美俱舍論頌即是阿毗曇心論雜心論輾轉改訂而成博得當世聰明論的稱號這因為佛說九分教或十二分教中間的頌大都和經文有關而多重述義理為之頌的體制很嚴密音節格律不能稍亂這比較中土的律詩為難工如用義理來作頌選字酌音還比較容易致於律論主要運用法相名數的造頌就覺得更難所以十二分教中戒分論分很少有作頌的各種毗曇先無頌體法勝獨首創之可見其工力之深在曹魏嘉平中公元二四九二五三年西域僧曇柯迦羅初傳戒本來中土他就曾自述開頭學習外典精通文辭曾自負沒有難解的文章後在某寺見到阿毗曇心論反復不得其解心裏很為奇怪及請寺僧解說乃嘆服佛法深廣而發心出家見高僧傳卷一因此阿毗曇心論在內容上和形式上都達到上乘地步它之能馳譽全印度並影響於後世的毗曇並不是偶然的原載現代佛學一九六一年第一期略述經部學經部是印度部派佛學裏很晚出的一派因而後世區分佛學為四宗即婆沙經部瑜伽和中觀將它放在十八部都歸於婆沙一宗以外但是它和大乘佛學的關係卻異常的密切就像依據經部的前驅譬喻師說而結構的成實論在我國梁陳時代常被認為中觀的階梯甚至說是大乘一類其次採用經部本宗學說批評有部而成的俱舍論隋唐時代的研究學者也自卓然成家作為瑜伽的羽翼再後發展的經部說被吸收在陳那法稱的著作裏以致有隨順經部的瑜伽系同時也有了隨順量論的經部系從這些上面都見得經部的學說怎樣地和大乘聲氣相通祇是舊籍零落經部學說前後發展的詳細經過已無可考現在僅能說明它的一個大體輪廓先從經部的名稱說起照唐人所解他們唯依經為正量不依律和對法所以稱為經量部見基師異部宗輪論述記卷中此說並不完全正確經部本名應該是說經部見陳譯部執異論梵文音譯為修多羅婆提那見失譯舍利弗問經原文係它末尾的婆提那即是說的意義這樣名稱正和說一切有部說假部等同例巧用一部的中心主張來作標幟的就實際言各種部派都以佛說為宗沒有不談到經的為什麼這一部說經便成了特別的主張呢這自然有關於它所說的並非一般的經而另有所指像解釋俱舍論一部分的隨相論陳真諦譯本就稱此部為經優婆提舍師便很好地說明了經部所重視的經是優婆提舍屬於十二分教中的論議成實論的譯本裏即稱之為論經經部原來以論經為宗隨後乃廣泛運用一切經所以僅僅看它是以經為量還說明不了它的真相就從這一部的名義上可以推論出它的思想本源乃出於佛滅以後持法者的一個系統這些持法者中間有祇信九分教的也有相信十二分教的十二分教比九分多出了因緣譬喻論議三類它們原始的結構如何已沒有明白的記載但從律藏像四分律等所提到的各種分教即雜藏來看大概也是編輯佛說的偈頌而成的由此演繹出好些因緣譬喻經類在我國譯本中還保存著如百喻經賢愚經撰集百緣經等但是譬喻師開始是重點地採用法句經一經作樞紐來組織學說的他們或者從法句經的本末次第去推求說法的緣起和印證這樣成為譬喻者或譬喻師依照成實論十二部經品所說本末次第即是譬喻或者就法句經推求義理而專走論議的路子這又成為論經師他們對於法句的處理祇要看晉法炬等譯本法句譬喻經和唐玄奘譯瑜伽師地論所引法句經舊譯稱為論議的見論卷十八十九就可瞭然而他們最喜用的法句經乃是法救改訂本題名憂陀那聚就憂陀那語源分析可以作日出解以憂陀為出陀那為日所以秦譯法句經作出曜經因而信奉法句經的學人也稱為日出論者這樣譬喻者論經師日出論者都屬一類都是經部的前驅在有部的論書異部宗輪論和大衆部正量部所傳部派源流據清辨中觀心論釋所引裏經部被看作有部的一個支派這大概近於事實有部的一群禪師們像馬鳴僧伽斯那等都有譬喻類的撰述特別是改訂法句經的法救即係有部四大家之一而他和另一大家覺天有好多主張和譬喻者相同散見大毗婆沙論各卷實際他們是贊成譬喻師說的其後由譬喻者吸收餘部學說逐漸組成獨立的經部一派乃和有部對立起來他們中間最顯著的不同之點即是有部重論對法而經部重經論經典據範圍是很有出入的舊傳譬喻者學說的實際組織者是鳩摩邏多童受他的著作有數十部之多其中很重要的一部喻鬘論早年在龜茲故地發現了梵本殘篇內容和我國秦譯的大莊嚴論相同但秦譯本題為馬鳴所作似乎真正的作者是誰還有疑問不過據梁代僧祐所傳薩婆多部師資記目録見出三藏記集卷十二鳩摩邏多和馬鳴後先相接他的作品很有補訂馬鳴舊制而成的可能所以新發現的殘篇和舊譯作者題名會不一致就從大莊嚴論的內容看可見譬喻者所謂譬喻並不全同於經律中泛泛的喻言而是引用一些故實來發明法句經的意義這就稱為莊嚴用具體事物說便是華鬘有如大莊嚴論九十事每事開端常舉出法句經數語像論卷二第四事首云夫聽法者有大利益增廣智慧能令心意悉皆調順這就是法句經多聞品多聞令志明已明智慧增云云其餘可以類推再引故事證明使人有更深刻的認識成實論說敘述本末次第為譬喻正是此意另外鳩摩邏多年代因為比較馬鳴稍後應該生在佛滅度後七百年公元第二世紀唐人也說他是佛去世後一百年的人這是誤會了西域記裏說到和他有關的竭盤陀國阿育王即是從前摩揭陀的阿育所以有很大的出入唐人又傳說鳩摩邏多的著作有癡鬘論顯了論等見普光俱舍論記卷六又造九百論這些都已遺佚現在剩有解說禪法的四十三頌保存在秦譯坐禪三昧經裏參照出三藏記集卷九所載僧睿經序又有數頌見於俱舍論入大乘論的引文鳩摩邏多的弟子有訶梨跋摩師子鎧著成實論舊傳他著書的用意是偏斥毗曇有部專同譬喻真諦三藏也說他用經部義檢俱舍論所引經部和他很多相同見三論玄義卷上經部本來從譬喻師說蛻化而成所以同於譬喻也就會多同經部但訶梨跋摩著書所說已不能算是譬喻者的正宗這看玄暢所作訶梨跋摩傳記見出三藏記集卷十一就可知道傳稱他不滿意於師說而和他所認為五部本源的僧祇其實是分別說部共鳴於是用淘汰五部商略異端的方法來著成實論其先鳩摩邏多著喻鬘論即已有了和會各家的傾向因而論首所歸敬的人除有部諸論師而外還有牛王行道者即犢子部到了訶梨跋摩更採用分別說部的議論對於原來譬喻師說可謂有了進一步的開展從譬喻者遞嬗為經部這須歸功於室利羅多勝受他在阿逾陀郊外著作了經部的根本毗婆沙見西域記卷五又成唯識論述記卷二十一此書現已失傳它的篇幅相當大玄奘遊學印度的時候曾在祿勒那國費去一冬半春的光陰才學習完畢見慈恩法師傳卷二室利羅多的重要主張散見於唐譯順正理論論中引文稱他為上座而不名其後有大德邏摩西藏傳作羅多著書不詳但順正理論也引用了他的學說數條譬喻者轉成經部師之後仍有一部分堅持異見的不與合流所以順正理論卷二十五指出上座的親教門人和同見者對於上座有不承信的而順正理論中觀釋論等常常並舉經部和譬喻者的說法在經部看來那時的譬喻者也可算是經部異師見成唯識論述記卷二十一現在這一方面的著作要推陳譯的四諦論為代表論的作者是婆藪跋摩世鎧生在世親之後大約是公元第五世紀末葉的人從他著書的序頌看在他以前解釋譬喻者中心宗義四諦的有迦旃延的略論和佛陀密覺親的廣論迦旃延的人世不詳佛陀密則明明是世親的老師見陳譯婆藪槃豆傳他的廣論除了廣釋文句和義理而外還有次第即因緣本末和莊嚴即為幫助瞭解而引證的故事這完全是譬喻者的作風至於四諦論引用經部不同的說法都明白區別出來又還常以俱舍論所說為典據可以見到後來譬喻師立說態度的一斑經部的源流大概如上現在來敘述它的主要學說這隨著它的前後變遷可以分作經部前期即譬喻者說經部本宗說和經部後期說三類為經部前驅的一群譬喻者見解雖不完全一致但他們的中心思想依據大毗婆沙論所引用的資料不外下舉的幾方面最先譬喻者是以四諦概括佛說來製作他們主張的綱領的這看現存有關譬喻師的著述成實論實就是諦四諦論的結構莫不如是便可瞭然另外和譬喻者相對立的有部簡別譬喻學說也是就四諦上著眼的像大毗婆沙論卷七十七就很明顯地指出舊對法師分別論者和譬喻者解釋四諦的不同譬喻者說苦諦是名色而舊對法師則為五取蘊分別論者又說為有漏八苦譬喻者說集諦是業惑而舊對法師為有漏因分別論者又為招後有愛譬喻者說滅諦為業惑盡而舊對法師為擇滅分別論者又為愛盡譬喻者說道諦是止觀而舊對法師為學無學法分別論者又為正八道譬喻者這些特別說法後來順正理論卷五十七還加以批評以為只說名色是苦諦乃因它的實體即是五取蘊之故又祇說業惑為集諦乃由於惑力能夠系心令向餘趣業力令其自體各別的緣故又祇說煩惱滅為滅諦乃因滅了煩惱就會於色等得到解脫又只說止觀為道諦乃因止觀可以攝受一切的聖道這樣譬喻者對於四諦的解釋不免是適應時機別有用意並非究竟之談如此批評滿懷成見當然難言平允實際譬喻者之重視四諦又作特別的解釋都有它的典據即是依照法句經的要旨來為組織法句經說八直最正道四諦為法跡見吳譯本卷下道行品又說道為八直妙聖諦四句上見秦譯本卷十三道品這些都是以諦和道並舉可見譬喻者之宗四諦完全準據修道的方針由此解釋各別諦相也一依修道而說像法句經說鹿歸於野鳥歸虛空義歸分別真人歸滅又說若不自煩惱猶器完牢具如是至泥洹永無塵垢翳上均見秦譯本卷二十三泥洹品這是說修道究竟歸宿涅槃而涅槃乃是惑盡的意義又如說深入止觀滅行乃安見吳譯本卷下沙門品這以止觀為修道又如說數自興煩惱猶彼器敗壞生死數流轉長沒無出期見秦譯本卷二十三泥洹品這以惑業為生死因即是集諦又如說一切名色非有莫惑見吳譯本卷下沙門品這說於名色起惑屬於苦諦以上都是譬喻者解釋四諦的典據不能說它不依諦相其次譬喻師的四諦理論完全用一心法作貫穿心依名色乃成苦體又由惑業系縛而心垢止觀調心而垢淨所以四諦安立系之一心此說也出於法句經現在看南傳佛典中所保存的法句經舊本開宗明義第一章即是心為法本心尊心使云云的兩個頌參照吳譯本卷上雙要品是特別標出心性本淨的根本要義的這樣的心法譬喻者還給以很扼要的形容就像法句經吳譯本卷上心意品所說獨行遠逝寢藏無形唐譯瑜伽師地論卷十九引文作心遠行獨行無身寐於窟依照舊解這有四方面遠逝說心的過去前際很難瞭知獨行說它現在次第生起不會同時而有多心無形說它生起剎那即滅並無實體寢藏說它未來住在四種識住色受想行中能往後世為四諦樞紐的心法便是具備這些相狀的它既前後相續隱微難辨因之也稱為細心並且連類而來的更有心法次第起沒有相應見大毗婆沙論卷十六五十二九十九十五一百四十五尋伺即心的粗細狀態遍於三界見大毗婆沙論卷四十二五十二九十一百四十五滅定有心見大毗婆沙論卷一百五十二等等主張最後譬喻者運用分別說的方法對於一切所知境界聯系修道實際來區別假實很多與有部相反例如說有為相因緣表無表業擇非擇滅等都無實體這便引起有部激烈的爭辨而使譬喻者和它對立的情勢更加顯明譬喻者的學說到了訶梨跋摩著成實論時得著新的發展它吸收分別說部的所長來批評各家但重點仍在於有部像成實論首篇十論的各品秦譯本卷二卷三就有七論正破有部的主張另外它和譬喻舊說不同之點如說苦諦為五取蘊滅諦為滅三心等都針對有部立言成實論主張五取蘊是假名而四塵色香味觸為實法因五蘊從四大起四大又由四塵成故祇有四塵實在這就和有部之說相反致於滅三心的次第依二諦論門觀假說我法是世諦無而五取蘊為勝義有更進而觀五取蘊於世諦假而空於第一義是真如是兩重輾轉達到究竟完全採取分別說部的理論這就和有部相去愈遠了經部本宗的學說在異部宗輪論裏曾列舉了幾條它的中心思想表現在有微細的一類相續的諸蘊因此說諸蘊法能從此世移轉到後世而得著說轉部的名稱此種思想顯然由譬喻師細心說發展而來它有些像犢子部的有我主張但不承認勝義諦中的實在補特伽羅所以大毗婆沙論卷五十六引用譬喻師說能系結是實所系事是假補特伽羅亦假世親依經部義作俱舍論最後即痛破犢子部勝義補特伽羅之說從這些上面可以見到經部本宗真正的主張異部宗輪論也說經部執有勝義補特伽羅那明明是一種誤傳清辨中觀心論釋詳敘小乘部執處即謂經部本宗說補特伽羅於勝義中不可得可為旁證經部本宗更重要的主張見於上座勝受的著書現在依據順正理論引用的資料知道它的重點是隨界說這也和細心說法相關勝受以為一切法生起之後會有熏習留下了功能此即是界界有種子種姓種族等含義既說熏習就應有能熏所熏這又如何分別呢依勝受的解釋色法和心法可以互依互熏而各留習氣以成界衆生相續存在之時界必隨逐故稱隨界它和色法心法的當體不能決定說是一是異因此也說六處為界後來大乘瑜伽學系即有類似的說法以種姓為六處殊勝六處所生等但隨界在相續存在的中間逐漸變化輾轉殊勝成為後來再生那樣法體的因性這一因果的理論大大改變了舊說的面目其顯著之點是一因法剎那滅八法滅不必待因二過去法作因以前後法為因果三因法自性各別法各有界數量無邊四法因無體過去法滅故如此和說一切有部主張六因以同時因果的俱有因作基礎的看法根本相違而在四緣中對於所緣緣的解釋也有了很大的出入舊說各種心心所法的所緣各有它的不同條件比方前五識所緣只限於現在法而第六識則可通緣過去未來一切法由此六識緣境有三世的不同又就心心所而言緣現量境凡有三種情況前五識依根的現量必定與境同時第六識覺了現量可通異時心所受的領納現量則到後來隨念的時候才覺苦樂等等這些很不一致勝受對這方面另有他的創見他將所緣緣賅攝在因法中因法又祇限於過去於是前五識和第六識心王和心所都看成同樣的覺了現量所緣緣的意義便歸於一律這就是說各種心法的緣境在第一剎那根境為先到第二剎那識了方起當根境先行時假說為見實際第二剎那才是了別所以不問是前五識或第六識也不問是心或心所所緣境都在過去後念覺了方成現量如此解釋就有好些特點其一舊說對於根識和境的關係曾有根知境和識知境的兩種不同看法現在和會三者而說根但假名為見但又不能離根而知境其二由三法和合而生的觸心所是假有說和合也非實在因為根境一剎那識又是一剎那本不同時但從完成了別一件事上假名和合其三所緣和緣一致可不另加簡別譬如見杌以為真人雖是錯覺但杌既為所緣也就成緣假使以時間分別前念為因也就是境可不別說其四現量不是一剎那間的事但所緣屬於第一剎那隨此剎那法體或有或無第二念所緣可作有無分別其五所緣既在過去故境不必實但當前念境現前時有無各別後念緣慮隨之不同以上所說見順正理論第十五十八十九各卷又第五十一卷這些也都是和說一切有部所說絶對相反的有部在前階段的特點是善於說因像發智論料簡因性建立了六因四緣的理論後一階段的特點在善於釋境像順正理論將成立一切法有的根據放在六識現量所緣是實的上面現在都被經部推翻了無怪他們會對經部深惡痛絶破斥它不遺餘力但經部學說正反影響於其他各派的地方卻很多很大像瑜伽學系的建立諸法以種子為因固然和經部的隨界說一脈相通而到了唯識理論發展之後難陀主張以五識的種子作五根陳那又謂五根即是識上色法的功能均見成唯識論卷四這些也都由經部所緣緣以根境為先的理論推闡而出因根識不必同時故可在種子上安立根的名字及至最後法稱重顯因明將同時意識說成第二剎那以前念根識的對象相續為所緣依然符同經部所緣緣的理論參照就在經部師對因緣的解釋有了顯著變化的同時他們學說的全體組織也採取分別論者的論點作了好些修改像譬喻師舊時解說四諦以名色為苦諦本沒有什麼簡別但到了經部時代參用分別論說以為無情的外色只是苦而非諦苦諦必有它的相狀如三苦八苦等外色但由集因而得可說為苦卻無共相所以不屬苦諦見順正理論卷一又如集諦譬喻師義通指業惑但到了經部就祇取愛法為集見俱舍論卷二十二他們主張此說最力雖有人提出經文就勝而言來作解釋他們還是堅持不為少動這就和分別論者以招後有愛為集諦的說法極其相近推究這些變化的原因也可歸結到經部立說方法從來即偏於分別說這一點上像譬喻師所宗的法句經裏對於法的解釋就很明顯地說法歸分別因此他們理論的發展自然會逐漸和分別論者合流我們所見到的經部完成時候的四諦解說便與分別論者相去無幾了參照四諦論各卷還有經部在實踐方面運用分別論法也建立了一些新說本來從譬喻師說發展的成實論承認法無我而有滅三類心的次第觀法已經大同於分別論者經部學說更進一步作了分析像以五蘊和三無為總攝一切法而言五蘊由多種同類之法聚積假設在二諦分別上屬於世俗諦即是假有見順正理論卷五十八又三無為中無觸對名虛空由智慧簡擇之力餘法不生名擇滅但由緣缺而不生名非擇滅都無實體見順正理論卷十七這樣總說一切法的體空又如以十二處總攝一切法而言從極微和合而成諸識的依或緣在二諦門中也非實在見順正理論卷四這樣說一切法的體空所以經部有比成實論師更積極的法空理論根據使它的地位和大乘佛學愈加靠攏經部對蘊界處三科諸法祇說界是實在而界以種族各有自性作解釋完全屬於認識方面的看法大乘瑜伽學系在認識論的基礎上也將生起諸法的親因緣歸之於自性各別的名言種子由此攝大乘論說從名言種生諸法為自性緣起經部所說正與它的用意相同另外在梵藏文典籍裏所見的經部本宗學說還有很關重要的兩點其一是心法緣境的帶相說另一是心法自緣的自證說先談帶相說一般部派佛學都承認心外有境但正量主張心能直接緣境餘部則有兩種說法或謂由境引生心的印象或謂境映於心變現為一定表象再加了別經部即採取後一說他們以為心法生時必定變帶所緣境界的表象成為心法的相分換句話說心法緣境都是間接以表象為憑的從前唐代佛學家對於這一層似乎不很瞭然所以常說除正量而外所有小乘學派都主張心法帶相而緣境見成唯識論述記卷十五但據梵藏文資料祇經部有帶相之說並且此說原來和經部根境為先後方識了的理論相照應因為境在過去所以識了之時須有變帶行相以為媒介餘部就沒有這樣根據後世的批評家將經部本宗和所餘小乘部派綜合為婆沙宗的相對比常以有無帶相之說為一異點也就是這樣的緣故參照經部的帶相說由陳那開始導入瑜伽學說體系之內他在所著觀所緣論裏分析構成所緣的必要條件其一即是能緣方面帶有它的表象又在有總結性的著作集量論第一現量品裏用能量所量的觀點來解釋心法的了別境界以為祇得著心上顯現的種種行相參照內學第四輯集量論釋略抄第十一頁這些都採取了經部學說的優點但經部和瑜伽學系的區別何在呢這如智慧藏集論所指出即在於非無積聚色見藏文丹珠爾德格版經部許有存在於心外的色境乃是由極微積成的和合色參照二十唯識論述記卷三述記說經部主張極微輾轉和合由小成大體雖是假但五識上有其相即成五識的境界至如各各極微有一實體祇是意識所緣而瑜伽學系所說心法的相分完全由名言熏習的功能變現並不須用心外實境來作為依托次說經部的自證理論這在月稱的入中觀論第六地裏特別提出作為經部的主張而豫以批判依論文所說先又譬喻門成立譬如火點著時一時間便照見了它自身和瓶等物體又像聲音發出時也是一時表白了自己和各種語義意識正是這樣生起的時候了別境界也了別自體所以應該有自證這一回事再由憶念門證成見過某種境界的以後會記憶起來可以證明在見境的當時就對見的本身有一種領受否則不能有見過的記憶的這也是成立自證的理由參照法尊法師譯入中論卷三第十七頁又校刊原本經部此說也可看成從受心所具有自性受和境界受的雙重意義推演出來以心比受應有對於自體和境界的雙重了別再加以後時的記憶所以決定心法能夠自證它的性質與計度分別無關屬於現量由此在舊說的根現量俱時意識現量和定心現量以外還可加上一種自證現量經部的自證說也由陳那導入於瑜伽系學說他著集量論在現量品裏不但承認了自證現量並還於量果方面發展了自證的意義以為心法生起之時都自然地顯現出它自身和境界兩部分而各有了別或領納在這中間了別境界是量了別自體才是量果參照集量論釋略鈔第九頁又第十一頁它這樣地微細解析很引起餘派學者的不滿像清辨就在所著中觀心論第五品第二十頌以下對於其說痛加駁斥他以為顯現境界即是整個心法的作用更無顯現自體的餘地由此連帶著不承認有自證之義見藏文丹珠爾德格版但到護法依據密嚴經衆生心二性一頌仍將心法的緣慮內容分析為內外緣兩部分各有能所便建立了四分見成唯識論卷二其說傳來中國更得著玄奘門下各家的發揮以上是經部本宗學說的大概最後說到後期經部師他們宗經而外更信奉法稱所作的七部量論成為一種隨理的派別所有學說比較突出之點是結合著量論的自相共相的區分來解釋二諦照法稱的量論說凡法有效用能生結果的都屬於自相勝義實有也就是現量所得什麼是效用呢這像色以距離人目的遠近會使所見形象清晰的程度有種種不同便是效用如沒有這樣效用的那是共相法比量境界世俗假有參照後期經部接受這種說法作為二諦的解說就和本宗以一物或多物設施為有而分勝義或世俗的不很相同參照嘉木樣一世的宗派安立論釋第一百五十四頁以下依我們的看法這也和譬喻師中成實論者的議論有些淵源成實論說四大為假四塵為實即是從他們能否為五識的直接對象而決定的見成實論卷三另外後期經部對於識法的帶相也作了更加深入的分別依著西藏學者們所傳這有三種不同解釋有說能所取兩方面的數量是相等的譬如眼見錦繡等雜色的東西具備青黃等種種色彩眼識上便照樣有各各行相有說祇是總相不異盡管對象有多種色彩而眼識上的行相還是雜色一味又有說行相是多樣的不過次第而取作為一整體的想法參照嘉木樣同書第一百五十二頁以下在這些說法裏對照經部原來主張一心次第生起看第三說更覺理長後期經部還有些極端的主張像由無為非實有的論點出發將四諦中的滅諦解作如燈光滅但無所有即是一例參照四諦論卷三致於其餘學說多同本宗可不詳談嘉木樣一世書中總括西藏有關經部學說的資料列舉經部後期的要義若干條除上面所論及的而外像諸法剎那滅七部毗曇非教極微有方分或無方分有為法無實質因果不同時羅漢無退失乃至佛有生身有法身都是和本宗之說相同的經部立說本來從反對有部出發到了後期這種情勢更覺顯明有部嘗受到貴霜王朝統治者的支持建立學派的中心地帶在迦濕彌羅保守色彩極為濃厚經部學說則大成於東方阿逾陀等思想素來自由的地帶所以能發揚世親以理長為宗的求真精神而終於對有部成了極端相反的局面後世密教論書像上師相承次第論議等也判經部為初級大乘是不無所見的一九五六年一月三日改寫稿原載現代佛學一九五五年第十二期佛家邏輯法稱的因明說一序說佛家邏輯通稱因明它是從印度一般邏輯學說所謂正理的發展出來的正理學說的成形很晚佛家之有因明併加以重視為時更遲在公元前後印度學術文獻裏沒有正理學說中心五分論式的形跡可尋直到公元後第二世紀迦膩色迦王時候才見著和王同時的人物遮羅迦醫師馬鳴的著作涉及五分論式這比較起希臘的形式邏輯來未免太落後了因此有人揣測希臘邏輯的三段論式受了印度正理說的影響當然是不正確的不過就從第二世紀起印度這類思想頓然開展構成正理學派傳說創始的學者是足目並有了專門的著作和十六諦嚴整組織的學說那時候佛家方面大乘的思想雖然也很廣泛地在流行卻是對於此種學說取著反對的態度在龍樹的五部主要著述裏就有兩部是專破正理的這好像很奇怪難道大乘思想不要遵循邏輯的途徑嗎不是的龍樹在思維方法上的發展已經超過正理階段到達了辨證範圍他所著的中論就是一種輝煌的典範佛家既已有了高一著的思維方法自然對於正理學說不加重視了但在小乘佛家受到正理學說的影響即發生了專門研究西藏學者傳說佛家最初的一部因明著作是法救的論議門論此書已失傳內容也許和漢譯方便心論相倣佛因為此論也是傳說為佛家因明的創作並且早在龍樹時代就已有了的此後隔了些時彌勒無著的學說代興他們倒覺得正理學說可以採取而改組它成為因明這在結構上完全屬於論議一類保存了正理原來著重論證方面的特質同時還確定了因明這一名稱又重視它是和佛家自宗學說所謂內明的相待相成世親跟著努力發揚著了論軌和論式兩書論軌經我們考定即是西藏翻譯的解釋道理論至於論式祇有別的因明論書上片段引文而已另有成質難論即是漢譯的如實論反質難品當時也誤傳為世親所作到了世親的弟子陳那意譯為域龍更大大地發展了這種學問他先著了好些小品論文據西藏所據有百零八部但義淨祇舉了七部最後他自己加以總結成為一部大著集量論共六品二百四十七頌並還自己作了長行注解這一部論的各品都有陳那的創見以及對於本宗舊說和他宗異義的批判它的性質是一種集大成的固不用說而隨處闡明思維邏輯裏運用矛盾律的法則和著重同一律的希臘邏輯對照看來顯然放了異彩陳那門下的自在軍天主等都在有關論證的一方面特加發揮我國玄奘所傳譯弘揚的因明理論也偏重於此實在不能算是完整的其在印度此學到後來還有一番極大的發展這要推功於法稱法稱的名字最初見於義淨所著南海寄歸傳和譯本觀所緣論釋大概法稱就是和義淨時代相近即公元第七世紀的人他先學習了陳那的集量論感覺有好多論點不能滿意就著了量評釋論四品千四百五十四頌半併還自注其中的為自比量品法稱另外又著了六種書從各方面來成立量論連前一種並稱七支從他的著作整個議論來看是帶著揚棄瑜伽學系理論裏唯心成分的意義的所以後人也將法稱看作隨順經部主張實有外境的學派的學者他的學說影響極大後世注釋他著作的現存的藏譯本中就有十五家二十一部四百餘卷之多因此法稱的學說盛行西藏並經過公元十四世紀薩迦派的薩班慶喜藏再加總結著了正理藏論努力闡揚影響至今未衰此外晚近五十年來東西各國研究因明的人也多取材於法稱的著作特別是比較精要的正理一滴論一書因為它有梵文原本意義明確所以研究的人都集中於此試舉他們的成績就有梵藏文原典的校印有專門辭彙的編纂有俄德英法日等文字的翻譯並還有各種專題的研究這些都是瞭解法稱因明說最方便的資料也是和現代邏輯研究相銜接的途徑我們現在講佛家邏輯即以法稱正理一滴論為主要典據並隨處聯系其前各種學說用以解釋淵源刊定真義二現量佛家因明到了陳那的時候就從論議的性質變成了量論量是有關知識的所以量論帶著認識論的意味其後瑜伽一系的學者即依著量論的解釋成立他們的唯識理論印度諸學派對於量各有一種看法主張很不一致佛家因明其先也承認有現比聲三量後來陳那分析量的對象即所量不出於自相即特殊性質和共相即共同性質的兩類由此刊定只有現比二量法稱遵從其說也以現量為自比量為他比量來概括因明的全部內涵量的一般意義是人們要行動能達目的所必須預先具備的正確知識也可說是關於對象的正確瞭解它祇有現比兩類其中現量是離開了分別並且不錯亂的用離分別這一條件來限定現量的性質原是陳那的創見在他以前佛家舊說和他宗異說都是從現量的表面即各種感官和它們對象的接觸的關係上找解釋但陳那著眼於思維的階段而以沒有達到分別的程度為現量的界限一超過這界限便不是真正現量或者竟成為比量了什麼是分別呢這是思維從可以用名言概念解釋的角度去瞭解對象換句話說也就是在思維上構成適用名言概念表白的心像這樣的心像並非單純從感覺而來乃是和別種經驗的記憶發生聯想加了判斷而後構成的概括地說這時思維活動已經是到達了概念的範圍了陳那原來解釋分別的意義比較狹隘似乎一定要和名言相結合法稱更詳細地分析以為祇要適用名言表白的心像都屬於分別的範圍所以沒有瞭解名言的小兒思維裏一樣地有這樣的分別構成真限量的另一條件不錯亂是法稱所補充的怎樣的不錯亂呢這要從內外各種原因所發生的錯覺去加以區別有些錯覺由於內在的原因像眼睛有了翳障便見著空華等有些由於外面的原因像見了旋轉的火焰以為火輪等又有些兼有內外兩方面的原因像乘船見著河岸的移動另外還有些出於病態的像生熱病的人會見聞錯亂等真正的現量一定要離開了這些錯覺如此由離分別並且不錯亂所得的知識範圍較小可說是純粹的感覺但是從現量的形式上仍可以區別出四種來第一五根現量即是與五類感官相聯繫的像眼的見色耳的聞聲等都屬於原始的基本的現量第二意識現量這是思維發展向概念活動的過渡階段它和感官認識及其對象關係密切就以感官認識做它的等無間緣它一定是感官認識所引起這是緣中間沒有夾雜這是無間並可以看做在一類心相續的裏面這是等而它所認識的對象又是跟其前的感覺對象相似相續而來所以它還是離分別不錯亂可說為現量的現在要問意識現量的同時五根現量還存在不存在呢後來五根現量要不要再生起呢關於這類的問題法稱以後的各家更進行了詳細研究所得的正確結果是五根現量一剎那便完了第二剎那一定是意識的活動即意識現量其後即可純由意識開展無須再有五根現量來夾雜的第三自證現量這是心法和心所法對於自身的瞭解也就是自己意識心法瞭解對像的總相心所法則瞭解對像的某一方面或某種意味在它們瞭解對像的同時也對自身有一種瞭解譬如眼見色相覺得賞心悅目在這見色的時候不單是瞭解對像為色並還瞭解是見又在覺得愈快的時候也瞭解這是愈快之感這些都是從後來記憶上會生出是見是感的印象所以推想當時見感對於自身一定是有過瞭解的並且它們在時間上性質上都不容有分別有錯亂所以也屬於現量這如要用常見的事情來作比方最好不過於燈火了點著了燈照見物相同時也照見自己那麼心法和心所法有自證的一回事是說得通的第四瑜伽現量瑜伽指心理極其安定而和道理契合的狀態在這樣狀態裏對於事物的瞭解也是現量的這類現量要依據隨應一種道理結合了事物在意識上反復顯現這就是修習到了極純熟的地步就會生起對於那一種道理的實證這時道理明明白白地顯現在意識上無異乎五根之對五境完全放棄了文字上的瞭解也不會發生錯亂所以說為現量從形式上區分現量祇有以上四種各種現量所緣的境界即對像是否有共同的性質呢有的這即是對像的各別自相各各特殊不關名言的相狀要是具體些解釋可以依著五根現量的對像加以分析舉出它的特徵像眼耳根和色聲境相對一定有空間的距離因而分得出遠近對像的相狀如果依著距離遠近會在思維裏現出不同程度的明晰印象那就是自相的因為它是完全受著對像自身限制的假使不管距離遠近所現的印象總是同樣清晰那便由思維結構而成和對像本身無關而不屬於自相了所有自相都是真實的存在並還屬於勝義這和名言假設相對而言的存在有它的獨立體性和作用的和這些意義相反的相狀叫做共相它是比量的對像法稱這樣解釋自相承認對像和思維分離實在帶有揚棄瑜伽一系學說原有唯心成分的意味他在這裏就是隨順著經部的學說的最後說一說量的作用和它的結果量譬如用尺量布一尺尺地去量是量的作用瞭解的長度是量的結果量和量果對於現量知識即現量智的關係是怎樣的呢正確地說現量智的本身就是量果因為量的作用如能符合境界得著正確的瞭解就算有了結果這瞭解的本身即現量智用不著另外去尋找的那末量的作用又是怎麼一回事呢這還是可在現量智本身得著的但是這從它反映對像即生起印象的一方面而言有了印象才有瞭解所以從瞭解分開來說為量的作用或者疑惑量和量果一體不是因果混雜了嗎這也不然這裏不用能生所生那樣的因果關係去解釋祇說它們相待安立不妨各作智的一部分印象與瞭解既不是一回事也就無所謂混雜了後世唯識家相見自證三分學說即在這樣根據上成立的以上關於現量各方面的解釋法稱所說的和陳那天主所說基本相同不過採用經部學說承認實有外境它的唯物傾向是很明顯的至於似現量法稱沒有談到這可以參考因明大小二論即理門和入論簡單地說似現量不能視為比量因為它的對像還是自相但有分別有錯亂不成現量所以說它為似量三為自比量人們的正確知識除掉現量就祇有比量現量以純粹的感覺為主範圍狹隘比量卻通於思維的絶大部分思維邏輯是完全包括在內的這可分作兩類自己瞭解事物作用的叫為自比量將自己的知識傳給別人或者提出自己的主張來加以論證這些叫做為他比量兩類比量的性質成因都一樣不過為自比量用思維為他比量用語言形式上顯然不同而思維和語言原來密切相關所以也可說為自比量是結構語言的思維為他比量是發表思維的語言二者祇各有偏重而已現在先說為自比量比量屬於間接的知識乃是依據已知經驗推度未知事物的推度的方法要憑藉一定的理由即因來做媒介從已知的部分通到未知去這樣的因應該具備三種性質即三相由此為自比量也說為從三相的因所生的知識而這知識的本身即係量果和前文所說的現量的情形是相同的現在問因的三相是些什麼呢第一在所要推度的事物即所比上的確有因第二在和所比同類的事物即同品方面決定和因相關第三在和所比異類的事物即異品方面決定與因無涉這裏所用的所比同品異品這幾個術語還需略加解釋所比是說思維裏要加以某種差別判斷的事物某種差別的術語叫法含有這種差別的事物便叫有法因此所比不外是一種有法同品呢就是所比以外的一些有法含有所作判斷的共同性質的在因明的典籍裏常常舉當時各學派所爭論的一個主題來作說明的例子即是聲常呢還是無常聲在這裏主要地指概念說不單是泛泛的聲音有些學派像屬於婆羅門一系的認為概念原在事物以外永久存在著或者概念一經構成以後就再也不會變化消滅這些都是說聲常住的佛家不然說聲無常現在還可以用這個例子來作上文的說明假使我們要對聲加以無常的判斷這裏聲就是所比在它以外的事物像瓶盆等日用器具也會有我們所要判斷的無常性質這祇指一切無常現象的共同性質而言那些就可看做聲的同品至於異品呢原來是非同品的意思這可從最寬的範圍說同品以外的一切事物都是異品又可從最窄的範圍說和同品正相反對的才是異品也可以直接地說沒有同品意義者就屬於異品現在仍以聲無常那一判斷做實例印度多數學派都承認有純粹的虛空它和包涵其中的物質變化無關不會有無常的意義所以可當作異品明白了所比同品異品的所指我們就可以總結說對於聲無常這一判斷要舉出它的正當理由即因來一定是在所比的聲上面含有著的也和同品瓶盆等決定相關的卻對異品虛空決定無涉的這樣說那個因是具備了三相的具備三相的因又有三樣不可得的自性的果性的這些都從因和所要加的判斷法的關係上來區別最初不可得因像在某一處作沒有瓶那樣東西的判斷而以沒有認識到瓶為理由便是一例這在我們思維裏已經有了可以發現瓶的一些條件如相當的空間明度乃至意識的期待等等假使真有瓶那樣東西一定是會認識到的現在卻不然自可說是沒有瓶的了不可得因就是如此構成的人們的思維常常要和從前的經驗比較並隨處用矛盾律作決定不可得因可算是一個最突出的例子其次自性因這說祇有所要加的判斷法的本身才是這樣的如判斷這是一棵樹因為認識了它是楊柳的緣故楊柳屬於樹的一類說楊柳即含有樹的意義在這全用概念的外延關係來作判斷晚世因明裏論證偏重形式的也常用這類方法像唐代玄奘所作有名的真唯識量就是的但這樣論證的效果有時祇限於形式上的正確而不一定能服人之心最後果性因這依據經驗上時常連帶生起而可說為廣義的因果的兩件事取它的果來推因好像由於某處已經有了煙的緣故便判斷那裏會有火這在經驗上已認識到煙是有火的結果所以由煙就可以推出做它的原因火來多數比量均屬這類型式範圍極寬以上三樣因第一應用於否定判斷第二第三應用於肯定判斷但它們成為正確理由的根據完全相同一定要和所加的判斷法有相隨不離的關係人們思維作否定判斷的時候對於所否定的事物必須有過經驗這樣從清晰的記憶意識到現在不能再發現它才決定說它沒有否則像時間地點乃至它本身都很遙遠的境界即使未曾發現也不能判斷它的有無作了判斷也沒有意義因為無法去作檢驗的緣故現在由這樣的根據來說不可得因照它運用的方式可以區別為十一種第一是總相的叫做自性不可得因譬如說現在這裏有了一些可以認識到煙的條件而煙不可得當然是沒有煙的了這是從煙的本身不能認識來作否定第二聯繫到果性因而有果不可得因例如在這裏沒有煙的認識就可以否定發煙的原因火第三聯繫到自性因而有能遍不得因像前文所說自性因可用兩個有種屬關係的概念為依據這兩個概念必定是互相交遍的範圍較寬的一個上位概念叫做能遍較窄的一個下位概念叫做所遍假使沒有能遍概念所表示的事物當然所遍的也沒有譬如在這地方判斷沒有能遍的樹自不會再有所遍的楊柳其次否定判斷不必限於事物正面的不可得如有和這事物相反的現象可得同樣地能否定那事物所以在上面所舉三種不可得因而外還有種種相違可得的否定因由此第四為自性相違可得因這直接從自性不可得因推了出來如在這裏見著火便可否定冷的感覺因為火同冷覺的自性是相反的第五聯繫果性因又推出了相違果可得因盡管沒有相反的事物祇要發現了它的結果一樣地可用作否定判斷的根據如在這裏有了煙我們就可否定冷的感覺因為煙是冷覺自性相違法火的結果有煙一定是會有火的第六聯繫自性因運用概念成了相違所遍可得因這說明否定判斷的根據也可採用相違法所遍的事物不過它和所否定的事物相望時常是反對的而不一定互相矛盾因此它的性質特殊可以除外不用例如在這裏發現了燃燒著的東西而要否定冷覺但燃燒物也許祇是星星之火和冷覺反對並不矛盾那判斷的決定性就不大了第七再聯繫到果性因用和事物結果相違的法來作否定判斷成為果相違可得因例如見到了火就可否定氣溫的降低因為火同低溫的結果冷覺相反由此輾轉推到冷的原因低溫上也是相反而能夠豫以否定的第八聯繫自性因成為能遍相違可得因假使這裏有了和某種事物能遍相反的現象也可輾轉否定了那事物譬如見到了火就不許再有冰霜的感覺因為冰霜的能遍法是冷覺它和火相反有火冷就不存在冰霜之感當然也不會有了第九從果性因的關係倒轉來推度不由果推因而由因度果這便成了因不可得因譬如見不著火否定了煙火是煙的原因火不可得自然沒有它的結果煙了第十因相違可得因這從和因相反的事物輾轉推到結果上去譬如由靠近火爐否定了戰栗戰栗的因是冷覺由火否定了它也就否定了戰栗第十一是比較曲折的一些否定判斷叫做因相違果可得因只要發現了和因相違的事物的結果一樣地可用來作否定判斷的根據如在這裏見到煙而否定了戰栗這連結上面所說的例子看是很容易瞭解的以上十一種不可得因從果不可得到因相違果可得一共十種只是運用的方式不同論其性質都可歸到自性不可得因裏去這些格式常在思維裏運用著使否定判斷愈加明確所以屬於自比量的差別四為他比量一次說為他比量這是表白具備三相因的語言此量原來指的知識現在又說為語言是因為有了語言就能發生比量的知識知識是果而語言是因因上假立果名所以也可稱語言為比量這樣語言運用起來有一定作法在陳那以前佛家通用宗因喻合結的五分後來經過陳那精簡改為宗因喻的三支五分變三支這不單是形式上的簡化實際性質也改動了比量所用正確的因必須具備三相這從陳那加以刊定後才確實了其意義而三支作法正是清楚地表白這樣三相出來和五分泛泛地譬喻比度的方式完全不同的試舉一例如推論某處有火用五分作法可以這樣說某處有火宗發現了煙的緣故因好像廚房等處同喻現在某處也一樣地有煙合所以那裏有火結這是用同喻的格式要是用異喻可以從三分起改說好像池塘等處異喻現在某處不是那樣而有了煙合所以那裏有火結假使用三支作法就可這樣說某處有火宗發現了煙的緣故因若是有煙的地方就會經驗到有火好像廚房等處同喻若沒有火的地方一定見不著煙好像池塘等處異喻在以上作法裏因的一支表白了因的第一相所比定有同喻支表白了因的第二相同品定有異喻支又表白了因的第三相異品定無如此因的作用就完全得到發揮足以成立比量再不須另說其他部分了這可見三支作法的特點在於正確表白具備三相的因是不同於五分的陳那以後佛家發展三支的用法顯然有很分歧的趨勢一方面有要求各支形式上更加精密的這有護法清辨等完成這工作而經玄奘傳來中國益見進步在現存的各種著述裏隨處可見另方面又有要求各支形式簡單化的這由佛護月稱等完成這工作而傳播於西藏也影響到一般的著述法稱生當這思潮激蕩的時期也感覺三支形式有重加考慮的必要就提出另一種方案來這在他解釋為他比量的語言格式上表現得很清楚是可以特別注意的他以為為他比量的語言依著運用方便可有兩種不同的格式一種是帶著同法性質表示因和同品相合的一種是帶著異法性質表示因和異品相離的這兩式祇是合離的形態不同實質完全一樣都能表白因有三相而屬於完全的比量法稱這樣將同法式和異法式分開認為可以單獨運用再和為自比量中三樣的因分別結合便構成種種式樣先舉用同法式和不可得因連結起來的例子可以這樣說在某一處具備了可以認識那樣事物的條件而沒有認識到它就可說它是沒有的像龜毛兔角現在某處有了可以認識到瓶的條件卻沒有見著瓶這些話表白了不可得因的三相從某一處到龜毛兔角是和三支中同喻作法相似的正面表白因的第二相同品定有反面連帶表白因的第三相異品定無現在某處云云那句話和三支中因的作法相似表白因的第一相所比定有由此這幾句話表白三相具足可算是完全的為他比量其次用同法格式結合自性因比較復雜一如用純粹的自性因可以這樣說隨便那一種存在的事物都是無常的好像瓶盆等等這從無常性質的本身演繹出另一種普遍的概念存在它和無常性可說是一體凡屬無常的事物沒有不暫時存在的二如將自性因略加限制可以這樣說若是有生起現象的事物那就是無常的好像瓶盆等等這從存在因的本身區分出較有差別的部分來說依舊屬於自性因因為存在的事物也許時間長久不容易覺得它的無常現在舉出存在的差別性質有生有生必有滅便很清楚的了三還可以在自性因上加以特別限制而這樣地說若是所作的事物那就是無常的好像瓶盆等等這又從有生的本身分析出所作的一特點來所以是更加特殊的自性因另外像說一經努力便會發生的或者隨著因緣而不同的等理由也是特殊自性因的一類祇要人們已認識到存在有生所作等和所判斷無常有一定不離的關係那末現在憑藉記憶應用它們自然都是正確的理由不容多加解釋的以上三類自性因所舉的例子還要補充一句說現在聲是存在的或者是有生的或者是所作的這樣連結上文完全表白了具備三相的因成功為他比量再次用同法式結合果性因可以這樣說隨便那一處有了煙一定也有火好像廚房等等現在彼處是有了煙這也是表白了三相的為他比量不過煙與火的因果關係須是以前經驗過的否則便容易錯亂再說用帶異法的格式先結合不可得因可以這樣說隨便那一種實有的事物有了可以認識它的條件一定是會被認識到的好像那蒼蒼的顏色但在這裏可以認識到瓶的條件具備了而見不著瓶開頭幾句話表白因具備了條件而沒有認識到和異品實有的事物的相離即是因的第三相異品定無連帶著表白因的第二相同品定有末尾一句話表白因的第一相所比定有由此三相具足構成為他比量其次和自性因結合可以這樣說不是無常的事物就不會是存在的或者有生的或者所作的但現在聲是存在的或者有生的或者所作的這些話也表白了因的三相成功為他比量最後結合果性因這樣說隨便那一處沒有火也沒有煙而這裏是有了煙的這也是表白因三相的為他比量現在要問上面所舉的那些例子由同法或祇能明白了因和同品的相合怎會決定因和異品的無關呢由異法式只能明白了因和異品的相離又怎會決定因和同品的交涉呢實際有同品和異品裏都含有著的共因也有都不包涵的不共因不明白說出來是難以區別的這就要依靠語言的義勢意之所至即是義準來作檢驗了一般地說如果因真是和同品相合或和異品相離到達了它能表白和所判斷的法有一定不離性的程度那個因也就不會再通於異品或者離得開同品所以不管同法式也好異法式也好單用一種盡可以表白因的三相具足而無需同法異法並舉的因在自性因和果性因祇要性質確定用來固然不會錯誤就是不可得因正反相形也很容易瞭然的可是這裏另有一個問題那些式子雖說了因的三相卻沒有明白結論即是沒有三支裏面的宗難道這也不須說出來的嗎是的若在說因三相的語言裏已由義勢令人明白一定是怎樣的宗那便不必再說它了像前文所舉同法式或異法式連結不可得因的例子都可由義勢明白它的宗是這裏沒有瓶所以不必再說其餘各例也可類推五為他比量二像前面所說同法式或異法式的為他比量即比量的語言都可以不說宗但有時為了完足語意起見自不妨將宗標舉出來並且在語言裏含蓄著的宗究竟怎樣才合式也應該有種明確的認識因此現在解釋一下宗的構成條件還是很需要的關於這一層從陳那的理門論集量論以來就有精密的傳統說法法稱也沿用了它以為正確的宗必須具備自性的自己的意樂的三種性質並還要離開各種錯誤先解釋各種性質第一宗只限於自性的在比量的語言裏以宗對因說它藉因而成立即以所立做自性真正的宗必定是說比量時認作所立的譬如討論聲是無常舉出是眼所見來做理由這就成了問題也可以先行討論而帶了臨時的所立性質但它並非原意所要成立所以不是真正的宗第二宗又是屬於自己的自己指當時立論的人而言一般立宗的依据都出於自他雙方共認的典籍但這不限制立論者思想上的自由並還尊重他的自由所以正確的宗應該是立論者自己所選擇而不受典據上的限制的第三宗義又是意樂的真正的宗要依立論者意之所在而定不能拘拘於表面的語言有如數論學派想論證神我的存在方便地用比量的語言說眼根等等由各種成分積聚起來的一定為另外一種法所受用這如同床席等為人所用一般這裏所說另外一種法的意思指著神我雖未明說出來卻可以一樣地當它是宗而加以討論其次宗具備了三種性質不一定就正確還要避開各種和很明顯的現象相矛盾的錯誤這可舉出四種來第一和現量相矛盾也就是為現量所否定的如說聲音不是用耳所聽到的這顯然和感覺現象相違不能成宗第二和比量相矛盾的如說瓶是常住的雖然瓶現在還完好但是它終會歸於毀滅這可以想像得到的所以那樣說法與比量的結果相違不能成宗第三和一般人共認的事實相矛盾的如說太陽不是恆星這非常識所允許不能立宗第四和自己的話相矛盾的如說比量不是量這話自相沖突更顯然不成為宗凡是真正的宗一定要離開這些錯誤現在再來解釋正確的說因語言要避免些什麼錯誤最先因所說的是三相假使有一相未曾說及自然是錯誤的這叫做缺因過不過像前面所說用同法或異法的比量格式表面好像三支不備而義勢已經具足就算不得缺因其次雖說了三相而立論者或敵論者不承認或有疑義也算是錯誤的這又可分三類第一關於因的第一相即所比定有相的若立敵雙方不承認或疑惑時都是不成的錯誤如辨論聲是無常提出非耳所聞做理由這在立敵雙方都難承認叫做兩俱不成又如尼犍子建立樹木有意識的宗舉了剝皮就會枯死的理由在立論者也許依據人們有皮膚即有意識這一點而說但人們的死亡是以一切根識消滅了為斷而這樣的意義在樹木上找不出來所以那剝皮會死的說法不成為有意識的理由又如建立苦樂等感情都是無意識的提出有生滅無常來作理由但說這些話的是數論學者他們的本宗只承認一切現象有轉變而無消滅所以那樣的理由是連他們自己也不允許的以上的兩種錯誤合稱隨一即立敵任何一方不成又因的本身有疑義也屬於不成的錯誤譬如遠遠地看到好像是煙的現象而實際是蒸汽是灰塵是霧氣等還不能決定要是就用來證明那地方會有火當然也是錯誤的這叫做猶豫不成又如因所繫屬的地方不能確定像聽到山谷裏孔雀在叫便指定某一處有孔雀但某處距離既遠是否真在那裏發出雀聲呢無法決定這樣理由也犯了猶豫的錯誤可稱為所依不成又因所依靠的有法本身有問題連帶地使因變為不成如勝論學者主張隨處有和靈魂同樣的我舉了隨處可以發現知覺感情等屬於我的性質做理由現在姑不談那理由是否正確而在敵論者裏面像佛家首先就不承認有所謂我那理由又從何處發生呢這種錯誤由有法連帶而來所以叫做有法不成以上六種是為一類第二關於因的第三相異品定無如果不成或有疑義都屬於不定的錯誤如說聲是常住的舉了可以認識得到為理由這在常住的同品虛空上固然會有在異品瓶等上也全部會有究竟聲是和瓶等一樣的無常呢還是和虛空一樣的常住無從決定就叫做共不定又如舉出了理由在同品異品方面都有卻不是全部的這些也是共不定詳細分別可有同品遍轉即全部含有因法異品分一部分轉同品分轉異品遍轉俱品同異兩品一分轉三類又因的第三相有疑義的時候也是不定如要證明某人不是一切智者舉了他能辨為理由在這裏我們對於這一論題的異品一切智者雖可看他作寂默的人智者稱牟尼有寂默的意義但它是否訥於語言並不明白就不能用來反證非一切智者一定會辨而成為疑問了所以那樣理由對於因的第三相異品定無構成猶豫依舊是不定的錯誤以上五種又為一類第三顛倒了因的第二三相便成了相違的錯誤正確的因應該在同品方面一定有異品方面一定沒有假使現在倒轉來變為同品定無而異品定有那末恰恰可以成立和原來主張相反的宗所以叫做相違這有同品全無而異品全有的譬如成立聲是常住提出所作性為理由這在常住的同品虛空上完全沒有而在異品瓶等上全部都有結果反證明了和原意相違的聲是無常的主張又有同品全無而異品分有的譬如主張聲是常住舉由努力而發生做理由這在同品的虛空上完全沒有在異品電等自然現象上雖也沒有但在異品瓶等人為現象上便有依舊證成了相違的主張聲是無常以上兩種又為一類三類犯錯誤的因裏第一第二都附帶有猶豫性的而言第三類似乎祇限於決定的但事實上會遇著有猶豫的情形這也算錯誤不過屬於不定卻非相違譬如聲論學者要證明某人是一切智者舉了能說話為理由這就異品說非一切智的人也會說話不成問題但同品的一切智者呢是否即以會說為特徵無從決定所以那樣的理由在兩可之間不能判斷宗的是非就成為不定的錯誤這是因在異品定有而在同品有無猶豫的例子另外還有因在同異品雙方都是有無猶豫的譬如勝論學者要成立人們活著的身體裏一定有我舉了具備呼吸瞬目等生命現象為理由這理由正確與否自該看它和同異品的關係如何而定但此處的同異品就有問題像敵論者佛家根本不承認有我由此立論者所舉同品在敵論者都視為異品而敵論認為異品的在立論者又成了同品這樣同異品上有因無因便很難說了並且同異兩品同時是猶豫的更沒有方法互相推論如是曖昧不明的理由判斷不了主張的是非所以歸於不定的錯誤一類像前面一再說到的正確比量語言能將因的三相完全表白出來就盡夠建立自己的主張完成為他比量的效用所以不須像往日採用三支的習慣另舉所謂喻的來作因以外的一支不過在那些比量語言裏還未能完全排除了舊的成分從前常用的如瓶如空等個別事例也可說為狹義的喻仍然被保留下來它們自也有一些作用就是關於因和所立法不相離的性質雖已有了概括說明可以引起人們的記憶來對照當前的事實承認那比量的判斷不錯但是再舉些個別例子使人記憶的印象更顯明而具體這對論證或辨難是不無意義的因此為著比量語言的徹底正確就須兼顧到這些殘餘部分不令犯一點錯誤以免貽纍於全體像從前三支比量裏所有各種喻過都應該瞭解而注意避免另外從前喻過裏的不成不遣祇說決定性的其實帶著猶豫的同樣是錯誤這可以增加種種猶豫不成猶豫不遣等過失名目還有從前喻過裏無合無離應該區別不能構成合離和沒有說出合離的兩類這樣一推衍正當的喻過就該有十八種了最後比量的語言犯了錯誤經他人指摘出來不管用什麼形式說祇要能妨礙立論者主張的成立都叫做能破有時候原來的主張並無過失而舉錯了這是出過的一類或類似過失從前就稱做過類因明裏叫它做似能破正理學派的經典對於過類有很詳細的分析陳那加以簡別祇承認十四種比較合理但這些仍可對照因喻的錯誤辨別出來用不著另立名目所以無需講說還有負處一類在立敵辨論的時候雙方都應注意避免舊說很繁瑣這可另行料簡此處也就從略了六結論佛家因明原是在和他宗學說鬥爭的過程中發展起來的法稱的論議發揮這種精神尤其積極此外他還憑藉陳那的業績用犀利的批判方法使因明學說更邁進了一大步這可舉幾點略加說明第一法稱重行改革了為他比量三支格式的意義在他以前陳那刊定了三支雖已變更了舊式五分的實質但形式上名目上還保留一些舊物特別是同喻異喻性質變了仍依然稱之為喻這在名實之間就顯明地存在矛盾陳那的理門論對於這一點也曾很費氣力地加以解釋但始終不能令人釋然到了法稱便堅決主張合因喻為一體不必再沿用喻的名目見上節這樣消除了實際的矛盾而為他比量語言之為整個因的表白其意義也就極端明確了並且法稱統一了因喻又還顛倒了它們的次序將相當於喻體的一部分提到最前面應用上便另有其意義從這樣的格式裏可以見出每一個因都是成功普遍定理的性質才用來作判斷的依據而比量思維是從一般認識應用到個別事例上面的演繹方式也隨著明明白白地表示出來由此很容易令人想及西洋邏輯的三段論式以大前提小前提斷案為次序法稱的改革三支很和他相近是不是有意參酌採用的呢這在現今還不能論斷無寧說他是隨順為自比量的性質要做到語言和思維的一致自然而然地創造了那樣格式不過由此新途徑打開以後思辨活動在語言中的表現相隨著擴充很大的範圍因為三支改成因宗銜接的次序證成了宗就可用作新的因去作進一層的推論輾轉相續可以開展無窮在印度佛學界實際運用像月稱等都有很好的成績而他宗如聲論學者也跟著主張改動五分的次序可見法稱改革三支的影響是很大的第二法稱掌握到語言應與思維一致的原則因而解決了為他比量裏一些糾紛的問題這主要表現在廢除不共不定相違決定的兩種因的錯誤上原來陳那用九句因的圖式分析因的正確與否到了第五句同品無異品也無便發現一種特殊情形在這一句裏的因祇限於當時成問題的事物即有法上才有它是獨一無偶的性質對於同品異品都無法結合也就與成宗無關這自然是錯誤的可是祇能視作不定一類叫它為不共不定其實和一般不定以同品異品都有因而成錯誤的原理完全不符法稱從根本上推翻這一不定錯誤的說法他以為平常思維裏並不會有不共不定那樣的情形因為比量思維都從同異比較上著眼假使當時想到的理由只限於所比的事物才有自不會進行比量那又何從表現於語言所以關於因的後二相錯誤祇能推及同時猶豫的程度為止決不能再有不共不定之說不過陳那所判也有事實的根據當時聲論學者便曾用所聞性的理由來成立他們的聲是常住主張所聞性只限於聲上才有豈非不共不定的例子這個並還牽涉到分外一種所謂相違決定的因的錯誤問題相違決定在陳那也視作不定因過之一而情形又很特殊因的正確與否一般祇就比量語言中因的本身而言如果它三相具足一無問題也就算正確了相違決定卻不然盡管所舉的因單獨看來是正確的而在立論的人有時候不得不承認另外的理由可以成立相反主張的也三相具足表面正確那末這兩種因碰到了一起就會使立論者自己也糊塗起來究竟誰是誰非無法決定這樣從另外一種因來使原先視為正確的因變成不正確祇可歸類為特殊的不定錯誤這也有實例如勝論學者對聲生論者說聲是無常以所作性做理由聲生論者便可提出反主張聲是常住所聞性故還可加上個同喻如聲性因為勝論本宗也承認有聲性即是聲的同異性此即種類的概念自然連帶著不得不承認所聞性因的正確於是構成相違決定勝聲兩家的主張都猶豫莫決了法稱對於這一種錯誤有比較深刻的看法他以為這在正常的比量中也是不會發現的只要任何一種因能充分地成立了宗即是再舉得出別種因來也自會相順相成否則原來因的本身就有問題話雖如此但勝聲兩家主張的矛盾事實具在又如何解釋呢法稱以為這祇是不信任經驗但憑言教演繹比量以致對於所討論的問題會構成這樣的混亂其實有些教條觀察不真認識不足很容易發生種種不正確的說法那都是經不起現量或比量考驗的法稱這樣分析相違決定的真正根據證明它並非正常比量裏所有的現象所以語言上也不該有這種錯誤他還另外舉了一例如勝論學者主張在一切事物之外另有一種最為普遍的有性事物結合到它才會有存在的意義現在問究竟有那樣的有性沒有呢這很容易明白只憑經驗好了我們可直截地用不可得因來作比量說凡是具備了認識條件而認識不到的事物都是沒有的如龜毛兔角現在於一切現象上並不能直接經驗到有性那自然是沒有的了這時候如還要相信勝論之說不肯放棄他們的教條就會依著經典另作一種因性的演繹而這樣說凡是一時現見它會和一切現象相結合的那一定普遍的存在有如虛空有性正是一時候連結到一切現象的所以它也普遍的存在這一比量在勝論學者無批判地信仰其本宗的自會碰到了上面所說的不可得因形成猶豫不決其實祇看他是相信經驗還是相信教條就會解決這一問題的第三法稱重視經驗的事實為因明理論建立更穩固的基礎如比量方面因和所立法的不相離性本以現象間的相屬關係為根據但從前的解釋不是分類煩瑣像佛家古師說五種數論學者說七種等便是意義模糊法稱改從經驗的事實出發簡單明瞭的限定它為自性的和果性的兩類自性的是就一種特質或概念加以分析而得果性的則由平常的因果關係而來這樣的相屬自身便有了保證再也不致猶豫至於不可得因從反面證明有相違的自性或相違的果性以見事物的本身不容存在這也同樣地易於確定的還有這些依據經驗便自然有個限度要是不能現量經驗的境界或者時間的太久空間的太大乃至自體的太微細超出了感覺範圍那都歸於存而不論之列這在上文已一再說過了以上各點都是法稱學說的精到處而大大地發展了因明理論的此外還有關於比量由遮詮運用概念的一種理論術語謂之阿頗歌法稱也特有發揮這擬另題介紹此處從略一九五四年一月二十八日三月二十五日改正稿原載現代佛學一九五四年第二四期
