長中雜增一有部是雜長中增一律方面漢譯摩訶僧祇律書名即標明是大衆的內容有五淨法等規定可以接受金銀確定是它們的律無疑不過我國傳說此律是犢子部的這可能把大衆作為多數的通稱犢子部也是多數派的關係所以大衆部的經律在漢文資料裏都保存了一點除四含外它們還有一個雜藏如大事漢文即無譯本僅在佛本行集經中保存了它的一些內容論方面據摩訶僧祇律記載在五百結集時只産生了經與律未提及論藏這更符合事實一些因為開頭結集不可能即有論藏但是從增一阿含序品看則有關於論藏的記載解釋序品的分別功德論還說該論是迦旃延在佛生時編輯並經佛認可的這論就是九分毗曇這一說法也有來歷異部宗輪論中也有類似的話認為大衆部後來分出說假部來即同迦旃延此論有關好像在分部前大衆部對此論不甚重視說假部對之特別加以弘揚九分毗曇的九類均以施設為題施設就是假設之意這樣看來至少在說假部時論藏已經有了大衆部的論藏以後有了變化據大智度論的記載當時在一般阿毗達磨之外還有一種解釋佛說的方法叫𮔢勒𮔢同毗我國智論開始流傳的寫刻本誤作蜫勒何以知道蜫是𮔢之誤呢因為譯者在此詞下注云秦言篋藏亦即三藏之藏近代日人獲原雲來作了考證說藏字在巴利文是𮔢勒等於梵文的因而蜫應是𮔢之誤才能對音同時錫蘭方面也傳有一種叫𮔢勒的優波提舍藏的解釋而且作者就是迦旃延大概即智論裏所說之𮔢勒論介紹這一𮔢勒時說原文三百二十萬言約十萬頌後來有所謂諸得道人採用此書的略本約十分之一在南天竺頗為流行這一情況正是大衆系最後發展到多聞部階段時期的情況所謂諸得道人就是指多聞部人而言因為多聞部舊譯為得多聞智論這一說法也證明大衆系分裂到多聞部時就有𮔢勒這與以前所傳如宗輪論述記等材料所說大致相同關於𮔢勒的內容智論也曾舉例說明總的說來它不似阿毗達磨那樣對法相作機械的分別而是以種種論門去探求佛說的真意解釋佛語不局限於文字的表面也不是隨便附會而是采用假設有若乾論門依著分別的論點來談如隨相門這個論門用來解釋佛叫人受戒時說的一句話自淨其意按字面講淨意就行了但意是心法心則有心所所以也得淨心所再者但說自淨其意便知與諸惡莫作諸善奉行等相關聯的法都包括在內所謂隨相門就是舉一反三的意思又如對治門這是說了解佛法不要僅從一面去理解應看到正反兩個方面如佛常講四顛倒法常樂我淨這是佛從顛倒一面講的進行解釋時還應看到另一面那就會得出四念住來身受心法如此三十七菩提分法都有其顛倒的一面都可用對治門方法去理解智論舉了這方面的例子後還說假如用𮔢勒方法進行論議那就會使議論無盡非常廣泛這是九分毗曇外的一種獨立的論門再加上大乘的空門就成為鼎足之勢三者阿毗達磨門空門𮔢勒門各具特點也各有缺陷毗曇走向極端則墮於有見空門走向極端則墮於無見𮔢勒走向極端則墮於有無大衆系到多聞部階段特別提倡𮔢勒影響很大後來從多聞部出家的訶梨跋摩作成實論就採用的𮔢勒方法書一開頭就是論門品即直接受了𮔢勒的影響的最初講二諦法門是從世俗門聖賢門講的佛說法有時候隨世俗有時候隨聖賢再如講因果關係說有時可以因中說果有時可以果中說因像這樣論門品一共分了十四門類其中也有隨相門以上是大衆部論藏前後變化的情況下面談談大衆部的學說要點大衆與上座的學說一開始就是對立的首先在方法論上大衆是一說上座是分別說這種分歧據異部宗輪論記載主要表現在對佛的看法上論中列舉了大衆系對佛的看法有十五條一諸佛世尊皆是出世二一切如來無有漏法三諸如來語皆轉法輪四佛以一音說一切法五世尊所說無不如義六如來色身實無邊際七如來威力亦無邊際八諸佛壽量亦無邊際九佛化有情令生淨信無厭足心十佛無睡夢十一如來答問不待思維十二佛一切時不說名等常在定故然諸有情謂說名等歡喜踴躍十三一剎那心了一切法十四一剎那心相應般若知一切法十五諸佛世尊盡智無生智恆常隨轉乃至般涅槃由此看出大衆系對佛的描述是採用一說的方法上座系相反採用分別說的方法它們認為非如來語皆轉法輪非佛一音能說一切法等等大衆還連帶講到佛的前身菩薩論也列舉了六條也是無分別說的如說如來色身無有邊際人們肉眼所見僅是一部分講到佛的處胎降生完全神話化了說是從右脅生出與常人種種不同所以大衆系的宗教色彩十分濃厚其次關於心性及其解脫的問題大衆的主張與上座乃至有部都是對立的以前上座系講心性本淨客塵所染淨心解脫有部就不承認染心可得解脫解脫的是淨心大衆也講心性本淨但它不是講心原來就淨而是指其未來的可能性未來可能達到的境界而且一達到淨即不再退回到染去這樣它強調的就是染心得解脫如衣有污垢未洗時臟洗後即淨先後並非兩衣仍是一衣有部則主張心是染的解脫時去掉染心由另外一種淨心來代替前後是兩個心不是一個心化地部認為心性本淨去掉染污就會出現淨心主張也不同過去一般認為心性本淨是大衆部的主張上座系無此觀點以致有許多地方講不通現從各方資料綜合研究上座系也講心性本淨南方上座就明顯地具有這一論點問題不在於兩者講不講的上面而是兩者所講的含義大相徑庭一個是指心所固有的一個則指心的可能性大衆系的學說對其他派以及後來的大乘發生影響這是案達派以後的事案達派對大衆系學說做了大量的發展和豐富的工作因而影響也隨之顯著起來北傳資料對案達派學說記載的不多如大毗婆沙論把它的學說都擺在分別論者的題目下來談而且講的也不完全可是南傳的論事列舉各派學說時案達派列舉的最多達七十餘條把案達下分出的四派的不同主張也舉了一些受案達派影響而産生的北道北山住派學說也舉了不少作為研究資料是很豐富的案達派學說基本上是二元論就其整體言當然是唯心的不過其唯物思想較之其他各部派要多一些例如在講到四大性質時他們斷定四大是可見的是有實質的物體他們的論證是四大分析到極微時還是可見的雖然這類眼不能見另一類眼還是可見的這就承認了極微的物質性有部就不然認為四大不可見只是四大的性質堅濕暖動可由觸覺把握到有部也認為四大種可以分成極微不過極微不是實在的而只是人的意識分析成的慧分析因之極微是假設的存在人的概念中而已其次案達對三界中的無色界不認為是絶對的無色不過色細微一些就是這就承認物質的普遍存在了第三案達還反對上座系關於地遍處的唯心思想上座依地來觀想認為在定中可以見到的法皆具有地的作用如地的作用是不可入和硬那麼定中所見到的一切法如水火等都是不可入和硬的了這顯然是一種唯心的幻覺所以案達派批評它們是顛倒智而非真智案達派比其他部派對物質的認識進了一步是有其社會根源的它們流行於南印度而且主要是在第三階級的工農群衆中發展的當時南方處在案達羅王朝的統治下統治者信奉婆羅門教佛教在最高統治階級中得不到支持於是轉而向下層民衆發展為了取得群衆信仰他們把佛神聖化提倡制多崇拜借以迷惑群衆當時災難深重的人民也只能寄希望於神的信仰所以南方大衆學說能反映工農群衆的一些思想意識原因即在於此工農群衆是從事物質生産的階級實際生活使他們對世界帶有朴素唯物的看法這種思想反映在大衆系學說裏就使它具有較多的唯物思想傾向現在有關的資料太少論事中雖保存了一些但也是由他們的立場出發經過一番取捨的並不完全所以要弄清案達派的學說還有待於新資料的發現關於大乘學說思想的來源各國學者的研究尚未得到明確的結論對大乘學說的形成佛教各個部派都曾給豫了一定的影響但一般認為大乘與大衆部的關係更密切些根據何在呢本來大小乘的區別是多方面的但主要的有下列幾點一在宗教實踐上大乘以成佛為目的而小乘則以達到阿羅漢為究竟二在理論上對法空的解釋小乘對佛說很拘泥認為特別是有部凡佛說的都實在只要佛說有這類法有這類概念也就有這類實在這是一種概念的實在論因此它們不承認萬法皆空最多只承認人無我所謂人空法有小乘中也有主張法無我的如上座部但也是用分析方法得出來的如茶杯現在是完整的它終有一天要被打破如用分析方法去看它也是不完整的是無自性的這樣來理解空當然很不徹底如果一件東西要待打破時才能認為空那麼未破之前很難有此認識大乘的看法就不然認為一切皆空法的自性也是空所以說一切法的存在如幻如化三小乘認為要實現自己的理想非出家過禁欲生活不可而大乘特別在其初期則以居家的信徒為主並且有些事只有在家才具備條件去做例如布施中的財施出家人不許集財就不能實行因此大乘一開始很重視在家不提倡出家從以上幾點大小乘區別來看與大乘更為接近的是大衆系大衆系後來分裂出來許多部派不在十八部之內如南傳之方廣部又名大空宗即是其中之一方廣部在錫蘭有個時期很占優勢曾以無畏山寺為根據地從現存資料看它們與大乘思想的聯繫甚為密切例如一他們主張佛不住人界而住天界人界所見只是佛的化身這一思想就通於大乘以後所講的報身和化身二他們又說佛是不說法的現在所傳佛說也是出於變化還說對佛布施無多大果報因為佛不接受布施只是示現接受的樣子這樣佛布施都是空與法自性空的理論很接近因而也就獲得大空宗的名字他們的主張還多僅就上述兩點已具有萬法空的思想以致龍樹對它都有方廣道人惡趣空的呵斥說空達到極端就不止於法無我而已了三方廣部還主張一意趣可行淫就是說出家人在信仰和願行供奉一致的條件下可以結合為夫婦這樣就打破了在家出家的界限據論事記載案達四部都如此主張可見方廣部即由案達四部發展出來的總之這個主張與大乘初期在家的主張是有聯繫的大乘初期信徒的組織生活還不清楚只知他們有個團體成員稱菩薩團體名稱即叫菩薩衆伽那三人以上者小乘叫比丘衆稱僧伽四人以上者具體情況還待研究參考資料異部宗輪論述記有關大衆系各部宗義部分南傳小乘部執內學第二輯增一阿含經序品附分別功德論釋呂澄印度佛教史略本篇下一章四節第三講初期大乘佛學公元五四年案達羅王朝中期笈多王朝初期佛學發展到大乘階段學說有了很大的變化可以說起了部分的質變大乘思想發生的年代現在還不能確定但它是與大乘經相伴而來所以一般也都從大乘經談起與此有關的原始資料印度已經沒有了後來有些說法大都為附會之辭不甚可信學者們一般都是從中國的翻譯史上來刊定中國的譯經始於後漢幾乎一有譯經就有了大乘經典據經録的記載最初翻譯大乘經的是支婁迦讖他到中國在漢桓帝末年即公元二世紀的中葉支讖是西域月支人由這個年代推論從印度産生大乘經傳到西域再傳到中國需要有一個相當長的過程我們暫以百年計算則印度有大乘流行當在公元一世紀中葉現代學者有的推到公元前一世紀這可能是根據大乘經自己說的它們在佛滅後四百多年不到五百年就出現了但這說法無確實根據是不可靠的我們姑且採用第一種說法假定大乘經的發生在公元一世紀有了大乘經就有大乘思想後來又有大乘學者即龍樹及其弟子們把它組織成體系加以宣揚這也需要百年左右的時間以後又經過相當時期才有顯著的變化我們把這定為大乘初期階段年代約為公元一世紀中葉至四世紀這時期印度的統治王朝經歷了兩代案達羅與笈多公元一世紀時是案達羅王朝它原在南印度阿育王死後孔雀王朝衰弱案達羅即宣告獨立公元前二十八年它滅了摩揭陀地方的康縛王朝從而在中印開創了一個較大的統一局面成為橫亙德干北半部兩面臨海的大國其後經過二百多年到公元二二五年滅亡如果從它在南印創國時算起前後經歷了三十代共四百五十年大乘經典産生時正是案達羅王朝的中葉案達羅王朝覆滅後印度又恢復了地方割據的局面而且為時很長公元四世紀初摩揭陀有一小國國王尸利笈多吉祥護本國弱小但它與北方強大民族離車吠舍離八族組成的國家中最強大的一族通婚借其勢力吞併周圍小國最後占有摩揭陀中印一帶建立了笈多王朝第一代國王名月護具有雄才大略第二代名海護亦甚英武經過兩代經營於是國事益盛統一形勢足與阿育王相比笈多王朝不僅政治上有此盛況而文化上亦曾一度繁榮大有文藝復興之概大乘初期思想的末尾正處於這一王朝的初期案達羅笈多兩王朝都崇奉婆羅門對佛教等教派不甚熱心但作為統治者的宗教政策也並未將婆羅門定於一尊對佛教等加以排斥正如阿育王崇信佛教對耆那教邪命外道等仍豫保護一樣一般統治者大都熟悉這套手法的另外兩王朝好像有了一個統一的局面實際上印度西北部一直為外族所侵占先是希臘人後來又有塞族月氏不斷向內地侵略幾百年間始終沒有改變這種隨時可能發生戰爭的狀況這就不能不使兩王朝的文化發展受到一定的影響第一節初期流行的大乘經典及其主要思想大乘思想的根源歷史的和社會的最初出現的般若經性空幻有的思想般若經流行的地區從南印經西印到北印東印續出的寶積華嚴類部分經典中道唯心思想法華維摩經對小乘佛學的看法一類淨土信仰的經典大乘經學說組織的關係關於大乘思想的起源現在的研究已取得一定的成績但還沒有完全解決早年日本曾動員十幾名學者專門研究發表了大乘佛教成立史的研究一書但是受到資料限制也未能從根本上解決問題西洋人的研究就更差了他們占有的資料更不完備因此我們對這問題也不能說得很詳細大乘學說的源流可以從兩方面來看一是歷史根源方面二是社會根源方面歷史根源方面可從保存下來的文獻裏去探究從現存資料看大乘學說是從部派佛學發展來的各部派對它都有或多或少的影響其中大衆系的幾派對它的影響尤深大衆系各派的思想後來漸趨大乘化逐漸發展終於有了獨立的大乘的一派當然這並非說部派後來轉化成了大乘而是說大乘吸收了各部派的特長獨立發展的從大衆系保留下的許多學說中有些就很接近大乘思想如前面所說的方廣部就是不僅如此後來的大乘學者們自己也有此看法漢譯資料中有真諦譯的部執異論據他在譯記裏說大衆系內部分裂即因對內部流行的大乘經有信有不信引起的他還說多聞部的分出是由於有位在雪山修行的人多聞部主出來宣揚一種深奧思想所謂深就是超出小乘的大乘思想後來玄奘去印時還有這樣的傳統看法原在南方的大衆系以後發展出案達部再後有方廣部它們以斯里蘭卡的無畏山寺為根據地那裏本來是流行上座系的這時方廣與上座取得調和同時並存玄奘認為無畏山的上座已非純粹的上座應名為大乘上座據此玄奘似乎也把方廣看得與大乘差不多了從上述事實看大乘思想與大衆系的關係完全可以肯定但是大乘思想還與其他部派有關以法藏部說它發展了本生說編成為一類菩薩藏這是很特殊的其他部派只把本生放在雜藏內或分散於各經籍中並不獨立為一藏大乘擴大菩薩在成佛以前的修行方法把與之相關的種種行事分為六類六度六波羅密而都可以得到解脫這一思想就與法藏部的重視本生有關其次正量部關於業力的說法六道有阿修羅道的說法五類法即三世無為不可說法的說法也都為大乘所吸收再從大乘思想發生的社會條件看它産生並流行於案達羅和笈多兩王朝也不是偶然的當時兩王朝在政治上已出現了一個統一的局面而佛教內部呢仍日趨分歧各行其是實難以適應形勢的發展這就迫使佛教不得不向統一的方向努力但是小乘各部因循守舊是不大講通融的只有新興的大乘既超然於各部之上又能吸取各部之長有資格擔負組織新說適應統一形勢的重任再說案達羅和笈多兩王朝對佛教都不大支持這就迫使大乘向下層發展以求得群衆的支持關於這點大衆部與正量部都是有基礎的南方大衆系案達部是向勞動群衆宣傳的正量部主要受到商人的崇信大乘就是在兩部已有的群衆基礎上興起的所以在學說中就反映了這些階級的思想意識勞動群衆從事物質生産有自發的唯物思想商人追求物質利益也有些唯物思想因而大乘思想裏就多少表現出唯物的傾向了另外商人為了牟利常與統治者發生矛盾希望政治有所改良大乘經中有一部分講到治理國家的問題這當然只是從維護商人利益出發的不能說即符合工農的要求從這些背景看可以認識到大乘學說産生的社會基礎大乘學說産生的根源由於資料不足只能介紹這些原典中雖也保存一些說法但有的是後來加進去的要加分析上面講的也還參考了些金石銘刻那上面有讚揚大乘人物的記載可以從中看出他們的社會地位來大乘思想就是菩薩乘思想他們相信釋迦成佛以前的菩薩階段其實踐與所依據之理論都較聲聞乘緣覺乘更廣大所以稱為大乘闡明這類思想的經典後來積纍日多就有種種類別但究竟哪一類是最初出現的呢學者們有大致相同的看法一般承認般若類是較先出現的理由有三點一般若經內容主要講對佛所說法不可執著法無自性即所謂法空思想這一思想正是由部派佛學自然而然發展下來的部派佛學特別是有部學說發展到極端認為佛說的法都有自性都是實在的反對這種極端一轉入大乘就必然走向實有的反面而出現性空思想二很多大乘經典如法華華嚴等的主要思想都建立在般若的基礎上所以理應先有般若經才能隨之發展出其他的經來三更有力的理由是大乘經開始流行同它之前的佛經性質和形式一定要有聯繫即與公認的諸經相類以前諸經按內容和形式分類有九分教或十二分教其中有一分名方廣義譯梵音譯毗佛略巴利文音譯為陀羅是指它說的道理方正範圍廣闊當時小乘部派承認在方廣一類經中有般若如有部的脅尊者在大毗婆沙論一二六卷中介紹十二分教時就是這樣說的般若經一出現即採取了方廣的形式也從而證明般若類是最早出現的大乘經般若經後來發展得相當龐大究竟有多少種迄今亦無法確定據玄奘搜集並編纂而成的大般若經共有十六種或稱十六會十六分開頭五分是根本般若經其餘歸為雜類叫雜般若經根本五會內容相似僅文字詳略不同第一會最詳有十萬頌漢譯四百卷接近四百萬字第二會有二萬五千頌第三會一萬八千頌第四會一萬頌第五會八千頌其中二三兩會的內容差不多四五兩會的內容也相似現在要問這五會哪一會是先出現的呢學者們的看法也不相同既然有詳有略就有兩種可能一個可能由詳到略而詳本在先一個可能由略發展為詳而略本較早按實際情況分析先略後詳先有小本而後發展為大本還是合理一些第一般若盡管是以方廣形式出現開始的分量不能與部派公認的諸經分量相差太遠那樣會叫人不容易相信的第二從傳播方面看部派諸經是憑口傳的大乘經一上來就有文字記録按寫作規律講開始不可能太詳太大所謂大本小本主要內容都同只是大本的文字敷衍些而已第三從中國翻譯史方面看第一個譯大乘經的支婁迦讖譯出的是道行般若三十品在五會中相當於四會過了一百年西晉時才譯出放光光贊兩部經相當於五會中的第二會至於初會是到玄奘編纂大般若經時才有的從這裏看它的發展是先簡後詳的當然從翻譯的前後不能即確定它們出現的先後次序但也可以作為推斷的根據之一由於道行比光贊篇幅要小所以後來習慣叫前者為小品後者為大品另外雜類般若的內容很不相同其中有中國極為熟悉的金剛經玄奘把它放在第九會分量最小只三百頌也可看成是般若的一個略本因為根本般若的重要思想它都有了以後無著世親加以分析認為經中有二十七個主題實際包括了全部般若的主要思想它的形式較之大小品更加接近於九分教和十二分教以及後來的阿含形式例如經一開始就講釋迦住在王舍城他的團體比丘有千二百五十人並敘述到講道的過程等等這些都是原始經典的格式而根本般若就是小品形式也不是這樣講的是五千人並說這些人都具有種種功德成就同後來大乘的鋪張說法相類似這說明金剛經的般若形式比小品還更早一些其次南方有位學者覺音他在解釋十二分教中的方廣時是從它的形式講的他說方廣是問答體在每一問題得到圓滿解答的基礎上繼續追究步步深入他舉了巴利文的五部做例證我們看金剛經的體裁正是如此其他般若經就不這樣顯著第一個問題結束後接著提出第二個問題所以無著世親解釋說須菩提對不了解的地方共二十七處這二十七處是展轉相生的又金剛經的問題是借須菩提提出的他是佛的十大弟子之一是得了無諍三昧以解空著名的金剛經但明空理故借重他來發問可是小品的內容就較蕪雜人物有舍利弗彌勒甚至還有帝釋等等這說明般若類最早出現的是略本而略本中又以金剛經的出現更早一些它在我國翻譯較晚但産生應早通過金剛經的二十七個主題更易掌握般若的要點般若思想不外說明諸法性空幻有的道理所謂性空是說佛所說的一切法即一切現象都沒有實在的自性但空非虛無法雖然自性空假有的現象仍是有的即所謂幻有幻有含有二重意思一幻有並非無有是相對於實有說其非實在的二幻有非憑空而現它的産生是要有條件因緣的所以般若思想是由一雙範疇性空幻有構成的不能單執著某一個方面關於性空的思想在部派佛學時也有如上座講人空外也講法空不過他們的性空進一層發展就成了方廣趨向極端連幻有也否定了所以龍樹批評它為惡趣空虛無主義這種否定一切的虛無主義與般若性空之說是不一樣的金剛經全部講的是性空而幻有的問題最後歸結為一頌一切有為法如夢幻泡影如露亦如電應作如是觀完滿的說法應為九喻秦譯只有六喻其次講性空幻有應聯繫到佛說般若思想反對有部認為佛說的一切法都有自性的極端態度主張佛說法不是實有而是幻有佛為甚麼要說法呢在他們看來是因實踐的要求加以假設而已佛法並非實有只是我們概念上對它加以分類而成功的假有這種思想金剛經表現得非常集中它有這樣一套說法的形式如佛說般若即非般若是名般若概念的假設之所以要假設佛法據他們講是為了救度衆生這一實踐要求金剛經隨處都是這種思想所以說般若的主要思想金剛經都有了還有一個問題般若經最初是在甚麼地方編纂的這已無法講清楚了不過它的流行地區倒是可以從經的本身記載中看得出來據大般若經三百二卷中說開頭是在東南方以後流傳到南方然後到西方逐漸到北方西北方最後到達東北中國地區這個記載與實際情況是符合的因為這個流傳路線與大衆部發展的地區相一致與正量部活動的地區也一致前者是在東南南西方活動後者是以西印為中心然後到達西北大乘思想前面已經分析是與大衆正量有聯繫也是得到部派的承認的所以流行於與他們思想相接近的部派區域內以後又發展到西北等處是合理的而一旦傳到月氏就得到人們的信仰並經過西域傳播到中國來了大乘經有了般若之後又陸續地在各別地方出現了別種經典到後來還不斷地在發展擴大有的從小品逐漸充實內容變為大品有的由一部分發展成多部分的叢書性質如寶積華嚴等就是這類經典的流行及制作地點現在只能從經典所使用的語言上去推定現在留下這類經的原本梵文特別是頌文部分大概都不是純梵文而是混合梵語純梵文文法非常嚴密而大乘經的原本梵文卻夾雜俗語或帶有俗語尾這樣就可以用這部分俗語來研究它最初流行與製作地點現代的梵文學者正從事這方面的研究如我國季羡林的研究就很有成績他認為那些俗語是東印度以摩揭陀為中心的俗語這一結論是依據阿育王法敕進行勘定得出的阿育王派人到各地刻的法敕內容相同但採用的是各地方的方言現在它已成為研究古代印度語極為寶貴的資料經此推定大乘這類經典的流行及製作地點就是東印一帶首先産生的是寶積之類的小本子寶積後來發展成有四十九會的大叢書但最初出現的是裏面最原始的一種中國前後譯過四次開始是支婁迦讖譯的名佛遺日摩尼寶佛遺日即毗佛略意為方廣摩尼為如意珠後來又譯名寶嚴經或名迦葉品後由單卷編入大部因大部也有迦葉品遂改名普明會最後譯的名迦葉問正法經四個譯本名稱不同但都是小本寶積的異譯原經叫甚麼名字已不清楚小本寶積是繼般若之後出現的大乘經類之一其內容較般若更為豐富不過基本理論仍出於般若只是在一個方面大大地發展了全部分為十六門都是屬於大乘教授的具有重要的意義其中談到了大乘出家即戒律的問題談到定慧學以大乘和小乘相比較指出其優劣更值得注意的是它提出了大乘的一個重要思想根本正觀就是說大乘應該具有甚麼觀點去觀察一切它們認為應該用般若去觀察菩薩乘就是提倡般若所以寶積的根本正觀是來自般若具有智慧就掌握得判別正與不正的方法從而使他們的理論超出了單純的空觀提出所謂中道來空觀原對實有而言實有固然不對若定以空為實在的空那也不對離去空觀實有的二邊他們主張中道中道原在部派佛學時期也偶爾談到現在大乘把它擴大而且固定在正觀方面運用這就是從小品寶積開始的一個重要思想小品寶積在講中道時還詳分為十三種正觀後來大乘的講述也未超出這個範圍小品寶積還特別指出有見很壞但有見走向極端即使大如須彌山也還有辦法破除如果著了空見那就不可救藥了可見寶積一類比空觀進了一步它破空破有提倡中道正觀小品寶積以後編入大部寶積四十九會中的第四十三會其次與寶積同時華嚴經類也出現了華嚴發展到最後成為七處八會即在編經過程中說經地點換了七個又集會了八次中國譯本有六十卷的八十卷的原本究竟多少卷無法知道據傳說中等的本子便有五十萬頌就是小本也有十萬頌中國譯的是略本三萬六千頌有三十九品最早的譯本是支婁迦讖的名兜沙經是後來大部中的序分名號品兜沙之義為十裏面講的都是十數的法主要說十方佛剎都有佛又說菩薩行有種種十法若想成佛須經歷種種十法階次如十住十行十無盡藏十回向十地十定等六類這六類也就是成佛的六個步驟每一個步驟就是一個十法階次後來出的大部華嚴即依此目録陸續組織的也可說以此為提綱而加以詳細補充的這部經對大乘學的貢獻是擴大了成佛的範圍把成佛的修行方法推廣到一切有情這種思想就超過了部派佛學部派佛學只承認現在世界有一個釋迦牟尼佛過去曾有六佛將來有彌勒佛佛的出世有先後不能同時有兩個佛這樣對人們的成佛有極大的限制兜沙經打破了這一限制認為在空間上同時有無量無邊的國土布於十方即可以有無量無邊的佛即使大家一時成佛也安排得下所以十方成佛的思想是此經很特出的主張同時此經也指出成佛並不是輕易的因此他們把成佛分為六類十法階次部派佛學的說出世部在大事中也說釋迦成佛前經過了十個層次但大乘認為這太簡單他們將大事所說的十地僅視為修行的初步等於六個十法階次的第一階次十住以後還需經歷五個如此的十法階次兜沙經的十數目字的産生還反映大乘思想出現的社會條件與階級根源印度對外貿易一向發達貴霜王朝從西北印同西方交涉使得這種對外貿易到一世紀格外活躍而案達羅王朝統一印度之後在這一基礎上又前進了一步由於貿易發達計算方法就要求提高因而引起了數學的發展在此之前印度計算進位方法無一定規則一般是用七進法例如講到極微展轉積成粗重時即以七進法算出的到了這一時期則改用了十進法還規定出十法數字符號以前計算到十數時空位加一點用表示這時發明了用代替了名舜若空還是空不過也等於一個數字這種變化今天看來不值一說但當時卻是一個大的發明它通過貿易經波斯阿拉伯傳到西歐發展成為世界通用的阿拉伯數字我們從兜沙經裏看到以十法為等級就是反映了科學上的這一進步這也說明大乘的産生與商業發展是有聯繫的同時也可確定兜沙經的寫作時間不能早於公元一世紀至於也代表一個數字與大乘認為空也有用處的思想有一定的關係此外華嚴的另一部分是西晉竺法護譯的漸備一切智德經後來編入大部為十地品此經後來還譯名十地經經中闡述了菩薩如何入地住地出地以及不斷勝進的問題敘述時是採取十進位法每一地的入住出都要具足十法最後才能功德圓滿這十地又緊密地配合菩薩行的十度他們在六度基礎上增加方便願力智擴大為十度在第六地把十度中的第六度般若作為中心由此也可見般若是一切大乘經的中心在這一地裏還明確地提出一個重要思想唯心論據十地經說用智慧觀察宇宙人生時宇宙本質是甚麼他們的答復都是唯心他們的重要命題是三界所有唯是一心十二有支皆依一心本來關於宇宙本質的問題原始佛學是避而不談的部派佛學乃至大乘般若對此解答也不明確到了華嚴就作了如上明白的回答心似乎是單純的為甚麼能有三界區別呢他們認為既然心會轉變成各種相因而就可以對三界進行區別既能區別就有三界了但其本質還不過是心而已關於人生經中則講十二因緣依於一心十二因緣包括了人生一切現象從無明到老死無非都是心都依於心人生不過是十二因緣的繼續因而也就是唯心了這樣三界唯心與依於一心是對宇宙人生的兩種基本觀點這兩種觀點使大乘後來發展成為極端的唯心論者是極有關係的除寶積華嚴之外還有法華維摩經這兩類經的思想都是依據般若與上兩類經基本相同是採用中道正觀的方法其所得則為諸法實相兩經同講實相但法華略維摩詳兩經對小乘的界限都劃分得很清楚雖然確認小乘出於佛說但以為只是佛的權宜之說非究竟之談所以法華經稱小乘為譬喻化城化城的來歷是說有一位導師引導衆人遠行行至中途衆人疲倦就有人産生退縮思想導師遂變幻一個城市讓他們進去休息休息之後再告訴衆人還得繼續前進這即是說小乘只是方便假設的化城而不是要到達的目的地真正要到的地方是菩薩乘佛乘因此大乘才是真實的法華的思想誠如後來天台宗所講的主要在開權顯實即區別小乘而顯示大乘經過這種區別最終達到會三歸一使三乘統一起來維摩對小乘也有類似的看法但表示方法不同它竭力宣傳小乘如何的不到家而顯示大乘的解脫法門如何殊勝據中國學者研究維摩的中心思想是彈偏斥小嘆大褒圓是從破小的看法上建立自己的觀點的所以它在破的方面多些法華則在立的方面多些法華維摩在三國時就有了漢譯本以後又重譯到六七次之多法華的梵本還有保存後來有些增添維摩則只有一些梵本的片斷了另外還有一類主要是關於信仰的經典說釋迦佛所處的國土而外其他的國土也有佛這樣當然更可以滿足宗教信徒們的要求了這類經典有一關於東方阿閦佛阿閦是不動意的阿閦佛經據說東方有個妙喜世界內有阿閦佛國土極好各種情況都是此方求之不得的這種向東方追求的思想原在般若經的後兩品中就有了那是講尋找般若法門的事它說找到門路很不容易以常啼為例常啼費了很大功夫找法門後來聞空中有聲要他向東方最後在東方遇到法上告訴他般若的道理云云但到了阿閦佛經則專講這一佛土的殊勝佛的本願只要人們專心想念他就可往生其國享受快樂二關於西方的阿彌陀佛經阿彌陀是無量光無量壽之意也是說這一極樂世界如何美妙人們只要專念此佛即可生到那一世界去這種對東方西方追求的思想反映了當時印度的國外貿易狀況和地理環境的印度東西方都是無邊無際的大海當時人們對海外的知識又不多在本土求之不得的東西只好寄希望於遙遠渺茫的海外再說當時印度社會動蕩不安淨土之類的幻想是很容易欺騙群衆的現代學者認為希臘波斯的宗教信仰與阿彌陀阿閦佛有關指相信光明的神等這一思想我們認為這是可能的不過不重要除此之外還有三昧經其中有淨土同般若思想結合而成的叫般舟三昧經言如專心念佛則可見佛現前這與淨土的念佛是相聯繫的另一面也講要具有般若的智慧念佛這又與般若相聯繫重視三昧本是大乘特徵之一部派佛學也講三昧不過那只是三解脫門空無相無願的三昧而大乘講的三昧很多如小品般若就講到百八三昧六萬三昧此時的三昧已非原來意義的三昧範圍很廣成為功德的一類三昧經典最早出的是般舟三昧此經前後共有九譯另外還有首楞嚴三昧首楞嚴有健步如飛之意因菩薩修行的十地都要有三昧而最後一地叫首楞嚴三昧表示一下子即可跳到佛地同時十地也都貫徹著首楞嚴三昧因為前邊各地都是為最後一地作準備的此經也是傳譯得較早的我國也前後翻譯過七次以上所講即初期大乘的經典從它們製作後百餘年約在公元三世紀就有學者對它整理組織成大乘的獨立學說每種經原來各有重點根據不同的內容有的分在實踐方面有的放在理論方面也即按佛家傳統的所謂境行果加以分類編纂因此大乘學說中的哲學意義就比以前更進一層明白地解答了本體論的問題另一方面宗教色彩也更為濃厚對佛的看法越加超人化神祕化了淨土思想一開始即夾雜其中宗教味濃性質也很復雜但是宗教實踐與學說理論也不是緊密得不可分的我們還是可以把學說部分暫時劃分出來進行研究應當注意初期大乘的淨土思想對群衆的影響是大的因為當時印度社會正處於由奴隸制向封建制過渡時期一般認為封建制始於貴霜王朝完成於笈多王朝各階級的思想都空前動蕩變化激烈對一般非知識分子的基層群衆講淨土的宣傳作用更大一些而大乘佛學則把這一切理論宗教信仰等都吸收在裏面因此我們還是可以分別對待即專就其學說理論方面進行研究同時這也是可能的在此順便說明兩點即西洋人對大乘的研究有些說法是不甚正確的一大乘佛學的基本著作大都保存在漢譯中他們由於對中國造的大乘起信論分辨不明把馬鳴的評價給抬高了認為大乘學說先是從那上面發生的因為馬鳴出生在龍樹之前所以他的學說也給放在了龍樹之上了這當然是錯誤的大乘起信論並不是印度人的著作根據已站不住立論當然就不能成立了日本學者雖認為大乘起信論是印度人作的但他們把馬鳴放在無著世親之後所以對講大乘還沒甚麼影響二大乘初期除佛學外還有別的學說也在流行如勝論派數論派正理派等到大乘佛學開始這些學派的學說也成熟了自然會影響到佛學另外婆羅門教已發展到信仰一神的宗教或信梵天或信毗紐天或信濕婆天後來在此基礎上成為印度教這種一神教的形成也在大乘學的初期這也會影響到大乘西洋人過分誇大了這種影響似乎大乘的主要思想都是受到別教以及婆羅門的影響而成的這種看法也不正確我們認為外教對大乘的影響是有的但是大乘與別教的界限也很清楚如緣起無常的思想都未變化這是佛學區別於其他派別非常主要之點因此西洋學者在這一方面也是有偏見的參考資料李稼年譯十世紀前印度簡史第六十七六十八頁第七十九八十四頁虞愚譯佛家哲學第三段載現代佛學一九五九年第二期出三藏記集卷二卷七卷八略閲呂澄印度佛教史略本篇下二章二節第二節龍樹的學說龍樹的時代甘蔗王朝公元三四世紀學習宏揚大乘的經過主要著述漢藏所傳之不同大乘學說最初的體系以菩提資糧為中心中觀及其方法論的意義空義的再認識八不緣起說與實相涅槃說龍樹學說對於後來大乘學發展的影響大乘經流行一個相當時期積有很多種類之後就有學者據以組織學說進行宣揚開頭做這件工作並做得很有成績的就是龍樹龍樹梵文分析為梵文連音規則頭一個單字尾與第二個單字頭是相同的母音組成一復合詞時要發生音變如兩個連用時讀的長音所以玄奘把它音譯成那伽閼樹剌玄奘譯為龍猛是龍義譯為猛可能是取了印度大史詩摩訶婆羅多裏般度族五兄弟第三人的意思因為史詩中他是最勇猛的一個所以也就代表勇猛這是新譯羅什舊譯為龍樹傳說其師姓龍他是在樹下出生的西藏譯為龍成這是照原文字義譯的因的語根是成的意思由於龍樹是大乘學說的創始人後人對他備加崇敬因此關於他的生平有不少附會的傳說比較可靠的原始記載是鳩摩羅什譯的龍樹菩薩傳羅什是最先介紹龍樹學說來中國的人他編譯的這本傳是有些根據的傳中說龍樹是南印的婆羅門族小時即通曉婆羅門經典後來皈依佛教當時南印已經有大乘經典流行所以他就接受了大乘思想龍樹菩薩傳說他出家時是到山裏的佛塔受的戒這就暗示了這樣一點龍樹出家的地方是大衆系有大乘思想的一部分人所常住的塔廟裏當時流行的大乘經本不多他憑著聰明很快就通達了他感到不足又到北印雪山地方也是住在相信大乘的塔廟裏那裏一個老比丘給他一些大乘經典讀了後仍感不足於是周游各地在這過程中可能還陸續學了一些大乘經他還與諸外道和部派佛學者們辨論所向無敵因之産生驕傲認為佛教理論不過如此便想獨出心裁自創一派就在此時有個大龍可能是宣傳大乘經典的人把他引去龍宮大概是北印龍族所住之處給他看了很多而更深奧的經典他於是滿足了感到在龍宮看見的一部分已比外間流行的多十倍這一點暗示了龍樹後來組織學說所根據的經典不只是當時流行的還有一部分是個人保存尚未流行的從龍樹所著的十住毗婆沙與大智度論中所提到的諸經同中國譯經史上比較地來看在此之前中國未譯的大乘經大都是經龍樹的宣揚才問世的龍樹在通達了大乘經以後又回到南印著手創立學說廣事宣傳他得到了住地憍薩羅國王的支持為他在黑峰山用九億金錢修建一座五層伽藍法顯玄奘去印度時還見到這個伽藍的遺址晚年他還到了東南印度靠近阿摩羅縛底大塔西北五十公里的吉祥山一直住在那裏最後便自殺了龍樹自殺的原因大約與政治有關據玄奘傳說他得了長生術也使信仰他的皇帝長命不死最年輕的太子久久不得繼承王位於是有人給太子出主意說菩薩一切都能捨的你可以向龍樹要求把他的頭施捨給你吧龍樹只好自殺見西域記卷十另外據傳記說龍樹宣揚大乘與部派佛學以及婆羅門等教派有鬥爭後來有位小乘法師給他一重逼迫他就死了從這兩個材料看當時不但有思想鬥爭也有政治鬥爭而且鬥爭相當激烈關於龍樹的年代有許多說法羅什說他是佛滅後八百年的人不過羅什所信佛滅年代稱為羅氏年紀為公元前六三七年與一般要相差二百年左右據他所說的推算龍樹生年應是公元三四世紀佛徒們傳說龍樹活了二百歲三百歲大概是因為他自殺未得終其天年乃以長壽之說來彌補其缺陷的吧實際上頂多活上一百歲所以龍樹的年代在公元三世紀比較合理三世紀初公元二二五年案達羅王朝滅亡繼之而來的又是分裂割據的局面東南印度是屬甘蔗王朝統治時間約有百年的光景二十世紀初在那一帶發掘出許多塔廟遺跡這種塔與阿摩羅縛底大塔一樣四面有伸展出的牙柱柱上刻有奉獻者的姓名從那些姓名看都是這一王朝的皇帝皇妃和皇室中人物由於這一發現連帶也找到了吉祥山當地土人稱為龍樹山可見此山確是龍樹住過的這些考古資料與龍樹傳記載是符合的從龍樹組織學說經過看他的大乘思想原是東南印大衆系發展出來的那一部分隨後他到各地訪求以及最後大龍把他引入龍宮見到當時尚未流行的大乘經這一部分則是由他才開始介紹的龍樹傳裏有這個記載龍樹自著的大智度論最後一卷也說到有許多大部頭的大乘經是在龍宮阿修羅宮裏藏著的說最小的篇幅也有十萬頌當時流行的二萬五千頌般若人們已感到分量大難於接受了十萬頌則只能藏之龍宮待人而傳了這種傳說據後人研究還是有事實根據的北印一帶對龍的傳說很普遍他們說的龍不在天上而是在雪山地上常年流著的江河都發源於雪山所以北印傳說山上有雪水積成的大湖龍就住在那湖裏稱之謂龍宮如果說龍樹確由龍宮中得到大乘經這就是說他從北印雪山深處去取得的至於說雪山有老比丘等也只是暗示分布在那裏的部派佛教中思想比較前進一些的學者而已龍樹後來仍回到了南方並在那裏度他的晚年這與支持他的王朝有關其先案達羅王朝是不信佛的到甘蔗王朝則有幾代由於新興的大乘而引起了他們的信仰當時要宣揚推廣一種新的學說得不到強有力的支持是很困難的所以宣傳的範圍也就只限於這一帶而在這裏龍樹也得到了他的繼承人提婆大乘思想以此為中心就逐漸傳播擴展開來了龍樹的著作很多有千部論主之稱他的學說傳播以後特別在西域一帶得到了相當的發展鳩摩羅什又盡量把它傳譯到我國因此他的著作漢譯現存的約二十種其中有托名的僞書據考證真正屬於他的只有十七種但大都是很重要的在龍樹著作中有一類是釋經的主要有大智度論這部書在他的傳記裏也提到過說他著有優婆提舍議論十萬頌這種體裁是解釋經文並加以發揮的可能即是指的大智度論它解釋了當時最大的一部經大品般若譯本一百卷尚非全書據說對般若第一品的解釋是全譯了的即達三十四卷其他各品照此譯下去當在千卷以上羅什認為中國人不習慣這種煩瑣的議論從第二品起就擇要譯出共成一百卷另一部是十住毗婆沙論是注釋華嚴十住經後來譯本名十地經此經是華嚴的中心部分的毗婆沙為廣論之意注釋的不是經的正文而是經的重頌部分經有正文有頌頌又有前有後後邊的叫重頌漢譯有十七卷只講到第二住也非全文此書是羅什之師佛陀耶舍口傳的誦本他只記得這些所以譯得不全但是此書在龍樹學說中地位是頗為重要的另有一類組織學說的著作主要有菩提資糧論這書是隋代譯傳的頌本計一百六十五頌是龍樹寫的譯文是自在比丘寫的書的分量不大譯本只有六卷龍樹傳中也提到這本書說龍樹作莊嚴佛道論五千頌大概包括了他自己的注解在十住毗婆沙論裏也提到這本書名助道品因此書的譯傳雖然較後仍可信為龍樹的著作再有一類論戰性質的是對部派小乘以及其他學派進行破斥從而顯示自宗的所謂立破之作最主要的是中論書中對部派的偏見做了徹底的破斥也是龍樹基本理論之所在羅什譯本文五百頌加上青目的注共四卷此書在羅什時就有七十多家的注羅什認為青目注最好所以一同譯出龍樹傳中提到此書說造無畏論十萬頌於無畏中出中論也意思是說中論的注解包括在無畏論中印度有這種著作習慣寫作一種對自己多種著作的自注無畏論十萬頌其中有中論的注此外有十二門論是中論入門的書中論二十七品十二門論只有十二門就簡化多了它是解釋中論的根本道理的書的分量不大只有很少的頌大概全文都出自龍樹之手內容係破除小乘偏見顯示自己主張針對佛教以外其他學派的漢譯有回諍論一書主要針對正理派正理派是從認識論角度立說的講種種量以量成立各種的實在這與龍樹主張空無自性的自然是直接衝突的龍樹要使對方放下最有力的武器所以做了仔細的辨破此書也是後來才傳譯的最後一類是與政治有關的著作大乘學說與以前佛學不同是將世俗事與出世事融合起來的當時龍樹受到甘蔗王的支持因而有對統治者的說教此類著作漢譯有兩種一是頌文體裁的寶行王正論陳真諦譯寶行王即玄奘義淨譯的引正王梵文婆羅婆漢那原是案達羅王朝的姓因為過去人們的歷史知識不足此時雖已改朝換代成了甘蔗族還錯誤地把前一朝代的族姓沿用下來此書是專門對甘蔗王講如何治理國家如何信仰佛教等等表達了大乘的政治觀點二是書信形式的勸誡王頌我國前後經過三譯王也是指的引正王據南海寄歸傳卷四介紹印度當時流行許多著名的讚頌龍樹此書就是其中之一稱為密友書它以詩代信勸引正王相信三寶如何對待臣民特別是勸王要支持佛法信的內容也尋常但文字很優美所以在印度十分流行有點像中國過去的千字文之類成了家喻戶曉的讀物龍樹著作重要部分已經漢譯的有上述八種這些書大都已無梵本只有中論的頌文保存在月稱釋的牒引中一九三至一九一三年的十年間俄國編印的佛教文庫內將其校訂出版了另外寶行王正論尼泊爾還藏有梵本一九三四年被西洋人發現後也印出來了除此兩種外其餘的梵文原本尚未發現又十二門論印度國際大學生在一九五四年已將它從漢文還原為梵文了在西藏文譯本中龍樹著作保存得相當多因為西藏把龍樹看成是密教的祖師十分重視在西藏大藏經裏計有譯本一百一十八種內容相當蕪雜許多是密教的分類而言一讚頌十九種二密教解釋五十一種三顯教解釋及雜著四十八種其中與漢譯重復的只有十一種不到它的零頭所以研究龍樹學說應當注意藏文中保存的資料這些著作中主要是有關顯教方面的開頭是正理聚共計五種一中論二六十頌正理論趙宋時有漢譯譯得不好三七十頌空性論漢譯十二門論中提到過此書四回諍論有漢譯五廣破論此書比回諍論更進一步詳細破了正理派的十六諦以後到了宗喀巴時代還加了一部寶鬘論即寶行王正論此外還有一部值得懷疑的書二十頌大乘論西藏人相信它是龍樹的著作並發現了梵本一九五六年意大利羅馬將其列入東方叢書的一種印行另外還有一種把許多大乘經貫串起來的書一切經集論宋代有過漢譯名大乘寶要義論以上是西藏方面保存龍樹著作的情況據龍樹傳記載龍樹開始讀大乘經感到道理還缺完備想加以推演創立學派後來在所謂龍宮看到了大量的大乘經就又感到不是少而是多得研究不完便打消了獨樹一幟的念頭仍照佛學的基礎進行組織本來大乘思想的産生是適應當時內外環境的需要從佛學內部講在流行了大約五百年的時期內部派分裂主張各異其中不少學說趨向極端致使內部很不統一從佛學外部講其他教派這段時期都有較大的發展勢力日趨強盛佛學要是還繼續分裂下去連存在都會成問題的因此這時就有統一並使之面貌一新的要求適應這一形勢大乘經典陸續地出現了並取得佛學內外一部分人的信仰已不感到突如其來到了龍樹時期印度重又分裂社會處在顯著變遷之中反映到意識形態上也不能照老樣子下去至此醞釀了一百年的大乘思想應該有個總結應該有所組織龍樹就是在這一形勢下來擔任組織大乘學說的工作的要想完成這項任務使之向前發展一步就要從兩方面著手第一要從廣的方面做工作從佛教根本精神出發以當時已有的大乘思想為中心吸收和概括佛教各方面的學說比較全面地組成大乘的思想體系第二從深的方面做工作應盡量批判一切學說包括內外各學派加以鑑別採取其中對大乘學說有用的以豐富自己的理論龍樹所組織的大乘學說體系在深廣兩方面都做得相當好相當出色從學說廣的方面看他首先抓住了佛學的根本問題即究竟的境界問題佛的境界他認為最究竟的境界應以菩提為目標而部派佛學則多偏重解脫如異部宗輪論說三乘之不同在於解脫之不同並辨解脫之道有同不同大乘則著重於菩提智慧佛陀就是覺者已含有菩提的意義在內但是完全把菩提當作佛體在部派時代還不是大家能同意的如論事是上座系的主張它所反對的論點之一即有以菩提為佛說這種論點是那時北道部的主張北道部屬大衆系後來的發展接近大乘龍樹此時即抓住這一根本問題然後從多方面來豐富它組成大乘學說的體系菩提的內容從般若經中看它包括了一切智道相智一切相智三個方面一切智是部派佛學的最高智慧意思是甚麼法相都能知道其實是一種共相智道相智不僅有了懂得一切的智慧還連帶知道得此智慧的方法方法還不限於一種包括大小乘的道都在內一切相智則非但知道一切法的共相而且知道一切法的自相從這三方面來闡述菩提內容顯然比部派佛學講得更完備了所有大乘思想都是為了成就這個菩提為了菩提得以形成的資糧條件材料用這一思想組成的著作名菩提資糧論龍樹寫的是頌本還有他本人的注釋據龍樹傳的記載注釋有五千頌已經失傳現在只有自在比丘的一個簡注還很扼要從注釋看論的體系是把有關大乘的說法都融合在六度之中並旁通四處實捨寂智四無量慈悲喜捨不僅四處為部派佛學所公認而四無量還是佛教外諸學派都相信的梵行認為四無量可以帶來往生梵天的幸福是諸學派共同追求的目的菩提資糧論把這些思想都貫穿在裏面可見包括得很寬但它也不是簡單地匯集而是比部派和其他學派講得都更深了例如四無量中的捨小乘的解釋就是捨棄一切和無執著的意思龍樹的解釋是入甚深法界滅離諸分別悉無有功用諸處自然捨意思是說入甚深法界萬法一如無有分別既無分別自然不著不著自然捨把所有的學說都融會貫通於一論中這是龍樹學說廣的一個方面此外論中還講到求得菩提的方法這方法就是修集修習修集有兩重意思一是反復地學習一是把知識積纍起來兩者又是統一的即在反復學習中積纍論中對此講得很具體並照顧到當時佛教一般的修習形式以取得調和修習有二一是福業二是慧業講修福業時有所謂懺悔稱讚回向等等講修慧業時特別提倡方便即提倡智慧的運用在般若經中本也有這類內容講智慧也講要善巧的運用但經文散漫不容易看出經龍樹如此一提示就很明顯了他將大品般若分成前分著重智慧的本身後分著重於方便般若的運用泛泛地看是看不出的經他發揮就感到明顯集中了可見大乘的智慧不能脫離方便盡管還是用一般的三解脫門空無相無願但因著重於智慧的運用對三解脫門都是學而不證就是說學習了而不要求立即得到結果所以在大乘看來修習這些資糧的究竟拿最後的涅槃來講並不是無餘涅槃而是無住涅槃這就超出了涅槃的一般意義了另外修習過程中因人的能力不同而有不同的修習方法能力充足的可用直接的方法一般的人還需要有各式各樣的輔助辦法這樣論就把大乘經所說的如念佛三昧般舟三昧菩薩藏教授等等方法都吸收進來了所以這一組織相當廣闊既有重點又有系統再從學說的深度方面看對方法論更有一番創新這就是寶積經裏講的中道觀它比空觀更進一層有空觀而不著空觀但龍樹對空觀的運用和解釋又比寶積經前進了他以此作為根本的方法論在意義上與寶積經也不盡同是對部派偏執一邊的說法給與徹底批判的對這問題的具體闡述見於所著中論一書中論對中觀下了一個定義見該論第二十四品觀四諦品的末頌印度寫作習慣無一定格式看行文方便到要緊處畫龍點睛一語道破全書要義定義不一定在論的開頭提出中論有五百頌二十七品論的本宗二十五品此頌見於第二十四品衆因緣生法我說即是空亦為是假名亦是中道義漢譯把原意的精神基本上表示出來了但仔細推敲還覺意有未盡原文尚在可以勘對中國佛學家也很重視這一頌特別是後來由此論立宗的各派如三論宗天台宗更為注意因頌中有三個是字遂稱為三是偈天台把空假中看成是實在的諦所以又稱此頌為三諦偈頌的原意是批判部派佛學的偏見佛學的根本原理是緣起部派佛學對緣起的說法不盡相同其中有部的說法最為片面他們主張一切有就以緣起為根據如講六因四緣結果把凡是從因緣而生的法都說成是實有的了龍樹此頌主要就是針對有部衆因緣生法就是指緣起緣起之法有兩個方面第一是無自性即空我說即是空這個空是存在認識之中的是以言說表現出來的所以說我說所謂法事物現象等本身無所謂空與不空有部的說法則認為法在概念上是實有龍樹又指出僅僅這樣來認識空還不夠所以第二還應明白諸法是一種假名亦為是假名這就是說如果光說空不就否定一切了嗎世界上何以又有千差萬別的事物呢為了不産生這樣的誤會所以說法雖然是空而還有假名大智度論把假音譯成波羅聶提別處也譯為施設假設意思一樣都是指概念的表示概念表示不外乎語言文字佛學也叫名言由此看來對緣起法不僅要看到無自性空而且還要看到假設假有二者又是相互聯繫的因其無自性才是假設因為是假設才是空用這種方法看待緣起法就是中道觀既不著有實有也不著空虛無的空這就是龍樹講的中觀方法是他對中觀所下的定義實際上中觀思想是直接由緣起空思想發展來的中觀思想是怎樣發展的觀四諦品對這問題的來龍去脈也有明白的解釋中是從空發展出來的是對空的進一步認識由此而連帶著産生假又綜合空假而成立中但一般人不這樣認識把空看成極端而發展到零否定部派佛學者的認識就是如此他們講如果把緣起看成無自性空就會破壞佛說的一切佛首先講了四諦如否定了四諦依之修習的人也不會得到四果四果既被否定作為它預備階段的四向也沒有了這樣就無僧寶無僧寶也就無法寶無佛寶總之一切都沒有了非但如此佛說的因果既已全無世間因果也不能離佛說因果而存在也就破壞了世間法但龍樹認為這不過是對空的一種誤解為了清除這種誤解對空的真義作進一步說明也有一頌汝今實不能知空空因緣及知於空義是故自生惱意思是說你們對空的三重意義不了解所以才産生誤解空的三重意義是一空的本身二空的因緣所為三空的意義空義之義原有兩重含義一作境界對像解二作用處意義解此處是第二種意思這意思就是說應該首先了解空的本身是甚麼同時也要知道為甚麼要講空最後還要瞭解空的實際應用它的意義所在空的所為乃在於顯示勝義諦佛學把佛所說法分成層次有了層次才能瞭解佛法的真義要分層次就得有個標準這標準叫諦一般以二諦為標準以世俗諦來說一切法是有以勝義諦來說一切法空所以說空的作用之一是它可以顯示勝義諦空的實際應用就在於有空才能有種種設施如四諦四果四句三寶等等如果沒有空一切法都有決定的自性那就無法作這些安排對於空能做這種理解就不會把它看成是簡單的虛無了佛學所施設的一切都是放在空的方面來講的要先將不正確的看法去掉空才能給豫正確的安排由此看來中觀把空同假名連帶起來看乃是對空進一步認識所必然得到的結論龍樹的主要思想集中地表現於所著中論一書中如果原始要終地講就是該論所提出的八不緣起和實相涅槃兩種理論前者屬於他學說體系中境的部分後者則與行果部分相聯繫從哲學角度看八不緣起相當於對世界的解釋實相涅槃相當於變革改造世界掌握了這兩種理論對掌握這一家學說的要點也就差不多了八不緣起見於中論開頭的兩個歸敬頌原不計在本文之內只作為本文的引子但對全論來說正如青目的釋指出的它解明了寫這部論的目的不僅如此後來無著為解釋此二頌還寫了順中論一書論的全名是順中論義入大般若初品法