學派對一切問題都不作決定說如對有無來世有無果報等等他們認為說有即有說無即無所以人們比之為難以捉摸的泥鰍這派人主張踏實的修定以求得真正的智慧佛弟子中目犍連舍利弗都曾跟隨他們學過這派學說也含有反對婆羅門的世界由梵我轉化而來的主張到奧義書時代婆羅門還承認業報輪回之說散惹夷對之採取既不肯定也不否定的不信任態度第三末伽梨是定命論者主張沒有業報沒有父母生身一切修行都是空的無用的只要經過八百四十萬大劫到時不管智愚都得解脫這如拋絲球一樣縷盡絲完才不滾了他認為人身是各種原素構成的也含有某種程度的唯物思想自稱其說為正命生活其他人如佛教則詆之為邪命外道第四不蘭加葉學說與末伽梨相似也否認善惡業報和婆羅門教主張縱欲是倫理的懷疑論者他們的出身是奴隸第五波浮陀也否認人的行為能發生甚麼影響說人身是七種原素構成七種原素一離開就是死亡原素是永久存在的也有唯物思想以上三家由於學說相似所以在若干資料中往往被弄錯都被列入正命派自稱或邪命外道佛家稱之之中他們的出身是奴隸其學說代表了第四等級的利益第六尼乾子後來發展成耆那教其前則有脅主主張七句義一開始分世界為有生命和無生命兩類生命不得解脫則是由於業漏縛因此就須遮滅解脫以消滅業他們認為業報太重要讓業報加快結束就須苦行故主張苦行這種思想實際上是支持了婆羅門的業報說尼乾子出身剎帝利母親是國王的女兒表妹是王妃學說也就代表了統治階級的利益這一派與釋迦學說是對立的雙方有過沖突它雖然支持婆羅門在解脫方法上與婆羅門也不相同釋迦本國的族姓來源不詳有人說不是雅利安種是蒙古種住在今尼泊爾南與印度交界處之羅泊提河東北部從喜馬拉雅山以下二十里寬橫十六里面積約三百二十萬平方里傳說共有十個小城最大的名迦毗羅衛因以名其國在傳說的十六大國中沒有它的名字可能當時已不能獨立是憍薩羅的屬國該城遺跡在今尼泊爾之梯羅蘭柯提玄奘曾至其地據他在西域記中說城之廢墟仍然存在云云全國八萬戶五十萬人政權是共和制當時處在強凌弱的形勢下釋迦本國正受憍薩羅的威脅因此釋迦牟尼一出世就對本國負有一種責任如何擺脫強鄰的侵犯他的父親淨飯王當然希望兒子能繼續統治至少要維持現狀可是釋迦本人後來不想做政治上的統治者離開家跟著思想家去學習最後還構成自己的學說體系並傳播很廣發展成為宗教這樣對他的傳記就越來越神話化了學者們對佛傳做過很多研究現在還有人在做對他的大概情況是清楚了佛的傳說一部分保存在經裏大部分保存在律裏律有各部派不同的律因而關於佛的傳說也不盡同大衆部把佛傳部分叫大事法藏部則叫本行經它的律叫四分律是漢譯佛律之直接導源漢譯佛典中還有一部完整的佛傳佛本行集經六十卷隋代譯把五部不同佛傳匯集一起的各派律的佛傳都從佛的家世出家以至成道後六年回家為止此後的活動都無記載佛本行集經亦如此馬鳴寫的佛所行讚也是採自各種傳說就直寫至佛死為止馬鳴另一著作大莊嚴論經的皈敬頌中皈敬的不止一部其中就包括有犢子可見是博採衆說而成釋迦成道後曾組織了一個團體創設了許多制度其中有一個安居的制度從現存資料中佛成道後四十五年內每次安居的地點都有記載並且還是合理的第一佛經常住在王舍城摩揭陀首都第二有二十多年在舍衛城憍薩羅首都這樣根據記載可以編出一個佛在四十五年的大概行事來這證明釋迦傳記是有其真實性的釋迦一生的重要行事可參看印度佛教史略中有關部分大致如此他自幼受過完備的教育結婚生子二十九歲出家到摩揭陀一帶尋師訪道無所得苦行六年也放棄了最後獨立思考完成了自己的學說體系這是他三十五歲那年的事從此即開始宣揚自己的學說歷時四十五年宣道地點以摩揭陀憍薩羅拔沙三國為中心東到瞻波西到摩偷羅範圍相當廣闊釋迦為甚麼要出家呢他的學說反映的是甚麼社會內容當時印度自由思想很發達出身於剎帝利的思想家也不少婆羅門對許多不瞭解的問題還要向剎帝利請教初期奧義書中即如此說如關於普遍的神我梵本是婆羅門自己的理論後來也解釋不清楚去請教剎帝利又如輪回之說即由剎帝利般嚩訶那亦譯卜拉瓦罕王創立婆羅門祭言信從其說並發展為業力的理論被當做祕說來尊奉釋迦當時的處境是如果不能把本國的政治地位提高個人就要在學術思想上爭得領導權傳說他生下後相士曾預言他將來不做轉輪王就成為大思想家正反映了他當時面對現實所必須採取的非此即彼道路在釋迦出家的原因上也有另外的說法如說他看到病人老人死亡的痛苦看到了沙門的自由自在而引起他厭世之念還有說他看見農人翻土小蟲被鳥啄食而耕田的人全然沒顧及生命之可貴這一景像使他深感無常與不幸等等是不是他也看到農民種田的痛苦了呢中國有些記載說釋迦在王宮感覺不到煩惱走出宮門接觸社會種種現象使他産生了世界是苦的概念這一記載雖不明確但說務農是苦是和他的學說有關聯的支持釋迦學說的據記載摩揭陀國的頻婆娑羅影堅王是十分敬佩他的給他供養還給一處宣傳場所竹園精舍後來他得到了本族姓的支持再以後還得到憍薩羅國波斯匿勝軍王的支持此外大富豪商如須達多給孤獨等人都是他最有力的施主據說東園的鹿子母講堂即為一富豪家新娘賣掉一件昂貴的嫁妝施建的釋迦後來又去吠舍離那裏原是耆那教勢力範圍活動極為困難但他仍然得到庵摩羅衛獻的一處精舍維摩經中提到此精舍庵摩羅衛的身份有說是長者有說是妓女不管怎樣錢財總是來自富豪階層在佛的弟子中開始是五比丘其次是商人耶舍耶舍一次就帶來了六十個門徒從佛陀的支持者看盡是剎帝利大富豪他的學說所代表的階級利益也就不言而喻了參考資料百維譯佛在世時印度十六國的政治形勢載現代佛學一九六年第六七期谷響佛陀時代印度諸國的社會思想概況載現代佛學一九五六年第五期湯用彤印度哲學史略第三四章呂澄印度佛教史略本篇上第一章第二節原始佛學的構成釋迦在世時學說的組織形式雜藏中殘存的一些伽陀原始阿毗達磨解釋的發展佛死後第一次結集的傳說經律的傳承學說內容的社會根源反唯物思想的傾向對當時各種學說的取捨分別論與中道原始佛學的結構有形式和內容兩個方面後世佛徒一般都相信保存下來的經律在釋迦時代就有了那麼它的形式是怎樣的釋迦宣揚其說前後達四十五年傳播的地區又相當廣他還允許弟子們用地方方言進行傳習宣揚時應該有一定的表述的形式按照當時的習慣是口傳憑著記憶互相授受採用偈頌形式是最合適的了因為偈頌形式簡短有韻既便於口誦又易記牢在各派的律中保存有佛弟子誦經的資料參看萊維著佛經原始誦讀法這些經例如義足經漢譯有單行本巴利文收在經集中波羅延經漢譯大智度論瑜伽師地論中都有引用巴利文收在經集中法句經漢巴都有單行本等就全是偈頌形式這些偈頌有些是不問自說有些是相互問答另外在甚麼時間甚麼地點向甚麼對像說的等等都有記述謂之緣起也隨同偈頌一道傳了下來可以設想以偈頌為中心其義理一定會經過解釋而繼續有所發展這種解釋謂之阿毗達磨意為對法佛經是規範性的法解釋法的就叫對法對法的形式有下列幾類一優波提舍議論它單純對佛說作解釋由簡而詳逐步深入佛本人也做過這種解釋如長阿含中大緣方便經就是釋迦對緣起理論的解釋二摩呾理迦本母這是提示全文要點的解釋方式謂之本母意取由簡單的要點可以生發出許多道理來如母生子一般這類有佛本人的也有佛弟子的三抉擇即在各種不同說法中抉擇出其中一種來這主要是對名相採用的方式因為許多名相意義相似為了決定它們的含義就分設若干門類加以區分一般是按數字順序排列從一法到十法所以叫十上法或增一法十以上也有如十二因緣等不過較少這樣做既方便宣揚也方便記憶由上述情況可見佛說的組織形式是以偈頌為中心附帶著有了緣起隨之又發展為阿毗達磨佛死之後這些形式就被固定下來傳說佛滅不久在王舍城外的七葉窟有一次五百人的結集這次結集各派的律中都有記載盡管記載有出入基本部分是相同的參加的是佛的大弟子主持人是迦葉方式是會誦即指定一人背誦佛說大家審定後公認是佛說的就把它固定下來這一方式是以後幾次結集一直採用的結集的內容傳說有經有律甚至還有阿毗達磨有經律是可能的有阿毗達磨就根本不可信佛滅後是否馬上就有結集也很難說按理則應有這樣一次舉動特別是佛說的戒必須有一致承認的條文從各部所傳的律中看出有一個原始的共同的東西或即為最初結集時所産生的最初結集的經典是否就是阿含呢似乎不是因為在阿含中提到佛說法是九分的形式經散文簡短的應頌重頌重復散文記別對道理反復解釋偈頌單獨的頌自說頌如是語過去的事情本生未曾有方廣據後來如覺音曾經解釋說現存九分教是經的一部分巴利文置於小部漢譯置於雜藏中所以很有可能首先結集的經典是九分教形式後來方重新編輯為阿含阿含編輯的標準第一是依篇幅長短分類如一類經很長則編入長阿含篇幅短的則編入相應把相應的事放在一類漢文叫雜阿含巴利文稱相應部篇幅適中則編入中阿含另有一類可按數目排列的法則編入增一阿含第二是根據應用來分類長阿含多半是對外的如沙門果經即是對六師外道的駁斥其次便於深入學習的則編入中阿含指示止觀禪定道理的編為雜阿含為了廣為宣傳則編成增一阿含阿含的編輯大約在佛滅後百年間形成的從後世傳下來的看阿含有不同的說法律也不一樣可見是與師承有關係據傳說經是阿難誦出的律是優婆離誦出的當然各有系統傳說中還講到富樓那對結集有異議可見他也有個系統二次結集阿那律也是佛的大弟子又有一個系統這些都會影響到以后的分歧關於原始佛說的內容在釋迦傳記中有些記載他從出家到得道乃至宣傳都與他出身的那個剎帝利階級利益分不開的他要替剎帝利解決當時思想界出現的混亂而不能解決的問題他的哲學理論特別是實踐哲學人生哲學壓倒了當時的婆羅門哲學這就替他的祖國迦毗羅衛爭得了地位因而獲得釋迦牟尼釋迦族聖人的稱號這一點對他的祖國前途有極大的幫助例如他晚年在憍薩羅宣道的時間特別多從而緩和了憍薩羅對迦毗羅衛的威脅在這種階級的社會的根源下釋迦學說帶有反唯物主義的傾向是很自然的他對當時的六師都加以反對不過他的思想帶著對各方面都不走極端的濃厚的中和色彩在這點上他是相當成功的因而受到當時各種種姓的支持甚至一些婆羅門思想家也跟著他走例如他一方面不讚成婆羅門所維護的種姓制不是根本反對但另方面又相當地支持了種姓制拿當時的道德五戒來說是婆羅門耆那教共同奉行的釋迦也奉行又不完全同意就把其中離欲一戒刪去而代以戒酒又如他主張出世對世界給與了價值的否定空而宣講涅槃這是相當消極的了另方面他對群衆又講施戒認為只要樂善好施即可獲致幸福升入天堂這比婆羅門的苦行祭禮等苛刻條件要簡便易行多了所以能受到群衆特別是商人們的歡迎釋迦訪問過當時有名的學者跟他們學習過所以他的學說能對所有的理論加以鑑別取捨內容與當時的學說緊密聯繫當時學說有兩個系統一是婆羅門思想認為宇宙是從一個根本因轉變而來即所謂因中有果說用以指導實踐即以修定為主通過修定去認識了那個根本因便可達到解脫境界二是非婆羅門思想認為事物是多因積纍而成即所謂因中無果說這一學說用以指導實踐形成了兩派一派走苦行道路一派則尋求快樂釋迦對以上兩大系統的思想都不相信另立緣起論認為諸法是互相依賴互為條件的既非一因生多果也非多因生一果而是互為因果這一理論一方面打破了婆羅門的第一因論含有無神論的傾向再方面它本身並不徹底而相信業力說認為業的作用是相當重要的上述的兩個系統都是以本體論為依據的釋迦學說沒有接觸到本體論如他提出的十四無記記是分別即對十四個問題不加分別即宇宙是常還是無常宇宙有邊還是無邊生命死後是有還是無生命與身是一還是異等等前三類每一類又分為四個問題如常無常有常無常非有常非無常等後一類又分二個問題總共是十四個問題對當時學術界共同討論的這些問題一概避而不談理由是這些問題與人生實際無關即使討論也得不到解決所以在因果論中他就回避了誰是第一因的問題釋迦學說也有他的特點那就是自始至終採取分析的分別對待的態度在兩個極端中加以抉擇然後得出中道的看法這樣他的觀點就有些接近辨證法他的中道著重於實際行動方面如他認為當時具有唯物觀點者把快樂作為人生的目的是不合理的認為尼乾子主張苦行也是不合理的只有不苦不樂的中道才是對的後來他把這一思想發展到理論方面去不著一邊不作一往之談他自己說我是分別論者非一向一邊論者成立較早的法句經泥洹品有這樣的話法歸分別真人歸滅這表明原始佛說的內容是分別論者釋迦的學說有無師承呢有人講佛以前還有佛如迦葉佛就是法句經即是迦葉佛流傳下來的還有人講不止一佛而是四佛阿育王就以四佛作為崇拜對像參考資料萊維佛經原始讀誦法佛學研究第二篇四分律卷五十四呂澄印度佛教史略本篇下第一章第一節巫百維譯原始佛教的若干問題載現代佛學一九五六年第十期一九五七年第一期第三節原始佛學的要點轉法輪的傳說四諦的組織苦諦中心說自然的與社會的苦因四諦中貫串著緣起觀其實踐的意義從人生區別的緣起支論理的解釋以愛欲為根本進一步對業力的肯定歸結到無常與無我緣起與法佛徒稱釋迦成道後初次宣傳他的學說為初轉法輪法輪是比喻印度有個傳說誰能統治全印度自然會有輪寶出現它能無堅不摧無敵不克那個得著輪寶的統治者便被稱為轉輪聖王釋迦未出家前原有兩條道路好走一是做轉輪王政治上的統治一是做法輪王思想上的統治把佛的說法稱為轉法輪即含有這種意義同時也顯示釋迦所悟的為最高原理釋迦初轉法輪相傳是在波羅奈斯的鹿野苑對他的五個弟子講的從現有經律中研究釋迦不是一開始就講四諦而是首先講了一番中道這是符合事實的因為原來隨侍他的這五個人看他拋棄了苦行感到失望才離去的釋迦最初對他們宣揚理論應該是先批評了苦行和其他學派的主張提出自己不苦不樂的中道學說來證明苦行不是正道只有中道才合理因而講了八正道正見正思惟正語正業正命正精進正念正定把五人說服了然後宣講四諦四諦的重點放在人生現像上人生的全部不外乎兩方面一是染苦集一是淨滅道四諦的組織又以苦諦為根本集是苦集滅是滅苦道是滅苦的方法釋迦第一次宣揚四諦反復地講了三次謂之三轉法輪初轉是肯定四諦人生是苦老死是苦等二轉是指出四諦在人生實踐中的意義苦應知集應斷滅應證道應修三轉是證明本人已做到四諦所要達的要求苦已明集已斷滅已證道已修在三轉法輪中每一次對每一諦都有四種不同的認識謂之四行相眼智明覺那麼四諦便有十二行相所以又稱為四諦十二行相這一說法就奠定了原始佛學的基礎經律中的材料是這樣記載的佛滅後二百年的阿育王留下的法敕也是這樣提的法敕中要求佛徒常念七經的第一經毗奈耶最勝經據考證就是指三法輪那一段其後佛學發展到大乘階段像較早的維摩經法華經等一開始也講四諦就是大乘後期經典像解深密經分佛說為三階段三時第一時仍承認是講四諦可見四諦是原始佛學的中心思想已為大家所公認四諦中的苦諦後來說成為八苦生老病死怨憎會愛別離求不得五取蘊前四種是自然規律不可避免但人的要求常違反這種規律要求不老長生等等因而産生痛苦次三是人與人的社會關係是不合理的社會制度造成的在階級社會里敵對的人總是多的而往往會合在一起親愛的人又往往被拆散不得團聚物質生活的要求常常不得滿足這些都是痛苦從這裏釋迦學說也反映了當時社會的一些表面現像可是深追一步苦的總原因是甚麼釋迦認為是求不得為甚麼求不得是苦的總原因釋迦則又以為是由於五取蘊他分析人的構成