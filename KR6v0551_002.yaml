派心外無境的唯識說唯識說以夢為喻證證有心無境夢中所見祇是心的構想醒後所見也同樣是一種心的構想夢與非夢僅是淺深程度不同而已並無原則上的區別祇有到達真正的覺悟時才能認識到所謂境界不過如幻如化月稱講心與境是平等的如果似夢中無境同樣也應無心他不承認睡夢中有心無境月稱對瑜伽行派的這些指摘也是有理由的並未受到瑜伽派的反駁這就看出他對中觀無自性的說法發展得比較徹底發展到後來便把緣起性空的理論成為性空緣起就是說正因為無自性才可以說是緣起這一說法的實際意義就是在世俗上肯定了無其名性空而有其實緣起密教很崇拜月稱即利用其說肯定煩惱美其名為方便實際上是縱欲他們之牽涉到月稱不是沒有原因的因為月稱也與密教有一些聯繫中觀學派在月稱以後的大家是寂天寂天的著作我國趙宋時即有傳譯但是未傳其名因此漢文資料裏幾乎不知道有這一家據西藏資料他是南印梭羅修多羅國德鎧王的兒子原名寂鎧寂天一名是出家後改的他做王子時感到統治階級的生活不合理輪到他登位時就出走了投奔到東印第五代師子王處並在那裏服務了十二年由於他勤學博通了內外各派學說後到那爛陀寺出家入勝天護法的後輩之門據此推算寂天大約是第七世紀末的人他在那寺據說是內勤修學外示放逸即默默地鑽研外表卻顯出懶散的樣子大家都不喜歡他叫他三行者就是說只會吃睡大小便最後想驅逐他為了找個理由就召開了讀經大會要每人在會上背誦所學的經典估計寂天背不出即可藉此驅他出寺輪到寂天背誦時三千大衆特地脫下衣服堆成高座請他坐在上面背寂天很神奇地坐上高座並很自信地問大家是背誦已有的經典還是背誦沒有的大家很驚訝要他背誦沒有的經典於是他出口成章一下就背出一千頌這實際是他的著作菩提行經一共八品主要內容是關於入菩提行的即大乘佛學學者應該作些什麼修養等等當他背到第七品般若波羅密多品時有這樣一個頌說心不住外相而得無緣寂滅第三十七頌據說人們都看不見他的身影只能聽到聲音這暗示這一句是此經的頂點也是他學說的要點以後寂天還是離開了那寺回到南印由於他在那寺顯示的奇跡所以被目為非凡人物那寺請他回去他拒絶了他背誦菩提行經的第三品護戒品的末尾曾提示學法的人應該學習三本書虛空藏經此經收入漢譯大部大集經內和龍樹的諸學處要集諸經要集並說扼要地學習的話應以後兩種為必讀書諸學處要集的份量大所說的範圍比較廣諸經要集則比較簡略但是這兩種書大家都未聽說過於是請他口傳由來人記録而去這樣龍樹的這兩部書就得以流傳下來了其實這兩部書應該算是寂天的著作正如瑜伽師地論名義上是彌勒著書實際是無著所述的上述寂天的三部書現在都存在菩提行經的梵文本已校勘出版還附有智慧作的詳注本文還有法日文的翻譯日譯並有河口的舊譯與中村的新譯兩個本子漢譯是趙宋時譯出作者題名龍樹譯文拙劣錯訛甚多藏譯本較好迦當派對它極重視列為必學的六論之一看作是中觀派的代表著作藏譯除本文外譯的注釋就有十一家之多學處要集論的梵文本也校印出來了蘇聯佛教文庫題名寂天作漢譯也是趙宋時譯的名大乘集菩薩學論共二十五卷作者題名法稱譯文也劣此書原文是提綱式的經鈔作者本人並無多少議論不過從它的取材編排上也可看出作者的思想體系書是頌本計二十七頌釋是長行計四千二百頌分十九品它的可貴之處是所鈔的大乘經許多已無原本通過它的鈔録片斷可以使人瞭解原本的概貌例如維摩詰經漢文譯的挺好但梵本不存無從瞭解其原來的樣子譯本總是隔著一層此書引了經的八個片斷就可從之看出原文的一些精華諸如此類全書共計引經達一五部之多諸經要集梵本不存藏譯本題名龍樹著漢譯名大乘寶要義論趙宋譯無作者名體裁與學處要集論相似也是提綱式地點一下然後引經不過比較簡略引經也比較少從這三部書來看寂天的學說總的講他是站在中觀無自性立場上來談問題的在菩提行經般若品的前二十幾頌就特別批判了瑜伽行派的唯心之說唯心說證明心的存在最主要的理由是自證而有關自證的作用中又特別提到記憶寂天對於自證記憶等說都一一給豫了有力的駁斥可見他是站在中觀無自性立場上的寂天對佛學的貢獻表現在對學風的轉變上他的學風有兩個特點第一守約一般治學者容易趨向兩邊或者簡約或者廣博簡約者知識面不廣廣博者又泛濫無歸合理的學風是由博而約因為這是建立在綜合大量材料基礎上的概括寂天即屬於這種學風他的學處要集諸經要集都是要約的同時又很廣博第二見行相應歷來有兩種傳承或偏於見觀點理論或偏於行實踐寂天則是見行相應虛實並舉他的著作不多都是從實踐方面來的他的理論觀點就完全貫穿在他所講的實踐之中從而使理論觀點顯得很突出後來大乘學說如果說有發展的話就是依著這個路子下去的寂天這種學風以後被阿提沙傳到西藏宗喀巴就大加宣揚而發生了深遠的影響中觀學派的末流在學術思想上出現了一個轉回的趨勢以勝義諦性空說為基礎吸收了瑜伽派的若干說法混合而成為一個新學派瑜伽中觀派它們關於中觀的方法論和對二諦的解釋不同於月稱而與清辨相似是自立量的不是隨應破的瑜伽中觀派的創始人是寂護藏譯為靜命其實梵文應譯為寂護他是第八世紀東印人曾做過那爛陀寺主講他在中觀學系中與稍前一點的智藏及寂護自己的門人蓮華戒並稱為清辨之後的東方自立量派三大家三個人之所以著名是因為他們都有弘揚中觀學說的專著智藏的著作是分別三諦論原本不存祇有題名寂護注釋的藏譯本但西藏人對它有懷疑論有頌有釋可以從中看到智藏的學說寂護的著作是中觀莊嚴論本文一百個頌注釋六百個頌蓮華戒的著作是中觀光明論二千七百頌有藏文譯本三家的思想都與清辨有繼承關係但是明確地把瑜伽行派學說採入中觀的則是寂護他在中觀莊嚴論一開頭就提出他的中觀無自性的看法當時各家學說對所謂自性的執著不外乎是一或多他則認為應離一離多方成無自性他先批評一多的說法都不合理最後提出他的主張應從唯心無境的觀點出發才能真正理解到法無我即無自性並說這也是瑜伽中觀兩家都應該掌握的因而兩家可以合而為一從這裏明顯看出他混合兩家的立場把唯心說吸收到中觀方面來了但是寂護的吸收唯心說祇限制在觀行也叫觀照即怎樣去看待諸法實相方面本來瑜伽行派的基本理論唯心說的思想來源也是從觀行開始爾後才擴大到去解釋宇宙一切現象的緣起這時才把宇宙現象解釋為心裏顯現的影像他們首先說唯心無境肯定了心否定了境後來再進一層心亦不可得把心也否定了所以從瑜伽方面來看在觀行中唯心說乃是達到說明心亦不可得的橋梁這一思想辨中邊論中就已明顯地提出清辨反對瑜伽行派主要也反對這一點他說與其這樣轉彎抹角地說毋寧干脆就說二者並無這無須像先在泥潭裏打個滾再去洗澡那樣先說有後說無但在寂護時仍然吸收了這個說法說在世俗諦是唯心無境在勝義諦心境俱無這是寂護學說的要點另外寂護對法稱學說也有所發展他曾注釋法稱七書中的最後一部論議正理論此注有藏譯本他還著有攝真實論部頭很大三千餘頌三十一品把佛家以外各派所說的真實都加以駁斥他的學生蓮華戒對此書作了很詳細的注釋梵本還存有藏文英文譯本因為它保存了很多佛家以外的資料可以作為研究印度哲學的很好的參考書也正是因為他混合中觀瑜伽學說再加上他著作的參考價值大所以寂護在印度佛學歷史上是一個很有影響的人物寂護與我國的西藏還有一段因緣當時西藏墀松得贊王金城公主的兒子生於公元七三年按傳統習慣十三歲登位時間是七四二年死於七九七年邀請寂護去藏對西藏佛教的傳播起了很大的作用原來西藏雖有佛教流行但與西藏的巫教鬥爭很激烈在這個鬥爭的背後還反映了統治階級內部有支持這兩種宗教的政治力量因而鬥爭十分復雜寂護去後大力奠定了純正佛教的基礎而且建立了佛教大廟桑耶寺寺的規模是模仿印度高翔寺的圖樣印度除那爛陀超行等大寺外還有許多大寺高翔即是其一接著又建立了正式的僧團組織此後寂護又把一個有法術的蓮華生邀去壓服了巫教再後又把自己的學生蓮華戒召去西藏蓮華戒同禪宗經過激烈的辨論把禪宗趕回了內地這樣在西藏就僅剩下印度的中觀派勢力了蓮華戒著有修道次第論共計三編初編的梵本還存在由意大利羅馬東方業書校印漢譯題名廣釋菩提心論宋代譯出書的體裁與寂天著作類似也是引用各經編纂而成此書在西藏很有影響因而也就更加強了寂護在中觀派中的地位跟著寂護蓮華戒之後而來的瑜伽中觀派大家是師子賢他在寂護門下受教同時與另一大家遍照賢學習現觀莊嚴論因此他是由中觀的底子來弘揚現觀莊嚴論的現觀莊嚴論一書傳說是彌勒作的說是無著對般若經感到文章好像有次序又好像無次序有許多疑難無法貫通就去請教彌勒彌勒即為講說此論莊嚴是一種文體以頌來解釋義理的此論即以這種文體來發揮現觀的意義所謂現觀就是親證即親切明瞭地認識真理講現觀的書很多原始佛學和部派佛學時期就有這一名稱此論用現觀的意義來貫通了全部般若經寫得非常巧妙共分八品每品又各有若干要義總計為七十個句義八品是以境行果的次序安排的所謂境就是一般所說的佛智的全體內容共分三類一一切種智二道相智三一切智這一佛智的全體就構成為修行的最後目標也就是所謂境為了達到這個目標還有方法即四種現觀一一切種現觀即對三類智全體的總的看法這是第一步二頂現觀即由一門深入的看法三漸次現觀即有次第的觀法四一剎那現觀這是他們主張的現觀究竟頓現觀到最後一下子完成有點類似質變的過程這四種現觀即屬於所謂行的方面最後講果就是證得法身叫法身現觀內容是四身五智四身即法身自性身受用身變化身五智即法界智圓鏡智平等性智妙觀察智成所作智現觀莊嚴論即以這八品七十義來分析解釋全部大般若經的這裏說的大般若經是指二萬五千頌的般若經論以八品七十義與經文逐段配合這就使經文組織得很有條理了所以後世出現的二萬五千頌的梵文本大般若經都把這八品頌文置於經前把七十句義插入於相應的段落間日本印大正藏時曾嘗試採用這一方式但未獲成功把二萬五千頌這樣大的著作加以分析形成系統當然不簡單不過這裏也還有些問題前後傳的大品般若不相同而且頌與論文也有出入世親弟子有個叫聖解脫軍的他是傳彌勒的般若學的他對照頌與論不能一致就産生過懷疑後來他在一次齊會上見到從南方普陀洛傳來的一個二萬頌的本子與二萬五千頌的本子大同小異與論完全相同以後就通行這個本子當然這在文字上已有過些變動了這就是現觀莊嚴論的來歷師子賢學了現觀莊嚴論以後對經論這種相互發明的關係很有心得他除了對二萬五千頌本用論來貫通外還用此論通釋了八千頌本的小品般若相當玄奘譯的大般若經的第四會但不完全相應還包括第五會的一部分後來又對八千頌般若的提要著作寶德藏般若頌本也用論把它發揮得淋漓盡致事實上大小品般若的內容基本一致但也不盡相同中國最初由鳩摩羅什譯傳的般若近乎原貌從它可以看出大品般若自身的特點總共分兩大部分前分是講般若實相般若本身的後分一小部分專談般若的運用即屬於方便的而小品般若則把講方便的這一部分省略了現觀莊嚴論對般若經的分析只是籠統地解釋對大小品這種不同之處就不能從它看出來了現觀莊嚴論的梵文本日本荻原雲來已校訂出版又載在二萬五千頌般若經內的論俄國徹爾巴茨基師弟亦已校刊印行此論傳入西藏後一直為西藏學般若的人所尊重師子賢的學說非但與前兩大家寂護蓮華戒一樣混合了瑜伽中觀之說而且用般若加以融通這一方向其實在瑜伽行派初期就已經指了出來如無著所著顯揚聖教論是發揮瑜伽要義的它對現觀即闢有專章成現觀品來講述並以成瑜伽品專章來解釋瑜伽在那裏就很明確地說瑜伽即是般若二者是一回事因為般若是能夠得到大菩提的最勝方便所以謂之瑜伽瑜伽也是為了得到菩提因此實質上也就是般若另外以般若貫通瑜伽在辨中邊論裏已經開始師子賢只是根據前一輩人的思想更進一步有所發揮而已這樣在佛學思想上就出現了轉回的情形開始瑜伽中觀分裂爾後中觀接受瑜伽的說法二者趨向統一最後統一復歸於般若到了這個時候也就是大乘佛學的最後階段了參考資料王沂暖譯印度佛教史第二四二五二九三十章林志鈞藏譯印度佛學論著録目現代佛學一九五三年第二三期敬之佛護月稱中觀宗問題講座載現代佛學一九五九年第三四八期一九六一年第一期略閲菩提行經藏要本卷四般若品一二九頌參照校注王森現觀莊嚴論佛教百科全書詞目稿本餘論十一二世紀二百年間印度的政治與宗教波羅王朝與斯那王朝統治下密教的開展金剛乘易行乘時輪乘大乘佛學在密教學說體系中的地位及其歸宿佛學主要思想發展經過的簡單回顧到了公元第十世紀時印度的大乘佛學便已十分地衰頽了但是佛教還以密教形式在印度殘存了二百年的光景大乘佛學也就在此情況下不絶如縷地也維持了二百年在這二百年中印度的政治文化各方面也是一個醞釀著大的變化時期在此以後政治被伊斯蘭教所統治文化也受到了伊斯蘭教的影響公元八世紀初伊斯蘭回教國家在波斯阿富汗一帶的統治便已根深蒂固了但還未來得及侵犯印度第十世紀末約公元九六三年左右在中亞細亞沙曼尼回教國家內有個軍隊的奴隸軍隊募集來的老兵土耳其人名阿爾普提金在阿富汗山地一個名叫迦色尼的小城建立了一個小國到它的第二代就併吞了阿富汗成為一個回教大國它的第三代是蘇丹馬訶慕德便開始侵入印度五河地區並繼續向東即向恆河流域擴展大概從第十世紀末到第十一世紀前半葉即從公元九九七一三年的三十多年中幾乎是周期性地向印度進行了十七次的侵略這種侵略不是以奪取城池為目的而只是掠奪財富和破壞伊斯蘭教是絶對排斥異端的特別反對偶像崇拜因此印度教佛教都是它破壞的對象曲女城摩偷羅等佛教聖地都受到嚴重的摧毀這對佛教來說是個很大的打擊當時佛教中心已移到東方奔伽爾波羅王朝治下的角落去了由於受到回教國家的侵略波羅王朝感到有必要在政治上振作一番宗教是政治統治的工具因而便進一步利用宗教以期共同抗禦外患在這種情勢下佛教就以密教形式還得到了發展從佛教本身說由於異教的侵入促使它更加與印度教聯合起來共同對敵這就是密教愈益同化於印度教的原因到一三年蘇丹馬訶慕德死後對印度的侵略暫時停了下來直到十二世紀快結束時即一一九一年阿富汗又出了一個土豪性質的君主名穆哈馬德他建立根據地於廓爾地方向外擴張勢力占領了伽色尼統一了阿富汗又大舉入侵印度他的侵略富有政治野心不是單純地掠奪財富他繼續向印度內地侵入一直深入到恆河流域終於在十二世紀末占領了奔伽爾那時波羅王朝第十八代已被斯那王朝所代替十二世紀末廓爾的穆哈馬德把斯那王朝消滅了十三世紀初把印度僅存的超行寺燒毀以此為標志佛教在印度本土便宣告絶蹤我們所要講的密教就是在一三年回教停止入侵到一一九一年再次侵略時這段時期發展起來的在這百多年外患中間休止的時期東方波羅王朝和斯那王朝還能苟安在他們的統治下密教因而還得到了一段時間的發展密教開始於第七世紀到第八世紀以後性質逐漸同印度教相接近愈益離開了佛教的面貌一般稱之為左道以後的發展更加不純特別是主張性欲的瑜伽一般也稱為左道瑜伽由於他們也講般若苦等教理主張空性並說這種空性猶如金剛是不變的為了與大乘小乘相區別又稱之為金剛乘在波羅王朝於十一十二世紀建立了超行寺以後金剛乘密教更有一番變化它逐漸泛濫於民間而不一定集中於寺院了教理也更為通俗化更加沒有什麼規律簡單易行所以人們稱之為易行乘所謂易行就是區別於一般佛教難行的實踐而言的他們認為一般的佛教方法比較難民衆不易接受行不大通因此要採取易行的辦法其實金剛乘