了三論宗這一宗完全是發揚龍樹提婆之說的自然龍樹成了這一宗的開山祖師後來智顗受到三論宗啓發首創天台宗它雖上承慧思慧文之學但也與中論大智度論有關係所以遠推上去他們也是傳承龍樹的因而也以龍樹為祖師再後有賢首宗華嚴宗也尊龍樹為他們的祖師因為龍樹作了十住毗婆沙論對華嚴十住品有注釋有發揮他們向印度方面找師承也就把龍樹看成自宗的祖先雖然華嚴宗近宗世親但按資格龍樹要老些因而世親反列入到以後去了再就是淨土宗一般認為這是義學以外的捷徑法門但這法門如何與義學調和呢龍樹在十住毗婆沙論易行品中有過這樣的議論說淨土法門較易實行道理也簡單對能力差的人實為捷徑至於能力強的仍應走義學的大道這番話淨土宗就以此作為調和義學的根據也就把龍樹拉扯為自宗的祖師了以後還有密宗其中稱為開元三大家之一的金剛智自稱其師龍智是龍樹的弟子這樣龍樹又理所當然的成了密宗的第一代了這樣一來中國佛學中的幾個主要宗派都以龍樹為祖師因而龍樹在中國佛學界的地位就特別高也特別重要另外南朝齊梁時律宗大師僧祐在律宗傳承上也記載有這樣一個傳承說薩婆多部的師承計有三十五人人名是用各方面材料湊合編成的開頭是用流行的說法即迦葉阿難等歷代相承其中也把龍樹提婆編進去了龍樹為三十四代提婆為三十五代在龍樹提婆前後的一些人在其他傳記中是看不到的僧祐這一說法見於他著的薩婆多部記中書已佚只剩下目録序文載在出三藏記集第十二卷內龍樹的學說受大衆部的影響較多這從其著作中可以明顯地看出的至於龍樹在哪一派出家當時出家總要關係到部派中的一派傳記卻無明文記載不過從大智度論中講到律的地方看似乎與說一切有部關係密切但他是否就是在說一切有部出家呢尚待研究僧祐把龍樹編入薩婆多部說一切有部當然有些來歷不過這樣的排列次序畢竟是缺少根據的由於那時存在著這麼一個傳承就出現了許多誤會特別是付法藏因緣傳元魏曇曜編託名譯本編了一個二十四世的世系傳承大概就是湊合了和僧祐所傳目録同一來源的說法而成從佛開始中國也有龍樹把馬鳴作為十二代比羅十三代龍樹十四代提婆十五代這裏龍樹靠近了馬鳴此後禪宗據此也編了個自己的世系又加上四代成為二十八代然後接上傳到中國來的第一代達磨於是龍樹又作了禪宗的祖師從上述情況看羅什傳入龍樹學說以後對中國佛學産生的影響是相當普遍的參考資料提婆菩薩傳大唐西域記卷四五八十有關提婆各段王沂暖譯印度佛教史第十七章廣百論本第八品略閲大智度論第十八卷讚般若偈湯用彤漢魏兩晉南北朝佛教史上冊第十章第一節第四講小乘佛學本宗學說時期約為公元一五五年小乘一名是大乘佛學成立並盛行後對部派佛學的貶稱小的梵文是醯那含有卑劣下賤和道德上屬於惡行的意思當然部派佛學自己是不會接受這一貶稱的不過後來文獻上應用開了大家看慣了也就習以為常現在用小乘一詞並不含有貶意僅表明這樣一個事實在大乘學說流行以後部派佛學還在繼續不過蒙受大乘影響學說有所改變而進入了一個新的發展階段小乘階段這個階段延續的時間相當長可說與大乘佛學相終始而在整個延續發展過程中後期與前期是有區別的我們把它的前期稱為本宗學說的構成時期後期稱為流行時期本宗學說構成時期從時間上說是上接部派佛學約從公元一五年經過三百五十年時間到五世紀終了為甚麼說這一階段截止於五世紀末呢這與印度的社會情況特別是政治情況有關小乘本宗階段的三百五十年是歷經案達羅和笈多兩王朝的到公元五年末笈多王朝基本上宣告滅亡也就算小乘本宗階段的結束爾後外族入侵小乘學說也有某些改變所以把五世紀末即笈多王朝大勢已去的時候作為小乘的前期結束時期現在即簡述這一階段印度社會的政治情況公元前二八年案達羅王朝建立直到公元後二二五年覆滅接踵而來的又是分裂的局面四世紀初公元三二年笈多王朝興起開頭兩代都很英武奠定了國家統一的基礎第三代是月護二世文治武功極一時之盛他把西北印曾經三百年來陷於塞族統治的地區全部收復了這是近阿拉伯海海口的區域收復它就打通了向西方貿易的路線這樣印度與阿拉伯埃及以至羅馬的貿易權都控制在他的手裏財富日增國力因此更為強大同時笈多王朝也大力提倡文化特別對國粹的婆羅門教推崇備至由於推崇婆羅門便連帶與婆羅門有關的學說文化也被推動起來婆羅門是重視梵文的所以當時的梵文被提高到國語的地位文學作品全用梵文寫作一時宮廷文人學者輩出有所謂九寶之稱其中如近年所紀念的世界文化名人之一的迦梨陀娑詩劇作家即為當時知名人物之一他的作品有的已譯成漢文如沙恭達羅月護二世在位的年代是四世紀末三七六年至五世紀初四一四年因為他政績顯赫被人尊之為超日王超日王是印度古代傳說中一位非常有能力的皇帝五世紀初的十年恰是我國法顯去印的時期正碰上超日王國勢昌隆的年代所以還目睹了月護治下的一些情況在法顯歷游天竺記中所反映當時的歷史資料在印度本土倒是語焉不詳了笈多王朝雖不排斥佛教但推崇的是婆羅門所以法顯所接觸的不是政治上顯赫人物留下的資料也多是當時一般的情況盡管如此也可以看出其時人民安居樂業很有些太平景象的味道但是過了這一時期