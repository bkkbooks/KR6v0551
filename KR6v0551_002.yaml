本並構成為專門的一宗宗有師承不可自由講解此宗學者就有人認為俱舍論是依雜心論作的近代學者木村泰賢作了更進一步的研究他的研究論文是他博士論文的一部分比較科學地證明俱舍論實是隨雜心論而來現在這一說法在佛學界已經成為定論了俱舍論雖然是依雜心論而來但對它是徹底地加以改造了的而不是如雜心論之依阿毗曇心論只簡單地作些補充就是雜心論有六百多頌俱舍論也有六百頌但不是互相吻合而是把雜心論的頌加以合併增刪重新組織結構過的不僅對頌文如此裏面的篇章段落也是重新整理過的阿毗曇心論是十品雜心論加上擇品是十一品俱舍論則改為八品後來世親作注釋時又加了一品是附加的與本文無關這八品的組織表明了世親對有部學說重新組織的體系那就是以四諦為中心以四諦為中心的組織體系是小乘常用的方法因為四諦本是他們學說的中心問題但是有部東方學派的大毗婆沙論卻沒有這種組織只是西方的犍陀羅才這樣做的一開始表現在阿毗曇心論上由於中國譯了阿毗曇心論和雜心論所以對這樣的體系還是明瞭的現在保存下來的焦鏡雜心論序就很明白地指出了這一點他說位序品次依四諦為義界品直說法相以擬苦諦行業使三品多論生死之本以擬集諦賢聖所說斷結證滅之義以擬滅諦智定二品多說無漏之道以擬道諦自後諸品雜明上事更無別體也見出三藏記集經序俱舍論也以四諦來組織學說體系但它與雜心論及以前的舊說不完全相同更能夠顯示四諦真正的意義來四諦是有部各家所公認的但各家說法的內容就不完全一致有部毗曇師舊師和後來迦旃延這一派毗婆沙師說法就不一樣有部中的譬喻師說的又不同詳見毗婆沙論卷七七西方有部法勝阿毗曇心論一派所講與譬喻師大致相同它是既不同於舊師也不同於毗婆沙師的俱舍論講四諦更是別具特點論分八品採用譬喻師的說法相當突出用雜心論為基礎但對它原來的組織作了整理八品的結構是一界二報是屬總論四諦的性質下面六品則分講四諦三世講苦四業五隨眠講集六賢聖講滅七智八定講道這一組織就不同於雜心論雜心論一開始就講苦無總論部分此外世品是俱舍論增加的世就是指有情世間和器世間把世的內容放到四諦裏來講就是世親提出的其餘內容與雜心論大體一樣把業隨眠看成是集這是借用譬喻師說詳見講者略述有部學俱舍論兩文世品就一個方面說把阿毗曇心論的漏洞彌補起來了而且很有意義原來阿毗曇心論的規模是根據九分毗曇佛說阿毗達磨來的在九分毗曇中本有世間施設一品而阿毗曇心論和雜心論都略去了世親重新注意到這一點就利用世間施設品材料組織成世品九分毗曇的這一品在印度方面可以代表佛家對宇宙結構和宇宙現象的總的看法所謂須彌山中心說世界是怎樣構成的呢即以須彌山為中心其它大地山河星球等等都圍繞著它而排列這種說法成為佛家後來的共同說法當然以前也有關於這方面的說法但明白地有體系地這樣講還是從俱舍論開始的世親的宇宙論一方面是對阿毗曇心論雜心論的補充同時也反映了當時笈多朝印度文化科學特別是天文學發展的水平笈多王朝印度的文化科學發展到一個新的階段可以稱為印度的文藝復興時代不僅文學方面百花齊放藝術方面也具有特色佛教美術在這時期也構成了一個笈多派科學方面的成就也是巨大的笈多王朝被認為是封建社會的完成時期生産力得到解放商業也很發達商業發達也就促進了手工業和農業的發展生産大發展又從而要求科學有相應的發展因此當時的一般應用科學和天文數學等都發展到可稱為印度史上的一個躍進時代世親的宇宙論無疑是受到當時天文學的影響反映了當時印度天文學的發展水平的總的說來以四諦說為中心對有部學說作了重新的組織這是俱舍論的一個特點其次俱舍論的根本態度是對大毗婆沙論的極端說法表示不滿大毗婆沙論的中心論點是說一切法實有發展到以後甚至把佛說的一些名目概念都看成是實有至於這些名目是否有實際存在那倒不管了這就有些類似唯實論了經部起來反對批判也未說有部都不對只提出應該分別對待有的法確是實有有的則是非有俱舍論批判大毗婆沙論也是參考了經部的說法但還有自己的見解它是用蘊處界三科來批判論證的首先對大毗婆沙論所說三科中的法是否都是實有呢經部認為要作分析分析後的結論是界是實有世親則認為界是實有處也是實有而蘊則是假有蘊為甚麼是假有據世親的論證蘊是一類一類事物的集合體既然是集合體就可以分散分散了就不成為一種集體所以說它是假有可是這就牽涉到說一切有部的根本主張了因為只有在貫徹三科實有的前提下才能談得上一切法的實有有部的學說是以法體實有三世實有這兩個概念統一而成的兩者缺一不可否定蘊的實有就破壞了他們主張的這種完整性據有部認為蘊是色受想行識等類的合成對於色等的完整意義還應包含內外粗細遠近的色即不僅是空間的統一才構成一個蘊如果按俱舍論說蘊是假有那就連帶對構成類的時空性等的實有都成了問題特別是三世實有的主張豈不是連有部的根本都動搖了嗎此外俱舍論還對三科中別的法也一種一種地加以研究結論是有的假有的實總之反對有部的一切實有在分析到無為法時認為無為法虛空擇滅非擇滅不是獨立的實有有部的主張三種無為是在有為法之外的實在俱舍論批判這種看法認為無為法有雖有但不能獨立必依有為而存在俱舍論對這些法作了分析批判以後還做了總結把構成宇宙萬法的基本要素歸納為五位七十五法五位是據世友五事而來七十五法是色法十一心法一心所法四十六不相應法十四無為法三這個結論對以後講有部學說的人有很大的影響俱舍論傳到中國和日本以後講俱舍論的都以此五位七十五法作為入門就像講瑜伽學說的先講百法一樣由於俱舍論對大毗婆沙論作了批判引起了保守的不輕易放棄己見的婆沙師們的辨護其中最為有力的一家是悟入的弟子衆賢衆賢鑽研俱舍論達十二年之久寫成了二萬五千頌的破論俱舍雹論傳說論寫好後他同弟子去找世親面決是非世親其時在磔迦國北印度聽到此信就躲開他向中印度方面去了衆賢到達秣底補羅身體不好不能繼續前進就給世親寫信說自不量力竟敢對前輩提出批評用意無他不過為了扶持有部正宗之說而已至於議論對否還請指示云云同時表示如果他死了他的著作能夠流傳就滿意了信連同論一起交給一個有辨才的弟子送給了世親不久衆賢果然死了世親看完之後斟酌很久認為理雖不足辭乃有餘而且闡發有部正宗總算做了點工作不妨並存就給它改名順正理論此論玄奘有譯本傳了下來這當然是一種傳說實際上衆賢這書原來就叫順正理論因為他還寫了個節本叫顯宗論在該論開頭的頌中提到他寫了幾部大論叫作順正理怕人們嫌它太繁所以刪削枝節只留下正面文章以顯本宗從這裏看順正理就不是世親給它改的名稱了順正理論的體裁是採用評釋的方法即對俱舍論作出批評性的注解它對俱舍論的說法並不是百分之百的抹殺只是將意朋經部和批評婆沙的地方有些辨駁而且辨駁得相當徹底不但在義理上加以駁斥而且指出俱舍論批評婆沙所根據的是經部學說即從其理論來源做了尋根究底的追索順正理論的作者是有部毗婆沙師反對異說最為有力的一家順正理論的基本立場既然是駁斥經部純潔婆沙正統有部說重點當然是從道理上來辨護的道理越辨越深入因而對婆沙原說不可能沒有發展甚至改動因為婆沙本身存在缺點辨護時不能強為之辭多少是有改動的所以盡管它標榜只是扶持本宗實際上通過辨論還是把有部的理論推進了一步因此一般把它看成是新有部說其實俱舍論已開始做了革新有部的工作不過沒有得到有部的代表毗婆沙師們的公認而順正理論對俱舍論有的加以肯定有的給豫駁斥看起來似乎更全面更新穎因而得到承認正式成為新有部說新有部對原來學說變動最主要之處是關於一切有的說法有部各家著述對於有有各種說法說得都不明白這主要是因為毗婆沙師的著述基本上是依據發智論的而發智論本身對一切有就沒說清楚所以各家的說法無法取得一致到俱舍論時對各種說法加以總結對一切有作了另外的論證俱舍論的論證是採用二教二理教理有多種此二為最有根據最主要的二理之一是心不緣無法認為心必有境法體如果沒有就不會有了別它的心出現例如各部派爭執最大的一個問題即一切法三世有的說法一切有部認為一切有含有兩層意思一是一切法體有二是三世均有三世中的現在有不成問題過去未來有許多部派就不贊成俱舍論對此總結說按心必有境的原則既對過未有所認識那也一定有作為認識對像的過未之法境這就是俱舍論總結提出的二理之一衆賢對這問題也有發揮即抓住二理之一的這一理為重點在顯宗論開頭對有部以外各家不同說法一一列舉並借口法集經說佛是預先知道這些不合理說法的總計有四十四條都是有部不贊成的重要說法其中最後一條是心亦緣無境衆賢把這條作為他所反對的最後一條就表明他是強調心必有境並把它作為主張的重點的實際上這也就更正了以前不完備的說法對一切有說作了重新的檢討比大毗婆沙論說得更清楚了有此一番更正也就證明過去的說法是不完備的順正理論經過心必有境這番論證從而把一切有的有更加推廣了衆賢認為除了實在的有算有外假有也算有他首先對實在的有加以區別說有的有是體用兼備的有的則僅有體而無用從用的方面講有的有功能有的無功能其次在假有中他認為有些假有是直接依實有而施設的如瓶是假有但瓶所依的水土等材料則是實有有些假有是依假而施設的如軍隊樹林是假有但它們是依個體的樹人等集合而成樹與人的本身就是假有像人是五蘊和合的五蘊則是假有兩種假有中不管是那一種一概都是有所以有在廣義上可以包括一切因為心必有境有此心就有此境問題是如果泛泛地說有則假有也是有如果僅指真實的有則有又須分別真假由於把實有的體用分開來講又把用分為有功能無功能所以實有的範圍還是相當大的而且通用於三世過未法是有體無用如過去業已得了果的將來就不會再有作用了但它的體還得承認其存在而且還屬實有的範圍這種解釋則無一不有無時不有實有的範圍就相當廣闊了新說除對有的發展外其他方面也有發展如關於色法的極微理論等極微有部原來的說法是從智慧上將法分析到不能再分析的程度就是極微這種極微不僅肉眼見不到就是所謂天眼也看不見即已不屬於眼根的境界這種說法就可以被人斥為假有而非真有順正理論對此有了新的解釋它認為個別極微眼見不到但由七個極微構成的單位阿耨則是可以看到的而非假有阿耨按說不是極微了為甚麼還叫極微呢他們認為阿耨是同類和集的極微而非異類和合的聚極微總是在固結狀態中才能存在沒有不和集的單獨體所以阿耨是能感覺到的實有而且仍然是極微這種發展承認極微的物質存在比較接近於唯物論的說法了又如新有部配合二諦來講實有假有實有屬勝義諦有假有是世俗諦有而對假實的分別則認為假依於實如瓶是水土等材料構成瓶為假有而水土等則為實有所以假有分析到最後還是與實有有關假依實立因此世俗有原是勝義有的一分世俗諦依勝義諦而立這樣便把二諦統一起來了這也是對舊說的一個發展再如新有部關於法有可以作為心的境界這一問題上也有發展有個新說認為此法為彼法所緣六因四緣中的所緣緣那麼無論甚麼時候它都具有所緣的性質現在時能成為所緣緣自無問題但過未無能緣之心怎能有過未所緣之境呢新有部對此的解釋是過未沒有心存在能緣是沒有但過未這個法仍然有而且仍然具有心之所緣的性質一旦心生起了可以它為所緣心不生起它也仍然存在視為所緣因此這種所緣就是抽象的潛在的如同薪在未燒時也是燃料一樣因為它隨時可以燃燒衆賢以上這些新說許多地方與勝論派無意中接近了比如勝論派講極微也認為集聚起來的極微才成為種種現象這樣就承認了極微的客觀存在又如勝論派觀察世界萬事萬物而得出六種抽象的句義這六句義是最高的範疇外延最大內涵最小如實句義就是捨去了具體事物的屬性而得出的抽象實體地水火風空時我方意等九實新有部最後把概念說得也很抽象如所緣緣只是個抽象的東西即接近這種句義的形式衆賢的老師悟入也寫了一部入阿毗達磨論表面上是為初學者學習的實際也是針對俱舍論而發的議論它把有部的最高範疇歸為八句義五蘊三無為法五蘊是有為法不包括無為所以把三無為加進去這很明顯是針對俱舍論說五蘊是假有無為是半假有而說的悟入把五蘊三無為都當成實有提出他的說法更靠近勝論了不僅如此他在對句義的意義上也與勝論相似勝論講解脫實踐分為兩個部分一是應知二是應行首先是知要理解六句義悟入把最高範疇歸為八句義因之在實踐上也看成是應該理解的全部了由上述看來新有部發展的趨向是接近勝論派的勝論派的唯物傾向比較多些新有部的這一趨勢也就是向唯物論靠近了一步因而它和唯心論色彩濃厚的大乘的界限也更明顯後世印度佛學以外各派看待大小乘也都是從這一點來作區分的附帶說一個問題世親對順正理論為甚麼抱著不置可否的態度因為那時世親已在晚年又改宗了大乘對這些屬於小乘內部是非的問題不再關心了他寫俱舍論階段還篤信有部想對有部加以改革改宗大乘後就放棄這一計劃了不過他的弟子輩如安慧陳那等在注解俱舍論時並未放棄對順正理論的駁斥中國曾有這樣的傳說安慧作雜集論是把注解與本文集論本文是無著造糅合在一起的雜不是拼湊而是天衣無縫地糅合其目的據說即是為俱舍論辨護的中國玄奘一系的學者還做過這樣的工作即盡量找出雜集論對俱舍論說法加以辨護的地方實際上雜集論是否為俱舍論辨護的還可以研究但從這裏可以看出世親的弟子輩並未對順正理論放松過攻擊如中國現存玄奘門下普光的俱舍論記有好多處就是反駁順正理論的參考資料大智度論藏要本卷四第四四四七頁第五五五九頁卷二六第三四四三四五頁第三四九三五頁大毗婆沙論頻伽藏本卷一七六一七七八三右八左略閲出三藏記集卷十婆沙雜心序西域記卷三迦濕彌羅國卷四磔迦國秣底補羅國李稼年譯十世紀前印度簡史笈多王朝國家的興起一章呂澄略述有部學見附録呂澄毗曇的文獻源流見附録第二節經部和正量部的學說經部的前驅者譬喻師譬喻異師與成實論經部的興起及其學說要點正量部與犢子部的代興正量部學說及其與經部的關係經部是部派佛學中比較晚出的一個派別在北方的異部宗輪論和南方的論事中都把它列為從有部最後分裂出來的一派其後它發展成為一大宗後世分佛學為大乘與小乘兩大陳營它與毗婆沙就成為小乘的代表毗婆沙代表了除經部以外的所有小乘與之對峙的就是經部經部的根本典籍經律固然沒有了就是論雖然相傳它有根本毗婆沙和其他同類的著作也一無所存現在只能從別的部派著作分散地引用到它們的片斷作依據講述它的一些重要傳承關係要對經部的源流做確切的講述那是很難了參照真諦玄奘所傳可以說經部的前驅者是譬喻師他們這一批人的主張和學說都差不多玄奘甚至還說譬喻者是根本經部譬喻師原是些甚麼人呢他們原屬於說一切有部一般推鳩摩羅多童受為最初的倡導者童受是北印呾叉尸羅人後來西域朅盤陀有個阿育王很敬重他用武力強行把他請去特別為他造了大廟玄奘路過其地時還曾看見大廟遺跡童受寫了不少著作其中有喻鬘論現名譬喻莊嚴經鬘是做裝飾用的花環喻鬘即以譬喻作莊嚴的意思癡鬘論百喻經亦名癡華鬘可見癡鬘也是比喻的意思乃是以故事的方式來解釋道理以事喻經從他的著作看他是譬喻師的創始者喻鬘論早在四十年前在我國新疆龜茲一帶發現了梵文殘本在尾葉上明白地寫著此論為鳩摩羅多所著內容與羅什譯的大莊嚴論經相同大莊嚴論經的鈔刻本誤題為大莊嚴經論因此後人就把它與無著著的莊嚴經論並列其實兩者相差很遠羅什說大莊嚴論經是馬鳴的著作文章寫得相當好故事也很曲折生動從題材與文筆看確像是馬鳴寫的在論的梵文殘本被發現之前法國學者萊維對它作過研究還寫了論文名大莊嚴經論探源萊維對論的作者未作專門研究還是沿用羅什的說法探討主要放在論中所有材料的出處上也涉及到馬鳴把馬鳴著的佛本行讚等拿來與此論比較因而附帶斷定此論作者是馬鳴萊維的論文發表後十餘年梵文殘本被發現題為童受作隨即由德國梵文學者劉德士加以介紹萊維看後不以為然認為羅什的題名是正確的因為羅什學有傳承而且時代較早不會攪錯梵文殘本後出是把名子題錯了等等駁斥了劉德士盡管如此人們依然將信將疑究竟作者為誰一直未有定論我們認為童受和馬鳴活動的時間是相近的兩人著作可能混同或者童受在馬鳴原著基礎上加以改訂既然是改訂那就有可能用原來的書名了再說從馬鳴的學說上看不管他是否寫過大莊嚴論經他也可以算在譬喻者的名下譬喻師中著名人物除馬鳴童受外在有部四大家之數的法救覺天也可算是譬喻師的中心人物譬喻師學說資料作為反對和批判的對像被保存在大毗婆沙論中前後引用不下八十餘處綜合那些材料看譬喻者的學說主張是怎樣的呢一開頭很明顯地看出他們所根據的要典是法句經大莊嚴論經以故事解釋佛說在每講一段故事之前就先引法句經它所莊嚴的就是法句經法句經是頌文體大莊嚴論經就是以該經的頌標宗然後圍繞著頌講故事不過羅什譯大莊嚴論經時未注意到這點有時把頌譯成了散文因而對上述的性質沒有明顯地表示出來使人看不出它的出處法句經是把部派佛學所依據的四阿含中重要的頌文抄録出來按照義理分品構成的是一種集鈔各家的集鈔分量不同品目也有出入有部集鈔的法句經後經法救改訂整理並由原來的二十六品增為三十三品法救還有因緣解釋的著作漢譯名法句譬喻經譬喻師的學說也以四諦為中心組織的但對四諦的解釋卻與別家不同例如苦諦婆沙師認為是五蘊分別論者認為是有漏八苦譬喻師則認為是名色集諦婆沙師認為是有漏因分別論者認為是招後有愛譬喻師則認為是業惑滅諦婆沙師認為是擇滅分別論者認為是愛盡譬喻師則認為是業惑盡道諦婆沙師認為是學無學法分別論者認為是八正道譬喻師則認為是止觀可見譬喻師所講的四諦是有重點的從而也看出它們的學說是從法句經來的法句經所講的四諦就是有重點的其次法句經講四諦以心法來貫串譬喻師也是如此他們認為心依名色乃成苦體又由惑業繫縛而心垢止觀調心而垢淨所以四諦安立繫之一心見略述經部學他們認識到的心是無間斷的一般說心有多方面的功能眼看耳聽等都是心的功能就其每一類來說總是有間斷的但若混為一體觀之從生至死心則始終沒有間斷就佛家的實踐講止觀達到滅盡定期間意識似乎斷了有部說滅盡定是無心無識的譬喻師認為滅盡仍有心活動不過不是粗心而是細心這就是所謂細心說譬喻師的重要主張可說就是上述兩點到了以後成立經部前它們的學說又有發展擔負這發展工作的是童受的弟子訶梨跋摩師子鎧他開始信受師說後來覺得那些還是有部舊說沒有擺脫大毗婆沙論的拘束散漫支離沒有得到佛說的要領因此他離開老師到了阿逾陀當時那一帶的部派佛學中僧祇一部已到了多聞階段學說規模宏大不拘守一宗一派之言並採用大乘的說法開展了綜合性的學風師子鎧隨多聞部學習最後寫了一部綜合性的著作成實論成實論表示了作者開頭所學和以後的成就反映了他前後思想的變化這從書名也可以看得出來實指四諦之諦成實即成立四諦四諦是佛說原無再成之必要但他認為各家對四諦的內容所說各異因而他要成立四諦的確實所指例如他說苦諦是五取蘊但對五蘊再作分析色蘊四大是假只有四塵色香味觸是實聲塵是兩物相撞有起有息亦不是實這種說法既與舊譬喻師不同也與有部之說對立其次關於集他認為苦的原因固然是煩惱與業而煩惱中貪欲最要關於滅諦他還有特別的說法提出滅要經過三個次第與之相應而滅三類心一滅假名心一般認為人我是在五蘊上假設的因此是假名講滅首先要破除人我滅此假名心二滅實法心假名滅後只剩實法如滅人我就剩下五蘊等有部到此便停下來因為他們認為五蘊實有不能破舊譬喻師也承認名色實有不能破成實論認為名色中有實法有假法不管假實一律要破這就是法無我破法心三滅空心先破假名心次破法心最後剩下的是空心成實論認為連這空心也要破講到滅諦他們就要滅這三心這種說法顯然有異於部派佛學的通說特別是超出了有部因為有部只講人無我而不講法空相反大乘則講法空龍樹提婆等人空也還要破即空亦復空同時並不以空空為止而是講中道可見成實論之說是受到龍樹提婆的影響而接近於大乘了成實論第一五品即三受業報品中還引用了提婆四百論中兩句話小人身苦君子心憂用以成立它們所說憂也屬於苦受平常不把憂當成一回事在業報中無地位此品則承認憂和苦一樣都可以得到業報這兩句話在龍樹提婆學說中並不重要但由於這一事實說明師子鎧是讀過提婆著作的因而會受到影響就不是奇怪的事了盡管成實論有了大乘空亦復空的思想但其學說始終沒有擺脫小乘的局限他把最後的滅空心只分為兩種即證涅槃和入滅盡定以此作為最高的境界這與大乘如龍樹提婆等人就相差遠了因為大乘是主張無住涅槃的此外成實論除引用了提婆那兩句不甚重要的話外對於當時流行的其他大乘學說一概未提所以它仍然沒有超出原來的範圍來成立學說從經部看來它並不能說是譬喻師的正宗只可說是別派真諦說成實論就是經部的著作還有人說它是經部導師都不恰當成實論著作的地點是在沙勒即羅什遇莎車王子改宗大乘的地方那裏有過大乘流行靠近西域故其學說對西域也有很大的影響而有相信的人羅什適逢其會學到了此論並轉譯到了中國譯出之後在中國就出現了成實師他們認為成實論與中論百論不一樣不僅有破而且有自己的說法如成實論篇首十論的一大段即是對小乘十種議論加以批判的講的非常細致而有條理其中有七論專破有部毗曇像這樣的態度內容如此充實似乎與龍樹提婆的著作相差不多又是羅什譯出的看來是要把它與龍樹提婆學說相輔而行因而誤認它也是大乘一類所以不僅成實師講即大乘師也講羅什譯此書的目的原不過以之與龍樹提婆學說對照一下借以說明小乘講空以空為終點無所得為究竟到成實論已嘆觀止矣而大乘講空則為利他以空為用不以空為止境即所謂以無所得為方便義這是成實論所根本想像不到的不料譯出之後人們把相形看成是相成不是對照中論百論以顯其勝而是把兩者混為一談了無怪羅什要慨嘆中國人沒有見識三論宗怕成實論與大乘相混以訛傳訛也曾費力地進行過辨論如吉藏著三論玄義導言性質即有專章分析相當徹底可以參看至於印度成實論的學說並無流傳可能是由於此論出於偏西的地方也可能還有其他的原因笈多王朝時代在其統治地區中印度一帶陸續有新的大乘經典出現和流行主要有涅槃經非後來譯的大本只相當大本的初分勝鬘經等等這類經籍的出現與當時社會情況有關其內容多少反映了當時的社會所以從經本身即可看出它出現的時代就在這些經裏有性質較為特殊的一種即大乘阿毗達磨經在小乘佛學諸派中例如有部是推崇阿毗達磨的他們將其歸為佛說也可稱為廣義的經但是有部的佛說阿毗達磨乃是由迦旃延尼子把分散各處的佛說收集編纂而成大毗婆沙論在解釋發智論為佛說時就指出內容為佛說編者是迦旃延尼子譬喻師也很尊重阿毗達磨說它是大迦旃延所編是收集分散的佛說編為九分毗曇可見小乘佛學所說的毗曇其性質都是編纂的佛說大乘阿毗達磨經與這些完全不同它有始有終整然一體不是出自編纂而是原來就是佛說的一般經典體裁大乘阿毗達磨經即是構成當時中期大乘佛學的重要素材可惜原本不存在了玄奘去印按理應會搜集到這部經的但未見到有譯本可能是未來得及或因其它原因而未譯出因此關於此經內容只能從其他著作引用的片斷現在只找出九段以及涉及此經處進行了解經的體裁大概全是頌文怎樣分品尚待研究大乘阿毗達磨經不論就形式或內容講它對小乘佛學都發生了影響例如譬喻師後來發展為經部就是受了此經的影響因為佛說有完整的阿毗達磨所以他們就從原來的重論轉而重輕換句話說他們不再重視編纂的以論形式出現的阿毗達磨而要直接由經中找阿毗達磨性質的資料原來單純以論為決定是非標準的一變以經為定量因而有了經部之稱這是由大乘阿毗達磨經的形式上受到的啓發從內容上看大乘阿毗達磨經的內容十分豐富據後來其他著作引以為據的均集中在無始時來界為諸法等依這一問題上這是一個重要的哲學問題是要探討宇宙一切現象以何為依的問題原始佛學對此類問題是避而不談的前期部派佛學對此回答得也不明確以後大乘也曾討論過到了此經則有更進一步的解釋據上引之語它認為宇宙現象總的根據是界蘊處界的界同時在時間上是無始時來就是說時間是無始的所以宇宙本身無始宇宙現象的原因也是無始的此經認為用界來表明總的所以還不夠還給界安上另一名字即阿賴耶阿賴耶原義為家宅是收藏的意思舊譯為家或宅後來翻定為藏以它作為一切現象的種子倉庫這樣藏就成了諸法的總因了而且是無始相繼連綿下去這就有因果關係界是因現象是果界有種子的涵義無始時來就有種子並構成界種子遇到條件生起各種現象這就是所謂現行這是一重因果反過來說諸法對藏也有因果關係諸法是不斷把新種子放進藏裏去的否則家當也會變完這樣諸法為因又為藏産生新的種子這又是一重因果這兩重因果種子生現行現行熏種子就構成了互為因果循環不已這一重要理論對譬喻師特別是由譬喻師發展而成的經部發生了影響經部的主要觀點與此有很密切的關係經部的著名學者現在所知道的有室利羅多勝受據玄奘所傳他在阿逾陀作了經部的根本毗婆沙此指書的性質非書名經部各家並非完全同意其說但這書包括了經部的重要學說勝受就是受了大乘阿毗達磨經的影響吸收譬喻師的說法建立起他的隨界說的隨界一詞並非勝受所創在其它經籍中早就提出過但解釋卻不盡同其它經典的隨界來自隨眠所謂隨眠是煩惱的潛伏狀態對人說來這種狀態時間相當長程度相當深可以構成為界故叫它隨界表示它跟隨人轉如影不離形不是表面上的東西而是很潛隱的勝受使用這詞時範圍擴大了凡是一切潛伏的功能都歸之隨界隨界之所隨是指甚麼呢指心勝受這裏吸收了譬喻師的細心說認為有一種細微的心使人心理活動相續不斷即使入了滅盡定細心仍然存在這就把隨界說和細心說聯繫起來了隨界一切法的潛伏功能無始以來就存在同時以勝受為代表的經量部又是二元論者他從二元論立場出發綜合譬喻師的細心說與大乘阿毗達磨經的藏識說把隨界解釋為二元論的性質二元論者是講名色的人為五蘊和合而成其本質則為名心色物他們講細心時以為心與色相依從而也就同色聯繫了所以隨界之所隨也包含有色的方面關於界的構成是色心互為因果色可以構成界以存於心心亦可以構成界以存於色而構成界則是通過熏習如華香熏物色熏習心構成色的種子心熏習色構成心的種子這也叫心色互熏由此隨界之界包含有心界色界以至於心色互熏這種理論顯然是吸收了譬喻師細心說又受到大乘阿毗達磨經藏識說的啓發的但是大乘阿毗達磨經以藏識為主先有藏識後有色境這純粹是唯心論的經部卻主張色法與心法可以互依互熏而留習氣以成界抹煞了心物的先後主次明顯地是一種二元論所以理論上自然與該經有所不同後來又在此基礎上發展出許多說法這些學說與有部的距離越來越遠其中有的說法對後世大乘卻很有影響經部與有部對立的一個說法是關於根境識不同時說有部主張剎那滅經部原出自有部也主張剎那滅認為一個現象滅了接著另一個現象發生法是剎那滅法的種子界也是剎那滅這裏與有部的分歧之點是有部認為因果同時如以根境與識來說它們是同時産生的經部的主張則不然認為因果是異時在時間上因先果後如根境識根境是一個剎那等這個剎那過去識才産生識是另一個剎那就是說根境在先識在後這就直接反對了有部過去法實有的理論有部有六因說是用以論證過去法體實有的依據六因中以俱有因為基礎而主張因果同時或現在或過去因果必同時其意即為有過去能緣之心必然已有過去所緣之境它的六因說側重說因以因論證法體恆有到順正理論時對六因作了有力的補充以心不緣無境為依據側重說境以境來論證法體的三世有如說有過去的識必有過去認識的對像經部對有部上述這些說法完全與以破斥經部從一切法剎那生滅出發其論證的次序是這樣的既然一切法剎那生滅因果即不能同時必然是前一剎那為因後一剎那為果既然作為因的前剎那滅了這因就不能是實體這樣就反對了有部的因果同時說根境在過去識在現在因果不同時也反對了順正理論的心不緣無境說過去因已滅何能有實體總之經部從根本上動搖了有部的主張因之有部對它極為深惡痛絶無怪順正理論對俱舍論採用經部觀點十分惱怒要豫以徹底地批判了以上係對經部學說要點的提示詳見另文略述經部學其次經部學說對後世大乘學說發生影響之處可舉出主要的兩點來談談第一心法緣境的帶相說經部認為心之緣境不是直接的心緣之境非境本身而是以境為依據由心變現出來的形象變相心所知的是心自身的變相一般說感覺是直接的知覺才是在心裏依感覺而構成的影像所以認識過程是先有感覺這是直接的而且是可以通過它瞭解境界本身的比感覺更進一層的是知覺感覺和知覺都是認識的低級階段也是認識的基礎所以認識絶不能離開感覺知覺的對像僅僅以影相為認識的依據經部卻以為通過感覺知覺不能瞭解境界本身只有通過自己重變出來的變相或影像才能認識換言之心法緣境都是間接以影像為憑的這一觀點與它的因果異時論有關第一剎那是根境第二剎那識生時已沒有實物了一定要依賴於帶相否則即不能自圓其說經部的帶相說後來陳那將其導入瑜伽學說體系內並有所發展第二自證理論經部瞭解對象的心同時有自證的意義瞭解正確謂之證自證本有兩種意思一心自己瞭解自變之相謂之自證經部此處所說不是這層意思而是二心在瞭解對象的同時還對本身有反省的作用譬如點燈燈光四射既照明了餘物同時也照明了燈的本身心也一樣如眼見草青青天蒼蒼既見到草天的顏色同時也瞭解了自己這是見了這種瞭解是無意義的是自然而然的但是怎樣證明是見了呢是後來通過回憶知道的如我們從前見過一本書現在回憶時把注意力集中在見上我們就可以知道從前我們有過見的領受不然的話就不會說見過既然現在有見過某一本書的記憶就證明我們有見的經歷本領這就是他們對於心法能夠自證的說明這一理論是經部的特殊發明他們對此分析得很細微也很實在對唯心論起了促進作用所以後世大乘採用這個理論也由陳那導入瑜伽體系之內了由於後來大乘引用了經部的學說這使經部的地位大為提高成為以後佛教四大派別之一而在小乘中就與有部平分秋色了經部學說與大乘的關係頗似成實論與中論百論的關係好像還未能瞭解中論百論之時可先看成實論為開導一樣未能瞭解大乘瑜伽之時可先看經部說為開導正量部是犢子一系分出的四部之一它對犢子本宗的主張如補特伽羅實有業力不空等都有發展這從現成正量部著作三彌底部論中可以看得出來此部流行的地區是在西印以後發展到西南印他們在這些地區得到工商階層的支持因而勢力逐漸增強大乘思想開始傳播時途徑是由東南印南印西南印西北這樣的方向流行的正量部與大乘的學說思想互有影響與他們的傳播地區大體相當不無關係正量與大乘在學說體系相聯繫的地方如代表初期大乘思想的大般若經中有五所知法五類應理解的法其中第五類是不可作決定說正量部也是這樣的分法把補特伽羅歸在第五類認為補特伽羅與五蘊是一是異不可定說又如在講到界趣時大乘一開始即講六趣正量部也是這樣講把阿修羅道歸為第六趣以上是從學說體系方面看兩者的聯繫另外從其它方面還可以看到一些正量與大乘相聯繫的事實不單只正量一部恐怕作為犢子部的全體都有這種相聯繫的情況例如在中國譯籍中有大乘的作品大丈夫論作者題名為犢子部提婆羅大菩薩犢子本是小乘但作者卻自稱菩薩從論的內容看也完全是講大乘菩薩的布施大悲大願等等另外正量部的兄弟部派賢胄部也有一著作漢譯名三法度論此論注釋者僧伽先衆軍也稱為開士菩薩的義譯據此論漢譯後記及序稱僧伽先是一位大乘學者由以上兩事看犢子一係與大乘的聯繫是十分密切的有的小乘學者為大乘寫書有的大乘學者為犢子部論作注再有還可從大乘學者特別注意犢子的學說著述方面推論兩者關係是密切的如真諦是大乘學者他譯了小乘的著作部執異論異部宗輪論的異譯在書中真諦還特別把犢子部後來才發展出來的十一條學說加了進去這十一條在異部宗輪論和十八部論中都見不到西藏譯的異部宗輪論也沒有真諦還譯了正量部的律論明瞭論二十二頌簡要本他又在所譯攝大乘論裏把正量部的果報識增加進去這說明真諦這位大乘學者對正量部學說是何等關心研究是何等深刻這也恰好反映大乘與正量的關係密切至於兩者密切的程度與關係的實質如何尚待進一步的探究由於正量部發展了犢子本系的學說流行地區的社會條件很好又與大乘有這些關係就使得它在犢子部中占有特殊的地位而且這種地位越來越高以至可與犢子並駕齊驅後來甚至取犢子的地位而代之不過關於犢子興旺發達過程的年代現在還不能確切地指出只能從下列資料中看出一個大概來首先從論事看它把各部派的不同主張基本上都列舉出來但未指明哪條是哪家哪派的所以單從論事中還不能明其原委後來覺音對論事作了注疏把書中所列舉的二百一十六條百分之九十以上都指出部派所屬我們可以借助這個注來看一下正量部在部派佛學中所占的地位覺音的注只舉出犢子部的兩條根本主張一是補特伽羅實有一是阿羅漢有退這兩條是部派佛學時爭論的中心而正量部的主張卻舉出了二十二條比犢子多十一倍可見覺音之前正量部的地位就已經超過了犢子部其次還可從考古資料來看考古資料發現在第四世紀初就有以正量犢子並名記載的實物可知當時正量的地位就不在犢子之下了最後從玄奘義淨所傳來看到玄奘義淨時代正量部已發展成小乘四大宗之一完全代替了犢子的地位如義淨南海寄歸傳說印度佛教有四大宗正量部是一大宗它下面再分四部玄奘還把正量看成與瑜伽派相對抗的徑敵從這些記載看在部派佛學時期正量部已有代替犢子之勢到玄奘義淨去印時代不僅完全取代了犢子地位而且在整個印度佛學界也成了不可忽視的勢力關於正量部的主要學說首先它對人我實有有許多補充因其屬於犢子本宗暫且不談現在就它受大乘思想影響對業力說的發展方面談談大乘思想經龍樹提婆組織以後對有為法業亦有為法之一的看法不主張偏執一面而主張非斷非常業一定要有果報業在未受報前是相續存在的否則報無從起但問題還有已受報的業是否還存在這類問題部派佛學時是經常爭論的大乘對此認為不能看得那樣死要辨證地看既不能看成是常也不能看成是斷這種看法是與大乘的中道理論有關正量受此影響首先它把業力歸為佛說的不失法不失法佛經中早就有主要指業而言說業力不失正量部並進一步以世俗借債立券作比認為業力就像借人家的債給立了字據一樣其次對於這債券的性質解釋正量部也是受了大乘的影響認為不能把它說成或斷或常應是非斷非常在整個過程中有業必有報而業的性質是相續轉變而有差別的換言之一方面它確實相續下來的應看成非斷另方面它又有轉變差別差別指業由弱增強然後在其它條件幫助下實現報應應說是非常正量這些說法就是受了大乘的影響正量部受了大乘影響這一事實還可以從羅什青目對中論引正量部的一個頌的看法上得到佐證中論觀業品引了正量部一個頌雖空而不斷雖有而不常諸業不失法此法佛所說這是為了批判正量非斷非常的業券說而引用的認為他們說得膚淺蒙混並有執著處不如大乘的根據更確實深刻講的當理但羅什在譯中論時卻忽略了這一點以為這頌是論的正面文章青目作釋時也未注意到羅什為甚麼攪錯呢是否出於一時的誤譯不是在大智度論裏也有這一個頌羅什也當作正面文章處理的顯然不是一時的誤譯而是由於對非斷非常未作很好的分析或者對當時正量部與大乘的關係不清楚而造成的誤會由此可見非斷非常的理論是大乘所特別注重的同時也看到正量部受大乘影響之深表面上竟到如此相似的程度以至連羅什青目都難以分辨了正量對業力說有所發展同時還進一步對業力說各方面的性質也有所闡明尤其是將業力說和它們的色法在心法之外色法性質非完全剎那滅等理論聯繫了起來它們認為色法心法是分立的色法在心法之外其性質也非剎那滅而會繼續存在一段時間由此出發它們對業力說的各方面就作了特別的發揮首先它們把表色看成是業的一類所謂表色就是受到意的發動表現於外的語言行動一般只謂之業道不認為是正式的業正量則特別重視表業認為它才是正式的業發動業的意倒是次要的其次表色行動是實在的固定的因而才能說到由此及彼否則何以稱為行動這行動不成為假的了嗎關於業的不失法正量部也有新的闡明不失法還含有積聚的意