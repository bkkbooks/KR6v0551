者以及世俗的各類學者在那裏講學形成了各抒己見百家爭鳴的自由討論的風氣因而在構成瑜伽行學派的同時也把中觀學派刺激起來出現了佛護清辨以後還有師子光智光等人物重明龍樹提婆之學而有意地與瑜伽行學派相對峙同時那寺在講學中還對全體佛學加以分科組織即不以對峙的態度處理各派而是把它們作為一個全體來分科這樣講學的規模日趨完整學者們都從全體著眼而不拘於一家之言了我國的玄奘義淨都在那裏受到過這樣全體的教育我們替它整理一下發現當時那寺共有五科奘淨等都能把五科的精華傳回我國後來也由另外的學者把五科規模傳入我國的西藏不過那是後來的事已無奘淨時期的精彩徒具其形式而已那寺的這種學風也是使大乘學說所以能達到極盛的一個重要原因與此同時五世紀末笈多王朝衰落西印部分已被外來的摩伊陀羅迦族屬伊朗族占領他們以伐臘毗城為中心建立了國家起初白胸奴在這一帶這個國家臣屬於白胸奴後笈多王朝擊退白胸奴之後它就乘機獨立因為其地居海外貿易中心經濟文化都很繁榮因而也吸引了許多佛教學者逐漸形成為大乘佛學中心之一德慧安慧離開那寺就是在這一帶活動所以無著世親的學說特別是世親開頭講的俱舍論在這一帶很流行到七世紀這裏的大寺已可以與那爛陀寺相比這對中期大乘佛學的發展也很有關係再從當時佛學本身情況看大乘思想一發生部派佛學方面就有人反對批評大乘經典不是出於佛說這一點在般若經內即有所反映但不是部派佛學全體的看法例如馬鳴之師脅尊者就相信大般若經是十二分教內的方廣一分大乘經典是否佛說當時確有不同的意見但並未展開爭論從文獻上也看不出來大乘思想流行以後經過龍樹師弟的組織對部派佛學尤其是有部大加攻擊部派佛學方面當然不會緘默這是可以想像到的不過在文獻上還是看不出來只有繼此以後大乘發展到中期繼續出現了大乘經這才開始有反映如大涅槃經內對部派否定大乘經典的議論給豫了駁斥之後一些大乘學者的主要著作內也把這一問題提到了第一位無著在大乘莊嚴經論第二卷成宗品中即列舉了七種理由梵本是七因漢譯把有無有分為二成了八因堅決認為大乘是佛說七種理由是先不記俱行非餘境應極成有無有能對治義異文世親對此解釋得很繁此處不一一分析僅將其中比較重要的兩條理由略為解說一是俱行認為大小乘的經典是同時流行的所謂同時流行是指有文字記載的經典而言不是指口傳的階段口傳無憑是無從證明的小乘有文字記載是從大毗婆沙論開始傳說該論編成後刻在石上應當算是有文字記録了大乘經一上來就有文字脅尊者說般若是方廣顯然不是指的口傳而是他看到了文字記録既然文字的記載是同時流行的那就很難辨誰先誰後誰是佛說誰非佛說了大小乘經典形式都差不多都以如是我聞開始怎能說小乘是真而大乘經就非佛說呢這條理由小乘很難反駁所以很重要二是義異文這條理由是說佛說都用文字名相表示的而文字有意趣即佛說法都有所為與祕密指文字中含藏的微言大義大乘經的文字義理確非泛泛地一看就能理解的小乘若攻擊大乘非佛說即可據此分辨佛說有種種意趣不能拘於表面文字應追究為甚麼如此說這種解釋佛說的方法即所謂𮔢勒法門初期大乘已開始運用它發揮佛說的意趣極為深入另外佛說不但有意趣而且還有祕密深奧的內涵人們對它的領會自然不會一樣以後大乘凡遇有與小乘在文字理解有矛盾時都用這條理由去解釋此外無著在顯揚聖教論裏講了這個問題還把七因擴大為十因後來成唯識論也引莊嚴經論再一次提出這個問題來說明當時大乘學者對它都很重視不過七因都是一般的理由而且是大乘單方面的除此還有更為具體小乘也承認的理由莊嚴經論也提出過的那就是三法印與部派時期的三法印不同三法印是入修多羅經隨順毗尼律不違法相論這是判別是否佛說共同承認的標準大乘講用這三法印來判別的話大乘是佛說首先大乘入修多羅原來三藏的組織是十二分教其中就有方廣大乘經從形式言動輒萬頌從內容說上下古今都是相當方廣的其次大乘經也是對治煩惱的因此也隨順毗尼第三大乘經的重要法相如四諦十二因緣等也都不違法相只不過解釋不同而已三法印本來出自小乘大乘用這個標準當然可以取得公認不過三法印中的修多羅以十二分教來說並不是一切部派佛學甚至大乘自己所一致承認的十二分教是新說在此之前還有九分教的舊說舊說即不包括方廣小乘中有些篤守舊說的大乘中如法華經就只談九分教這樣第一法印就有點說不通了由此發展下去上述的三個標準就變成大乘自乘的標準從而出現了獨立的大乘經律論這種具體的辨論在莊嚴經論中沒有充分開展後來堅慧做入大乘論漢譯有二卷幾乎用了整整一半篇幅上卷義品來談三法印論證大乘為佛說這裏就反映一個情況在此時期內有了比初期大乘更新的經典出現而且是屬於三藏性質的文獻否則堅慧那些議論就沒有根據了所以也可以說在大乘是佛說非佛說的爭論過程中引起了新文獻的創作參考資料潘尼迦印度簡史第六章笈多王朝的統治婆藪槃豆傳大唐西域記卷九有關那爛陀寺的記事求法高僧傳卷上末附録大乘莊嚴經論卷一成宗品第二入大乘論卷上義品第一第二節續出的大乘經及其主要思想涅槃經類的佛性說勝鬘經類的如來藏說菩薩藏經與大乘思想的再組織菩薩藏摩呾理迦本母議論性質的大乘阿毗達摩經解深密經的七義抉擇在龍樹提婆之後繼續有大乘經出現其中最流行的就是大般涅槃經此經本文即暗示了它成立的年代所謂佛滅後七百年魔破正法等等說法就是說約在公元三世紀之後最早年限約在笈多王朝初期它就開始出現經的梵本已經沒有了中亞地方及日本僅保存下幾頁漢文藏文各有兩個譯本藏譯中有一個是從漢文轉譯的從漢藏文譯本及有關文獻看大涅槃經全文有二萬五千頌分前後兩分前分四千頌相當於原本大衆問品的一品東晉法顯和覺賢共譯的譯本重新分為十八品後分二萬多頌北涼曇無懺譯出譯本有八品以後到唐初在此兩分外會寧還在印度找到並譯出又一個後分說的是佛涅槃以後諸事如火葬分舍利等等材料與小乘涅槃經類似因而義淨對它有懷疑不承認是大乘涅槃經由此看來大涅槃經恐怕也只有前後分而且還是分別流行的流行的時間也先後不同前分是法顯於第五世紀初公元四一四三年在印度華氏城摩揭陀首都一個婆羅門家鈔來的以後義淨在印度所見的也只是大衆問品九世紀西藏譯出的也只是這初品藏譯在譯本後還說這是大本二萬五千頌的一品後分是北涼曇無懺由西域傳入的印度本土似乎反而沒有流行大涅槃經不是一時所出前後兩分主題雖同解釋卻有出入說明它們是分別反映了出現的時代社會一些變化的從前分看主要內容是就佛涅槃一事講起而提出佛身是常的概念來所謂涅槃一般就是指人死了這裏的問題是佛身是同常人一樣死了就完呢還是永恆的經中肯定佛身是常如金剛一般堅固不壞不同常人的父母生身而是所謂法身這種思想在初期大乘經中即提出過如法華經的如來壽量無邊際的說法龍樹大智度論提出佛有兩身等此經繼承其說但特別提出我的概念來這裏含有兩層意思一是佛身有其自體有其作用一是佛身常恆不變這樣的我也就是法身與法身是常是我相聯繫連帶也講佛身有樂有淨脫苦離染因此法身就具有常樂我淨四德四德被凡夫所誤解因而執著謂之四顛倒小乘雖不執著常樂我淨但回避它或否定它而大涅槃經則肯定了佛身的四德這是本經顯著特點之一由於佛身是常從而要找出其何以為常的原因經說證得佛身是由於認識佛性而來佛性原本就是常但為煩惱障蔽處於隱伏狀態經過必要的修習它即可以逐步顯現等待完全顯現就成為佛身法身那麼佛性是佛所獨有還是一切人共有呢從大乘角度看一切衆生皆有佛性皆可成佛衆生就是不同生類的意思生類雖不相同但同具佛性這點是相同的不過經的前分對衆生悉有佛性有一限制即一闡提應除外所謂一闡提是世欲非常深重的人他們不信大乘甚至毀謗更不能按大乘教去實踐這類人不能成佛也就等於沒有佛性這一說法反映了經的前分出現時首先受到小乘的極力反對無法使他們轉變所以只好叫他們為一闡提其次反映當時印度的族姓分化極為繁復佛教原是反對族姓制的主張任何族姓均可加入佛教盡管種姓劃分得多都可從佛性這一角度統一起來所以佛性的性用了喬多囉這個字意思是姓種類種族所以涅槃經說衆生界佛界以界字形容衆生和佛性即表示盡管姓階雖多但由佛性看來一律歸之平等同屬佛界範圍同時又承認有一闡提這是固定的也反映了當時社會姓階的不可變性喬多囉是在姓階的血統基礎推論上去的更大宗族社會上姓階的劃分達幾千種但最後都同於一大宗大宗即喬多囉涅槃經前分把一闡提分出為一大宗也即為後來五種姓說開了端可見佛教五種姓即五喬多囉的說法是模仿當時社會劃分姓階的方法連喬多囉種姓一詞也是借用當時社會習用的名詞涅槃經後分對佛性的說法就有了變化不再講得那樣固定範圍也寬了些例如師子吼品就把佛性說成法性亦即勝義空把能瞭解空性的智慧空性慧也包括在佛性之中這裏把能智所佛性統一起來通稱佛性這時認為一闡提也可以成佛這一變化正反映後分出現時社會情況與初分出現時不同了初分流行於笈多王朝初期統治者對佛教疏遠也包括其時小乘不信大乘所以涅槃經就認為這些人是一闡提後來笈多朝信仰佛教的多起來小乘也有轉向大乘的後分涅槃經的說法也相應地變化了認為一闡提也可以成佛給這些人開放門戶對自身學說的發展也更為有利此外涅槃經中的佛性也用了如來藏的名字藏是借用胎藏的說法因為哺乳動物先在胎裏成長如來所以成為如來是因為它原來就在胎裏孕育著指明佛性是成為如來的生因遲早總有一天功德圓滿必然分娩經的前分用如來藏說明佛性不僅有比喻的意思還說明佛性是有形體的因此把佛性的顯現分為聞見理解和眼見肉眼見兩方面這不就帶有形體的意思不過這一說法與佛學以外的學派有些相混他們認為神我是有形的在涅槃經後分裏把佛性完全歸之於法勝勝義空只有理性方能認識後分所以這樣歸結不外乎想與外道劃清界線與大涅槃經同時還有別的經如大法鼓經如來藏經也有如來藏的說法精神與大涅槃經一致但分量較小可以歸為涅槃經類跟著涅槃經類出現的另一類經就是勝鬘經類勝鬘是人名經即以他為因緣把佛說的道理記下的經的部頭小譯本僅一卷漢文有兩譯菩提流支譯本收入大寶積經內的第四十八會經名也叫師子吼內容主要講佛性特別以如來藏為主題全經結構分十四門即有十四義說法基本上與大涅槃經的後分一致但著重結合心的法性講的心的法性即是心的本質心以甚麼為本質他們認為心以清淨為本質由此本質來說心就是自性清淨心勝鬘經又提到如來藏即把它限定在這個範圍內這與涅槃經後分精神是相同的同時勝鬘經也把如來藏聯繫於對自性清淨心的理解能力方面即空性智就是說要以空性智來觀察才能認識空性智對心的理解有兩個方面一從自性清淨心講一切衆生皆有此心但現時不能覺察乃因煩惱障蔽即所謂心性本淨客塵所染淨心與客塵是同時並存的但兩者性質不同又是分離的即所謂與客塵俱而性相離怎樣知其相離呢這就是空性智的理解由智而見其不實從而可以把客塵斷掉這樣如來藏即具有空的意義即空如來藏這是從正面的理解二從反面理解如來藏未來可以發生甚麼作用呢可以成佛可以使之具有佛的各種功德因此它是具有功德的盡管現在未發現功德但功德的基礎是存在的這樣藏與功德的關係被看作不俱而不離就是說現在雖然尚未實現佛的功德但如來藏裏早已攝藏了實現它的基礎如同幼兒已具備有成年人基礎一樣總有成長為成年人的一天所以從智慧看來它也是圓滿無缺缺的這樣如來藏又具有不空的意義即不空如來藏由此看來勝鬘經對佛性說更加肯定它繼承了以前說法而且有所發展它把佛性擴展到心性這實際是佛家的人性說是他們對於人性的理解以及人生根據的說明勝鬘經共講了十四義除上述外還有其他一些重要說法例如三乘歸於一乘即暗示一切衆生包括一闡提在內都可以成佛又如四諦歸於滅諦從此可以看出四諦有有作無作兩方面的意義此說以後還有發展但此處已見端倪像勝鬘經這類說法的還有不增不減經無上依經等等性質相仿流行時間相同也可歸之為勝鬘經類另外還有菩薩藏經它不像涅槃經勝鬘經那樣有重點地講述問題而是把以前及當時出現的大乘說法全面地進行組織本來初期大乘經典如小品寶積就曾講到菩薩藏的十六門教授也是對大乘思想進行綱要性的組織以後還有龍樹的菩提資糧論組織得就更為具體這個時期根據新的發展對於大乘全體又有所組織這就是菩薩藏經菩薩藏的理論根據就是法門此經對大乘的重要法門都提到了因此對瞭解這一時期的學說具有極為重要的意義玄奘是傳播這一學說系統的瑜伽行派的人自然對此學說原委瞭解得很清楚所以非常重視此經他歸國後最先翻譯的就是這部經玄奘貞觀十九年正月入京從五月開始譯此經十月譯完共二十卷菩薩藏經的內容是講大乘菩薩道的組織它以四無量六度四攝為綱把有關法門統攝在這三類裏首先它特別提出四無量來這情形和菩提資糧論差不多是與外道說法相照應而內容卻不相同包括了外道的說法而有所變化以適應大乘自己的體系對外道說變動的方面是剔除了他們所說梵天等理想婆羅門以梵天為解脫目標修行的結果是達到與梵天共住修行的手段之一是修慈悲喜捨四無量大乘認為這還是貪欲是低級要求因而主張四無量是無染心的吸取和利用外道所說的四無量在龍樹時就已經這樣作了此經繼承這一方法把四無量列在六度之先以四攝為六度的推廣構成了以六度為中心的組織體系因此它把以前及當時的一切說法加以簡別最後把重點放在智度上這從經的最後帶有結論性的頌文裏也表示了出來此經不但把智慧放在首位而且還講到如何才能構成智慧它認為構成智慧需要有十善巧蘊界處諦四無礙四依趣此點維摩詰經和涅槃經已提出過資糧三十七道品緣起一切法包括有為無為對這十個方面過去與當時曾有各種不同的說法此經認為應對十個方面有個正確的認識善巧這就是作者自己對它的理解此經對大涅槃經勝鬘經所提到的問題也涉及到了但無所偏重而是包羅了各個方面如講界善巧時它不用佛性而用我界解釋說我界就是法界的意思也就是法性的意思這在實際上與涅槃經勝鬘經一樣另外在諦善巧內也提到四諦歸於滅諦這與小乘講四諦以苦諦為中心者相反關於諦平常只講二帝勝義諦和世俗諦此經加了一個相諦成為三諦它認為相諦是無相把一切歸於無相通常講勝義諦只講一切法自性空它認為這樣講空還不夠應該以無相為基礎建立一切相無相與一切相非一非異諸法不一歸為無相這是異中見一無相非相乃是一切相之共相這種說法對後來的有關說法很有影響在講四諦內容時一方面肯定了可用五蘊解釋即五取蘊是苦因而有了苦集滅道但另一方面也可以從能所取來解釋由於能取所取的執著也會形成苦這是針對有部說的有部把十二處看成實在的法即把眼耳鼻舌身意看成是內能取把色聲香味觸法看成是外所取這從菩薩藏經看來這種執著就屬於苦諦此外還提到涅槃與生死是無區別的又提到成就瑜伽師地得方便慧的問題等等可見它與後來的瑜伽行派有著千絲萬縷的聯繫因此它對大乘學說講得很全面很扼要可以看成是對大乘思想的重新組織玄奘雖然首先譯出它是重視它的一個表示可惜的是他本人並沒有說明此經對大乘學說有這樣多的發揮那一時期全面組織大乘學說新出的文獻除菩薩藏經外還有菩薩藏摩呾理迦即後來收入瑜伽師地論做為本地分十七地之一的菩薩地它的梵本還在英人在印度獲得一部現藏英國的牛津日本也收集到一部三十年前荻原雲來曾將它合校出版二十餘年前印度人羅睺羅在我國西藏搜到一部梵文的瑜伽師地論本地分其中卻無菩薩地是否把它單獨流行的就不清楚了我國在北涼和劉宋都在五世紀初曾先後譯出到唐玄奘又譯一次另外西藏也有譯本摩呾理迦本母是論藏的別稱但與通常稱作阿毗達磨對法的論藏稍有不同首先摩呾理迦出於佛說也包括有部分佛弟子說而阿毗達磨則主要是佛弟子說其次內容方面摩呾理迦不但解釋經也解釋律範圍廣泛而阿毗達磨則主要是解釋經其解釋律的叫阿毗毗奈耶後來歸在律裏去了最後體裁方面摩呾理迦是提綱挈領地解釋佛說宗趣所以叫作本母有可以作為發揮根據的意思阿毗達磨重在法門分別把法相分成各式各樣的門類則有枝末的意思菩薩地之為本母是將散見的關於大乘道實踐方法果實踐效果的佛說加以綜合編輯而成現存菩薩地的本子則是以持相分等十法來總括大乘道果的菩薩地十法中最根本的一法是持持是支持的意思所以是基礎而起支持作用的法又有三類第一自乘種姓自乘是大乘對小乘的自稱他們認為自己的種姓不同能夠成就菩薩地修這種道的只有自己這一類人才行這是受到當時社會族類劃分的影響在佛教內也分種姓第二發菩提心盡管屬於自乘種姓如果無意於發成就菩提的決心缺乏主觀努力也不成第三具有菩提分發心之後還得有獲得菩提的各種具體辦法這一點與菩薩藏經說的差不多只是次序以四攝開頭六度居中四無量在後與該經恰好相反這是持的三個組成部分這種組織所包含的主要思想可以舉出兩點第一它在解釋菩提分之前提出它的理論根據構成為真實義品真實義就是他們所謂的真理在這品裏他們把真理按深淺次第分為四個等第一世間極成這是屬於一般公認的常識性的知識二道理極成這比前一項深了一步即對自己提出的論據進一步用邏輯論證帶有道理的性質三煩惱障淨智所行講道理總有立場難免出現偏見這由於有煩惱的緣故因此應去此障使心地乾淨用智慧去瞭解真實義四所知障淨智所行煩惱還是屬於感情情緒方面所知障則屬於理性思維方面的障蔽必須去掉此障才有真正的智慧見到最後的真理這是有所指的其先龍樹提出空義來主要為了破斥有部執一切法有這一最大的偏見的但破了有執後世又趨向另一極端惡取空對空理解不善巧所知障淨智就要求認識到此種偏見只有去掉這種偏見才能得到真理真實義品最後還講到真實的內容究竟如何的問題他們認為一切事物現象都有兩種性質一假說自性即指人們對於事物現象藉助名言的瞭解二離言自性即指離開名言的事物現象的本身初期大乘否定了執著假說自性為實有的看法這是對的但並未否定離言自性但是陷入惡取空的人則並離言自性也否定了成為虛無主義不僅假名是無事物本身也是無總之一切歸於無有真實義品糾正了這些看法強調了假說自性和離言自性的統一就是說既應看到假說為不實同時也應承認假說是對事物的假說如果連事物本身都否定了怎麼還能假設真實必須靠假說來表現這種統一名曰無二執假說自性為實是有見說離言自性為無是無見這二見都不應有所以叫無二真實義品還講到理解真理無二的方法這個方法叫四尋思即對假說自性作名義自性假立差別假立四個方面的分析菩薩地真實義品關於四種真實以及得到真實的途徑是他們的重要理論根據也是對大乘學說的發展龍樹的中觀是概念上的實無假有而真實義品的無二中道既認為概念上的假說為不實同時還認為事物本身是真實的這就堵塞了走惡取空的道路再說四尋思的方法龍樹也使用過往往流於詭辨菩薩地此時講的就更有條理了菩薩地主要思想的第二點是講六度時於戒度中提出菩薩自乘的律儀戒佛教出家者皆須受律儀戒過去由於大乘無律儀戒大乘出家者都在小乘部派中受戒如龍樹即在有部受戒等現在菩薩地中編出一套四重四十三輕的律儀戒來就有了大乘自己的律儀戒了按照佛家傳說律是由佛制定的大乘這四十七學處每一戒即一學處能說是佛制的嗎他們的解釋是雖不是佛親自制定但都是佛說是將散見各處的佛說組織的所以還同於佛制這理由是說得通的因為小乘各部的戒律同樣也是經過一個過程才逐步形成的菩薩地對這一理由很強調他們認為自己關於道果的學說也都是各處散見的佛說的重新組織同時說這四十七條戒出於佛說還是菩薩地的重點因此在劉宋譯出時即全部作為戒經看待名為菩薩善戒經十卷並將其中四十七學處提出單行可見菩薩戒是菩薩地的一個重點從這裏也反映了一個事實那時大乘的勢力比初期強大多了以前對小乘還在戒律上有所依附現在自制律儀就完全獨立於小乘之外了這有點像中國的禪宗原是住在律寺別院內的以後自成一套清規就另外自立門庭了此時期還流行有純粹屬於論藏性質的新大乘經即大乘阿毗達磨經本來經律論因各有特殊性質而分成為三藏此經卻將經與論放在一起而成為所謂論經又名佛說阿毗達磨這是要特別強調它是出於佛說的其他佛說阿毗達磨是把散見各處的佛說加以編纂而成大乘阿毗達磨經則是首尾完整有系統的佛說它原來的組織如何由於原本已失只能從他處引用的片斷上看出個概貌例如無著的攝大乘論和阿毗達磨集論中都有關於此經的材料尤其是攝大乘論與此經關係密切可以從中探得不少消息攝大乘論我國隋唐都有翻譯據隋譯釋唐譯本的末尾說明看攝大乘論是解釋此經的攝大乘品一品的而非解釋全經但是陳譯魏譯藏譯卻說攝大乘論是依據經來說明大乘所有法門因此名攝大乘這樣說解釋的就不是其中的